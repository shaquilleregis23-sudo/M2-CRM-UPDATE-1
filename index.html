<script>
/* M2 Admin Cloud Actions Working Fix
   - Fixes Manager/Admin Hub Cloud Save + Load buttons
   - Uses multiple fallbacks
   - Adds direct Supabase fallback when normal cloud functions are missing
*/
(function(){
  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function qs(s){return document.querySelector(s)}
  function getState(){try{return window.state||{}}catch(e){return {}}}
  function safeParse(v,d){try{return JSON.parse(v)}catch(e){return d}}

  function getSupabaseClient(){
    try{
      if(window.supabaseClient)return window.supabaseClient;
      if(window.supabase)return window.supabase;
      if(window.sb)return window.sb;
      if(window._supabase)return window._supabase;
      if(window.m2Supabase)return window.m2Supabase;
    }catch(e){}
    return null;
  }

  function getTeamId(){
    try{
      var keys=[
        "m2_team_id",
        "m2_current_team_id",
        "m2_default_team_id",
        "m2_supabase_team_id",
        "m2_saas_team_id"
      ];
      for(var i=0;i<keys.length;i++){
        var v=localStorage.getItem(keys[i]);
        if(v)return v;
      }
      var acct=safeParse(localStorage.getItem("m2_saas_customer_account_v1")||"{}",{});
      if(acct.teamId)return acct.teamId;
      if(acct.companyName)return String(acct.companyName).toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"") || "m2_default_team";
    }catch(e){}
    return "m2_default_team";
  }

  function getLeads(){
    var st=getState();
    if(Array.isArray(st.leads))return st.leads;
    try{return safeParse(localStorage.getItem("nyc_solar_crm_v3")||"{}",{}).leads||[]}catch(e){}
    return [];
  }

  function setLeads(leads){
    try{
      if(!window.state)window.state={};
      window.state.leads=Array.isArray(leads)?leads:[];
    }catch(e){}
    try{if(window.saveState)window.saveState()}catch(e){}
    try{if(window.renderMarkers)window.renderMarkers()}catch(e){}
    try{if(window.renderList)window.renderList()}catch(e){}
  }

  async function tryFns(names){
    for(var i=0;i<names.length;i++){
      var name=names[i];
      try{
        if(typeof window[name]==="function"){
          await Promise.resolve(window[name]());
          return {ok:true,used:name};
        }
      }catch(e){
        console.warn("Cloud function failed:",name,e);
      }
    }
    return {ok:false};
  }

  async function directSaveSupabase(){
    var sb=getSupabaseClient();
    if(!sb || typeof sb.from!=="function")throw new Error("Supabase client not found");
    var teamId=getTeamId();
    var leads=getLeads();
    var payload={
      team_id:teamId,
      kind:"leads_snapshot",
      payload:{leads:leads,updatedAt:new Date().toISOString()},
      updated_at:new Date().toISOString()
    };

    // Try common table styles used across our builds.
    var attempts=[
      async function(){return await sb.from("m2_cloud_state").upsert(payload,{onConflict:"team_id,kind"})},
      async function(){return await sb.from("m2_team_state").upsert(payload,{onConflict:"team_id,kind"})},
      async function(){return await sb.from("m2_leads").upsert(leads.map(function(l){return Object.assign({},l,{team_id:teamId,updated_at:new Date().toISOString()})}))},
      async function(){return await sb.from("leads").upsert(leads.map(function(l){return Object.assign({},l,{team_id:teamId,updated_at:new Date().toISOString()})}))}
    ];

    var lastErr=null;
    for(var i=0;i<attempts.length;i++){
      try{
        var res=await attempts[i]();
        if(res && res.error)throw res.error;
        return true;
      }catch(e){lastErr=e}
    }
    throw lastErr||new Error("Direct save failed");
  }

  async function directLoadSupabase(){
    var sb=getSupabaseClient();
    if(!sb || typeof sb.from!=="function")throw new Error("Supabase client not found");
    var teamId=getTeamId();

    var attempts=[
      async function(){
        var res=await sb.from("m2_cloud_state").select("*").eq("team_id",teamId).eq("kind","leads_snapshot").maybeSingle();
        if(res.error)throw res.error;
        return res.data && res.data.payload && res.data.payload.leads;
      },
      async function(){
        var res=await sb.from("m2_team_state").select("*").eq("team_id",teamId).eq("kind","leads_snapshot").maybeSingle();
        if(res.error)throw res.error;
        return res.data && res.data.payload && res.data.payload.leads;
      },
      async function(){
        var res=await sb.from("m2_leads").select("*").eq("team_id",teamId);
        if(res.error)throw res.error;
        return res.data;
      },
      async function(){
        var res=await sb.from("leads").select("*").eq("team_id",teamId);
        if(res.error)throw res.error;
        return res.data;
      }
    ];

    var lastErr=null;
    for(var i=0;i<attempts.length;i++){
      try{
        var leads=await attempts[i]();
        if(Array.isArray(leads)){
          setLeads(leads);
          return leads.length;
        }
      }catch(e){lastErr=e}
    }
    throw lastErr||new Error("Direct load failed");
  }

  async function workingSaveCloud(){
    var btn=qs("#m2CloudSaveFixed")||qs("#m2QuotaSaveCloud")||qs("#m2HubSaveCloud")||qs("#m2CloudSaveNow");
    if(btn)btn.textContent="Saving…";
    try{
      try{if(window.m2FixStorageQuota)window.m2FixStorageQuota()}catch(e){}
      var r=await tryFns(["m2SaveCloudNow","syncLeadsUp","pushLeadsToCloud","m2SyncUp","saveCloudLeads","saveToCloud","supabaseSave"]);
      if(!r.ok){
        await directSaveSupabase();
        r={ok:true,used:"direct_supabase"};
      }
      try{localStorage.setItem("m2_sync_queue_v1","[]")}catch(e){}
      try{if(window.m2RenderSyncQueueBadge)window.m2RenderSyncQueueBadge()}catch(e){}
      toastSafe("Cloud saved");
      return true;
    }catch(e){
      console.error(e);
      toastSafe("Cloud save failed: check Supabase setup/table");
      return false;
    }finally{
      if(btn)btn.textContent="Save Cloud";
    }
  }

  async function workingLoadCloud(){
    var btn=qs("#m2CloudLoadFixed")||qs("#m2QuotaLoadCloud")||qs("#m2HubLoadCloud")||qs("#m2CloudLoadNow");
    if(btn)btn.textContent="Loading…";
    try{
      try{if(window.m2FixStorageQuota)window.m2FixStorageQuota()}catch(e){}
      var r=await tryFns(["m2LoadCloudNow","loadCloudLeads","pullLeadsFromCloud","loadLeadsFromCloud","syncLeadsDown","m2LoadCloud","loadFromCloud","supabaseLoad"]);
      if(!r.ok){
        var count=await directLoadSupabase();
        r={ok:true,used:"direct_supabase",count:count};
      }
      try{if(window.renderMarkers)window.renderMarkers()}catch(e){}
      try{if(window.renderList)window.renderList()}catch(e){}
      toastSafe("Cloud loaded");
      return true;
    }catch(e){
      console.error(e);
      toastSafe("Cloud load failed: check Supabase setup/table");
      return false;
    }finally{
      if(btn)btn.textContent="Load Cloud";
    }
  }

  function patchButtons(){
    [
      "#m2CloudSaveFixed",
      "#m2QuotaSaveCloud",
      "#m2HubSaveCloud",
      "#m2CloudSaveNow"
    ].forEach(function(sel){
      var b=qs(sel);
      if(b && b.dataset.m2WorkingCloud!=="1"){
        b.dataset.m2WorkingCloud="1";
        b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();workingSaveCloud()};
      }
    });

    [
      "#m2CloudLoadFixed",
      "#m2QuotaLoadCloud",
      "#m2HubLoadCloud",
      "#m2CloudLoadNow"
    ].forEach(function(sel){
      var b=qs(sel);
      if(b && b.dataset.m2WorkingCloud!=="1"){
        b.dataset.m2WorkingCloud="1";
        b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();workingLoadCloud()};
      }
    });
  }

  // Patch admin/cloud panel creators after they open.
  document.addEventListener("click",function(){
    setTimeout(patchButtons,80);
    setTimeout(patchButtons,300);
  },true);

  window.m2SaveCloudNow=workingSaveCloud;
  window.m2LoadCloudNow=workingLoadCloud;
  window.m2WorkingSaveCloud=workingSaveCloud;
  window.m2WorkingLoadCloud=workingLoadCloud;

  setInterval(patchButtons,700);
  setTimeout(patchButtons,700);
})();
</script>

<script>
/* M2 Clean iPhone Map First Fix
   Clean rollback approach:
   - Starts from stable map build, not the broken settings/mobile-card stack
   - Forces map first
   - Fixes the actual #sheet lead card to fit iPhone Safari
   - Hides Returns from daily map
   - Adds small Regrid-style marker labels: last 2 address digits + homeowner last name
*/
(function(){
  function qs(s){return document.querySelector(s)}
  function qsa(s){return Array.prototype.slice.call(document.querySelectorAll(s))}
  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}

  function vh(){
    return (window.visualViewport && window.visualViewport.height) || window.innerHeight || 700;
  }
  function vw(){
    return (window.visualViewport && window.visualViewport.width) || window.innerWidth || 390;
  }
  function setVars(){
    document.documentElement.style.setProperty("--m2-real-h", vh()+"px");
    document.documentElement.style.setProperty("--m2-real-w", vw()+"px");
    try{if(window.map && map.invalidateSize)setTimeout(function(){map.invalidateSize(false)},80)}catch(e){}
  }

  function hideReturns(){
    ["#m2ReturnListBtn","#m2ReturnBtn","#returnListBtn","#returnsTab"].forEach(function(sel){
      qsa(sel).forEach(function(el){el.style.display="none";});
    });
    qsa("button,a").forEach(function(el){
      var t=(el.textContent||"").trim().toLowerCase();
      if(t==="returns" || t==="return list" || t==="block return list"){
        if(!el.closest("#m2SaasAdminModal") && !el.closest("#m2LoginPanelFixed") && !el.closest("#m2ManagerHub")){
          el.style.display="none";
        }
      }
    });
  }

  function forceMapFirst(){
    // Close any accidental settings/admin overlays on first load only.
    qsa("#m2SaasAdminModal,#m2ManagerHub,#m2RoleSwitcher,#m2LoginPanelFixed,#m2QuotaPanel,#m2SyncQueueModal").forEach(function(el){
      if(el && !el.dataset.userOpened){
        el.remove();
      }
    });
    try{
      document.body.classList.remove("settings-open","admin-open","saas-open");
      localStorage.setItem("m2_view_mode_v1","field");
    }catch(e){}
  }

  function last2(addr){
    addr=String(addr||"");
    var m=addr.match(/^\s*(\d{1,5})[-\s](\d{1,4})/);
    if(m)return String(m[2]).slice(-2);
    m=addr.match(/^\s*(\d{2,7})/);
    if(m)return String(m[1]).slice(-2);
    return "";
  }
  function shortName(l){
    try{
      var n=(typeof nameOf==="function" ? nameOf(l) : (l.owner||l.name||((l.first||"")+" "+(l.last||"")))).trim();
      var p=n.split(/\s+/);
      var last=p[p.length-1]||p[0]||"Home";
      if(/llc|inc|corp|trust|estate|properties|realty/i.test(n)){
        return n.replace(/\b(LLC|INC|CORP|CORPORATION|TRUST|ESTATE|PROPERTIES|REALTY)\b/ig,"").trim().split(/\s+/).slice(0,2).join(" ") || last;
      }
      return last;

<script>
/* M2 Bottom Nav Restore
   Restores the 3 bottom categories on phone:
   - Leads
   - Map
   - Settings
   Keeps Safari bottom bar spacing and does not auto-open settings.
*/
(function(){
  function qs(s){return document.querySelector(s)}
  function qsa(s){return Array.prototype.slice.call(document.querySelectorAll(s))}
  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}

  function setVh(){
    var h=(window.visualViewport&&window.visualViewport.height)||window.innerHeight||700;
    document.documentElement.style.setProperty("--m2-real-h",h+"px");
    try{if(window.map&&map.invalidateSize)setTimeout(function(){map.invalidateSize(false)},80)}catch(e){}
  }

  function existingNav(){
    return qs(".bottom-nav") || qs("#bottomNav") || qs(".tabbar") || qs("#tabbar") || qs(".mobile-tabs") || qs("#mobileTabs");
  }

  function makeBottomNav(){
    var nav=qs("#m2BottomNavRestore");
    if(nav)return nav;

    nav=document.createElement("div");
    nav.id="m2BottomNavRestore";
    nav.innerHTML=
      '<button type="button" data-tab="leads"><span>📋</span><b>Leads</b></button>'+
      '<button type="button" data-tab="map" class="active"><span>🗺️</span><b>Map</b></button>'+
      '<button type="button" data-tab="settings"><span>⚙️</span><b>Settings</b></button>';
    document.body.appendChild(nav);

    nav.addEventListener("click",function(ev){
      var btn=ev.target.closest("button");
      if(!btn)return;
      var tab=btn.dataset.tab;
      qsa("#m2BottomNavRestore button").forEach(function(b){b.classList.toggle("active",b===btn)});
      if(tab==="map")showMap();
      if(tab==="leads")showLeads();
      if(tab==="settings")showSettings();
    });

    return nav;
  }

  function showMap(){
    document.body.classList.remove("m2-leads-view","m2-settings-view");
    document.body.classList.add("m2-map-view");
    qsa("#m2LeadListRestore,#m2SettingsRestore").forEach(function(el){el.remove()});
    try{if(window.map&&map.invalidateSize)setTimeout(function(){map.invalidateSize(false)},120)}catch(e){}
  }

  function leadRows(){
    var arr=[];
    try{arr=(window.state&&Array.isArray(state.leads))?state.leads:[]}catch(e){}
    return arr.slice(0,80).map(function(l){
      var name=(l.owner||l.name||(((l.first||"")+" "+(l.last||"")).trim())||"Homeowner");
      var address=(l.addr||l.address||l.streetAddress||"No address");
      var status=(l.status||l.disposition||"Fresh");
      return '<button type="button" class="m2-lead-row-restore" data-id="'+String(l.id||"")+'">'+
        '<b>'+escapeHtml(name)+'</b><span>'+escapeHtml(address)+'</span><em>'+escapeHtml(status)+'</em>'+
      '</button>';
    }).join("");
  }

  function escapeHtml(s){
    return String(s||"").replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]});
  }

  function showLeads(){
    document.body.classList.remove("m2-map-view","m2-settings-view");
    document.body.classList.add("m2-leads-view");
    qsa("#m2SettingsRestore").forEach(function(el){el.remove()});

    var panel=qs("#m2LeadListRestore");
    if(!panel){
      panel=document.createElement("div");
      panel.id="m2LeadListRestore";
      document.body.appendChild(panel);
    }
    panel.innerHTML=
      '<div class="m2-restore-head"><div><b>Leads</b><span>Tap a lead to open it on the map</span></div><button type="button" id="m2CloseLeadsRestore">×</button></div>'+
      '<div class="m2-lead-list-restore">'+(leadRows()||'<p class="m2-empty-restore">No leads loaded yet.</p>')+'</div>';

    qs("#m2CloseLeadsRestore").onclick=showMap;
    qsa(".m2-lead-row-restore").forEach(function(btn){
      btn.onclick=function(){
        var id=btn.dataset.id;
        showMap();
        try{
          if(id && window.openLead) window.openLead(id);
          else if(id && window.selectLead) window.selectLead(id);
          else toastSafe("Lead selected");
        }catch(e){}
      };
    });
  }

  function showSettings(){
    document.body.classList.remove("m2-map-view","m2-leads-view");
    document.body.classList.add("m2-settings-view");
    qsa("#m2LeadListRestore").forEach(function(el){el.remove()});

    var panel=qs("#m2SettingsRestore");
    if(!panel){
      panel=document.createElement("div");
      panel.id="m2SettingsRestore";
      document.body.appendChild(panel);
    }

    panel.innerHTML=
      '<div class="m2-restore-head"><div><b>Settings</b><span>Admin and cloud controls</span></div><button type="button" id="m2CloseSettingsRestore">×</button></div>'+
      '<div class="m2-settings-grid-restore">'+
        '<button type="button" id="m2SettingsAdminRestore"><span>💼</span><b>Admin</b></button>'+

<script>
/* M2 Old Settings Restored
   Restores the full old settings/admin feature flow.
   Keeps:
   - Bottom tabs visible
   - Map first
   - iPhone top spacing fix
   Removes:
   - simplified Command Center replacement
   - forced hiding of old settings/admin pages
*/
(function(){
  function qs(s){return document.querySelector(s)}
  function qsa(s){return Array.prototype.slice.call(document.querySelectorAll(s))}
  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}

  function setVars(){
    var h=(window.visualViewport&&window.visualViewport.height)||window.innerHeight||700;
    var w=(window.visualViewport&&window.visualViewport.width)||window.innerWidth||390;
    document.documentElement.style.setProperty("--m2h",h+"px");
    document.documentElement.style.setProperty("--m2w",w+"px");
    try{if(window.map&&map.invalidateSize)setTimeout(function(){map.invalidateSize(false)},100)}catch(e){}
  }

  function removeSimplifiedPanels(){
    qsa("#m2CommandCenterRestore,#m2CloudBoxRestore,#m2SettingsRestore,#m2LeadListRestore").forEach(function(el){
      if(el)el.remove();
    });
  }

  function showMap(){
    removeSimplifiedPanels();
    document.body.classList.remove("m2-settings-view","m2-command-view","m2-leads-view");
    document.body.classList.add("m2-map-view");
    qsa("#m2BottomNavRestore button").forEach(function(b){
      b.classList.toggle("active",b.dataset.tab==="map");
    });
    try{if(window.map&&map.invalidateSize)setTimeout(function(){map.invalidateSize(false)},100)}catch(e){}
  }

  function showLeadsOldSafe(){
    removeSimplifiedPanels();
    qsa("#m2BottomNavRestore button").forEach(function(b){
      b.classList.toggle("active",b.dataset.tab==="leads");
    });

    // Prefer the original app's lead/list function if present.
    var fns=["openLeadList","showLeadList","renderLeadList","m2ShowLeads","openLeads","showLeads","openList","showList"];
    for(var i=0;i<fns.length;i++){
      try{
        if(typeof window[fns[i]]==="function"){
          window[fns[i]]();
          return;
        }
      }catch(e){}
    }

    // Fallback: compact list only if original list function is not found.
    var arr=[];
    try{arr=(window.state&&Array.isArray(state.leads))?state.leads:[]}catch(e){}
    var panel=document.createElement("div");
    panel.id="m2LeadListRestore";
    panel.innerHTML='<div class="m2-restore-head"><div><b>Leads</b><span>'+arr.length+' loaded leads</span></div><button type="button" id="m2CloseLeadsRestore">×</button></div><div class="m2-lead-list-restore">'+

        var n=l.owner||l.name||(((l.first||"")+" "+(l.last||"")).trim())||"Homeowner";
        var a=l.addr||l.address||l.streetAddress||"No address";
        var s=l.status||l.disposition||"Fresh";
        return '<button type="button" class="m2-lead-row-restore" data-id="'+String(l.id||"")+'"><b>'+escapeHtml(n)+'</b><span>'+escapeHtml(a)+'</span><em>'+escapeHtml(s)+'</em></button>';
      }).join("")||'<p class="m2-empty-restore">No leads loaded yet.</p>')+'</div>';
    document.body.appendChild(panel);
    qs("#m2CloseLeadsRestore").onclick=showMap;
  }

  function escapeHtml(s){
    return String(s||"").replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]});
  }

  function showOldSettings(){
    removeSimplifiedPanels();

    qsa("#m2BottomNavRestore button").forEach(function(b){
      b.classList.toggle("active",b.dataset.tab==="settings");
    });

        '<div class="m2-old-settings-grid">'+

  }

<script id="m2-safe-cleanup-v1-js">
(function(){
  const PATCH='m2_safe_cleanup_v1';

  function safe(fn){try{return fn()}catch(e){console.warn('[M2 safe cleanup]',e)}}
  function qs(s){return document.querySelector(s)}
  function qsa(s){return Array.prototype.slice.call(document.querySelectorAll(s))}

  function setVh(){
    const h=(window.visualViewport&&visualViewport.height)||window.innerHeight||document.documentElement.clientHeight||700;
    document.documentElement.style.setProperty('--m2-vh',h+'px');
    safe(()=>{if(window.map&&map.invalidateSize)setTimeout(()=>map.invalidateSize(false),80)});
  }

  function closeMapMenus(){
    qsa('#filter-bar.open,#nbh-panel.open,.m2-field-menu.open').forEach(el=>el.classList.remove('open'));
    qs('#filter-toggle')?.classList.remove('active');
  }

  function removeDuplicateActions(){
    qsa('#m2-v2-lead-tools,#m2-lead-command').forEach(el=>el.remove());
  }

  function protectMapDefault(){
    safe(()=>{
      if(location.hash&&/stats|settings/i.test(location.hash))return;
      const stats=qs('#stats-view');
      const list=qs('#list-view');
      if(stats&&stats.classList.contains('open')&&!document.body.dataset.userOpenedStats)stats.classList.remove('open');
      if(list&&list.classList.contains('open')&&!document.body.dataset.userOpenedList)list.classList.remove('open');
      qsa('.nav-btn').forEach(btn=>{
        if(btn.dataset.view==='map')btn.classList.add('active');
        else btn.classList.remove('active');
      });
    });
  }

  function trackTabs(){
    qsa('.nav-btn').forEach(btn=>{
      if(btn.__m2SafeTracked)return;
      btn.__m2SafeTracked=true;
      btn.addEventListener('click',()=>{
        if(btn.dataset.view==='stats')document.body.dataset.userOpenedStats='1';
        if(btn.dataset.view==='list')document.body.dataset.userOpenedList='1';
      },true);
    });
  }

  function patchMap(){
    safe(()=>{
      if(!window.map||map.__m2SafeCleanup)return;
      map.on('click dragstart zoomstart movestart',closeMapMenus);
      map.__m2SafeCleanup=true;
    });
  }

  function patchOpenLead(){
    safe(()=>{
      if(typeof openLead!=='function'||openLead.__m2SafeCleanup)return;
      const old=openLead;
      window.openLead=function(id){
        const r=old.apply(this,arguments);
        setTimeout(()=>{
          removeDuplicateActions();
          const sheet=qs('#sheet');
          const body=qs('#sh-body');
          if(sheet)sheet.scrollTop=0;
          if(body)body.scrollTop=0;
        },80);
        return r;
      };
      window.openLead.__m2SafeCleanup=true;
      try{openLead=window.openLead}catch(e){}
    });
  }

  function boot(){
    setVh();
    patchMap();
    patchOpenLead();
    trackTabs();
    removeDuplicateActions();
  }

  window.addEventListener('resize',()=>setTimeout(boot,80));
  window.addEventListener('orientationchange',()=>setTimeout(boot,320));
  if(window.visualViewport){
    visualViewport.addEventListener('resize',()=>setTimeout(boot,80));
    visualViewport.addEventListener('scroll',()=>setTimeout(setVh,80));
  }
  window.addEventListener('load',()=>setTimeout(()=>{boot();protectMapDefault();},650));
  if(document.readyState!=='loading')setTimeout(()=>{boot();protectMapDefault();},650);
  document.addEventListener('click',()=>setTimeout(removeDuplicateActions,20),true);
  setInterval(()=>{removeDuplicateActions();trackTabs();},1800);
  console.log('M2 safe cleanup loaded:',PATCH);
})();
</script>

  function toast(msg,type){
    try{ if(typeof showToast==='function') return showToast(msg,type||'info'); }catch(e){}
    alert(msg);
  }

  function esc(v){
    return String(v==null?'':v).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c];
    });
  }

  function readAccount(){
    try{ if(typeof getAccountAccess==='function') return getAccountAccess() || {}; }catch(e){}
    try{ return JSON.parse(localStorage.getItem(ACCOUNT_KEY_SAFE)||'{}') || {}; }catch(e){ return {}; }
  }

  function saveAccount(acc){
    try{ if(typeof saveAccountAccess==='function') return saveAccountAccess(acc || {}); }catch(e){}
    localStorage.setItem(ACCOUNT_KEY_SAFE, JSON.stringify(acc || {}));
  }

  function saveSession(sess){
    try{ if(typeof saveCurrentSession==='function') return saveCurrentSession(sess || {}); }catch(e){}
    localStorage.setItem(SESSION_KEY_SAFE, JSON.stringify(sess || {}));

  function readSession(){

    try{ return JSON.parse(localStorage.getItem(SESSION_KEY_SAFE)||'{}') || {}; }catch(e){ return {}; }

    if(existing){
      existing.name=name.trim();
      existing.pin=pin;
      existing.territory=territory;
      existing.updated_at=new Date().toISOString();
    }else{
      acc.agents.push({id:uid(), name:name.trim(), email:email, pin:pin, territory:territory, active:true, created_at:new Date().toISOString()});
    }
    saveAccount(acc);
    toast(existing ? '✓ Agent updated' : '✓ Agent login created','success');
    rerender();
  }

  function getAgent(id){
    const acc=readAccount();
    return (acc.agents||[]).find(function(a){return String(a.id)===String(id);});
  }

  function loginAsAgent(id){
    const a=getAgent(id);
    if(!a){toast('Agent not found.','error');return;}
    saveSession({role:'agent', name:a.name, email:a.email, territory:a.territory||'', id:a.id, team_id:(readAccount().team_id||'')});
    try{
      if(typeof getSettings==='function' && typeof saveSettings==='function'){
        const s=getSettings();
        saveSettings(Object.assign({},s,{agent_name:a.name,default_territory:a.territory || s.default_territory || ''}));
      }
    }catch(e){}
    toast('✓ Using '+a.name+' agent view','success');
    rerender();
  }

  function assignFilter(id){
    const a=getAgent(id);
    if(!a){toast('Agent not found.','error');return;}
    const arr=currentFilterLeads();
    if(!arr.length){toast('No leads in the current filter.','warn');return;}
    if(!confirm('Assign '+arr.length+' currently filtered lead(s) to '+a.name+'?')) return;
    const now=new Date().toISOString();
    arr.forEach(function(l){
      l.assigned_agent=a.name;
      l.assigned_user_email=a.email || '';
      l.assigned_user_id=a.id || '';
      if(a.territory) l.territory=a.territory;
      l.updated_at=now;
    });
    saveStateSafe();
    toast('✓ Assigned '+arr.length+' leads to '+a.name,'success');
    rerender();
  }

  function assignUnassigned(id){
    const a=getAgent(id);
    if(!a){toast('Agent not found.','error');return;}
    const terr=String(a.territory||'').trim().toLowerCase();
    let arr=[];
    try{
      arr=(state.leads||[]).filter(function(l){
        if(explicitAgent(l)) return false;
        if(!terr) return true;
        const lt=String(l.territory || l.boro || l.city || '').trim().toLowerCase();
        return lt===terr || lt.includes(terr) || terr.includes(lt);
      });
    }catch(e){}
    if(!arr.length){toast('No unassigned leads found for this agent/territory.','warn');return;}
    if(!confirm('Assign '+arr.length+' unassigned lead(s) to '+a.name+'?')) return;
    const now=new Date().toISOString();
    arr.forEach(function(l){
      l.assigned_agent=a.name;
      l.assigned_user_email=a.email || '';
      l.assigned_user_id=a.id || '';
      if(a.territory) l.territory=a.territory;
      l.updated_at=now;
    });
    saveStateSafe();
    toast('✓ Assigned '+arr.length+' unassigned leads','success');
    rerender();
  }

  function deleteAgent(id){
    const a=getAgent(id);
    if(!a)return;
    if(!confirm('Delete agent login for '+a.name+'? This does not delete their leads.')) return;
    const acc=readAccount();
    acc.agents=(acc.agents||[]).filter(function(x){return String(x.id)!==String(id);});
    saveAccount(acc);
    toast('✓ Agent deleted','success');
    rerender();
  }

  function openLogin(){
    try{
      if(typeof openLoginOverlay==='function') return openLoginOverlay();
      if(typeof createLoginOverlay==='function'){ createLoginOverlay(); document.getElementById('m2-login-overlay')?.classList.add('open'); return; }
    }catch(e){}
    toast('Login screen not available on this build.','warn');
  }

  function syncAgents(){
    try{
      if(typeof syncAgentAccountsToCloud==='function') return syncAgentAccountsToCloud();
    }catch(e){toast('Sync failed: '+e.message,'error');return;}
    toast('Cloud agent sync is not available until Supabase is connected.','warn');
  }

  function loadAgents(){
    try{
      if(typeof loadAgentAccountsFromCloud==='function') return loadAgentAccountsFromCloud();
    }catch(e){toast('Load failed: '+e.message,'error');return;}
    toast('Cloud agent loading is not available until Supabase is connected.','warn');
  }

  document.addEventListener('click',function(e){
    const btn=e.target.closest('[data-m2-agent-action]');
    if(!btn)return;
    const action=btn.dataset.m2AgentAction;
    const id=btn.dataset.agentId;
    e.preventDefault();
    e.stopPropagation();

    if(action==='create') return createOrUpdateAgent();
    if(action==='open-login') return openLogin();
    if(action==='sync-agents') return syncAgents();
    if(action==='load-agents') return loadAgents();
    if(action==='login') return loginAsAgent(id);
    if(action==='assign-filter') return assignFilter(id);
    if(action==='assign-unassigned') return assignUnassigned(id);
    if(action==='delete') return deleteAgent(id);
  },true);

  function boot(){
    renderAgentSettingsCard();
  }

  window.addEventListener('load',function(){setTimeout(boot,700)});
  if(document.readyState!=='loading') setTimeout(boot,700);

  const oldRenderStats = (typeof renderStats==='function') ? renderStats : null;
  if(oldRenderStats && !oldRenderStats.__m2AgentFix){
    window.renderStats=function(){
      const r=oldRenderStats.apply(this,arguments);
      setTimeout(renderAgentSettingsCard,120);
      return r;
    };
    window.renderStats.__m2AgentFix=true;
    try{renderStats=window.renderStats}catch(e){}
  }

  setInterval(function(){
    if(document.getElementById('stats-view')) renderAgentSettingsCard();
  },3000);

  console.log('M2 Agent Login Settings fix loaded:', PATCH);
})();
</script>

<script id="m2-field-tools-clean-final-fix-v1-js">
(function(){
  const PATCH='m2_field_tools_clean_final_fix_v1';

  function toast(msg,type){
    try{ if(typeof showToast==='function') return showToast(msg,type||'info'); }catch(e){}
    try{ if(typeof showInfo==='function') return showInfo(msg,type||''); }catch(e){}
    console.log(msg);
  }

  function makeDock(){
    var main=document.querySelector('.main');
    if(!main)return;

    var old=document.getElementById('m2-field-dock');
    if(old) old.remove();

    var dock=document.createElement('div');
    dock.id='m2-field-dock';
    dock.className='m2-field-dock';
    dock.innerHTML =
      '<button class="m2-field-toggle" type="button" aria-expanded="false">⚡ Field Tools</button>'+
      '<div class="m2-field-menu" id="m2-field-menu" aria-hidden="true">'+
        '<div class="m2-field-menu-head"><b>Field Rep Tools</b><span>Closes after selection</span></div>'+
        '<div class="m2-field-grid">'+
          '<button type="button" class="gold" data-m2-field-final="today">⚡ Today Mode</button>'+
          '<button type="button" class="green" data-m2-field-final="next">🎯 Next Best</button>'+
          '<button type="button" class="blue" data-m2-field-final="locate">📍 Locate Me</button>'+
          '<button type="button" data-m2-field-final="satellite">🛰️ Satellite</button>'+
          '<button type="button" data-m2-field-final="walk">🚶 Walk Mode</button>'+
          '<button type="button" data-m2-field-final="fit">🗺️ Fit Leads</button>'+
          '<button type="button" data-m2-field-final="clear-route">🧹 Clear Route</button>'+
          '<button type="button" data-m2-field-final="add-lead">➕ Add Lead</button>'+
          '<button type="button" data-m2-field-final="load">⬇ Load Area</button>'+
        '</div>'+
      '</div>';
    main.appendChild(dock);

    var toggle=dock.querySelector('.m2-field-toggle');
    var menu=dock.querySelector('#m2-field-menu');

    toggle.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();
      var open=!menu.classList.contains('open');
      menu.classList.toggle('open',open);
      toggle.setAttribute('aria-expanded',open?'true':'false');
      menu.setAttribute('aria-hidden',open?'false':'true');
    },true);
  }

  function closeMenu(){
    var menu=document.getElementById('m2-field-menu');
    var toggle=document.querySelector('.m2-field-toggle');
    if(menu) menu.classList.remove('open');
    if(toggle) toggle.setAttribute('aria-expanded','false');
  }

  function rawLeads(){
    try{return Array.isArray(state.leads)?state.leads:[]}catch(e){return[]}
  }

  function visibleLeads(){
    try{ if(typeof filterLeads==='function') return filterLeads(rawLeads()); }catch(e){}
    return rawLeads();
  }

  function scoreLead(l){
    var s=0;
    try{s += (getLeadSunScore(l).score || 0)}catch(e){s += +(l.sun_score || 0)}
    if(['interested','callback','set','sat'].includes(l.status))s+=45;
    if(l.status==='fresh')s+=12;
    if(+l.monthly_bill>=180)s+=20;
    if(l.viability==='high')s+=14;
    if(l.hvac_opportunity && l.hvac_opportunity!=='unknown')s+=10;
    if(['closed','do_not_knock','not_interested','not_qualified'].includes(l.status))s-=999;
    return s;
  }

  function nextLead(){
    return visibleLeads().filter(function(l){
      return l && l.lat && l.lng && !['closed','do_not_knock','not_interested','not_qualified'].includes(l.status);
    }).sort(function(a,b){return scoreLead(b)-scoreLead(a)})[0] || null;
  }

  function openLeadSafe(l){
    if(!l){toast('No next lead found. Load or filter leads first.','warn');return;}
    try{ if(typeof switchView==='function') switchView('map'); }catch(e){}
    try{ if(window.map && l.lat && l.lng) map.setView([+l.lat,+l.lng],18); }catch(e){}
    setTimeout(function(){
      try{ if(typeof openLead==='function') openLead(l.id); }catch(err){toast('Could not open lead.','error');}
    },160);
  }

  function fitLeads(){
    var arr=visibleLeads().filter(function(l){return l && l.lat && l.lng});
    if(!arr.length){toast('No visible leads to fit.','warn');return;}
    try{
      if(window.L && window.map){
        map.fitBounds(L.latLngBounds(arr.map(function(l){return [+l.lat,+l.lng]})).pad(.18));
        setTimeout(function(){try{map.invalidateSize(false)}catch(e){}},80);
        toast('✓ Fit visible leads');
      }
    }catch(e){toast('Fit Leads failed.','error')}
  }

  function locateMe(){
    try{ var gps=document.getElementById('fab-gps'); if(gps){gps.click();return;} }catch(e){}
    if(!navigator.geolocation){toast('GPS not available.','warn');return;}
    navigator.geolocation.getCurrentPosition(function(pos){
      var lat=pos.coords.latitude,lng=pos.coords.longitude;
      try{ if(window.map)map.setView([lat,lng],18); if(typeof placeMyLocation==='function')placeMyLocation(lat,lng); }catch(e){}
      toast('✓ Located you');
    },function(err){toast('GPS error: '+err.message,'error')},{enableHighAccuracy:true,timeout:10000});
  }

  function setSatellite(on){
    try{
      if(typeof state==='object') state.satellite=!!on;
      if(window.map && typeof darkTiles!=='undefined' && typeof satelliteTiles!=='undefined'){
        if(on){
          try{map.removeLayer(darkTiles)}catch(e){}
          try{satelliteTiles.addTo(map)}catch(e){}
          try{ if(typeof satelliteLabels!=='undefined') satelliteLabels.addTo(map)}catch(e){}
          document.getElementById('fab-satellite')?.classList.add('active');
        }else{
          try{map.removeLayer(satelliteTiles)}catch(e){}
          try{ if(typeof satelliteLabels!=='undefined') map.removeLayer(satelliteLabels)}catch(e){}
          try{darkTiles.addTo(map)}catch(e){}
          document.getElementById('fab-satellite')?.classList.remove('active');
        }
      }
      try{ if(typeof saveState==='function')saveState(); }catch(e){}
      try{ if(typeof renderMarkers==='function')renderMarkers(); }catch(e){}
      try{ if(window.map)map.invalidateSize(false); }catch(e){}
      toast(on?'✓ Satellite on':'Satellite off');
    }catch(e){toast('Satellite failed: '+e.message,'error')}
  }

  function toggleSatellite(){
    var currently=false;
    try{currently=!!state.satellite}catch(e){}
    setSatellite(!currently);
  }

  function toggleWalk(){
    try{var route=document.getElementById('fab-route'); if(route){route.click();return;}}catch(e){}
    try{
      state.show_route=!state.show_route;
      if(typeof saveState==='function')saveState();
      if(typeof updateRoute==='function')updateRoute();
      toast(state.show_route?'✓ Walk Mode on':'Walk Mode off');
    }catch(e){toast('Walk Mode failed.','error')}
  }

  function clearRoute(){
    try{ if(typeof routePoints!=='undefined' && Array.isArray(routePoints)) routePoints.length=0; }catch(e){}
    try{
      localStorage.setItem('nyc_solar_route_'+new Date().toDateString(),'[]');
      if(typeof updateRoute==='function')updateRoute();
      toast('✓ Walk route cleared');
    }catch(e){toast('Could not clear route.','error')}
  }

  function addLead(){
    try{var create=document.getElementById('fab-create'); if(create){create.click();return;}}catch(e){}
    try{
      if(typeof enterPlacingMode==='function')enterPlacingMode();
      else if(typeof openCreateLead==='function' && window.map)openCreateLead(map.getCenter());
    }catch(e){toast('Add Lead failed.','error')}
  }

  function loadArea(){
    try{var load=document.getElementById('fab-load'); if(load){load.click();return;}}catch(e){}
    try{
      if(!window.map || typeof loadPlutoArea!=='function'){toast('Load Area is not available.','warn');return;}
      if(map.getZoom && map.getZoom()<14){toast('Zoom in closer before loading homes.','warn');return;}
      var b=map.getBounds();
      loadPlutoArea(b.getSouth(),b.getWest(),b.getNorth(),b.getEast(),'this area');
    }catch(e){toast('Load Area failed.','error')}
  }

  function todayMode(){
    try{ if(typeof switchView==='function') switchView('stats'); }catch(e){}
    try{ localStorage.setItem('m2_stats_clean_view_v1','activity'); }catch(e){}
    try{ if(typeof renderStats==='function') renderStats(); }catch(e){}
    toast('✓ Today Mode opened');
  }

  function run(action){
    closeMenu();
    if(action==='today')return todayMode();
    if(action==='next')return openLeadSafe(nextLead());
    if(action==='locate')return locateMe();
    if(action==='satellite')return toggleSatellite();
    if(action==='walk')return toggleWalk();
    if(action==='fit')return fitLeads();
    if(action==='clear-route')return clearRoute();
    if(action==='add-lead')return addLead();
    if(action==='load')return loadArea();
  }

  document.addEventListener('click',function(e){
    var btn=e.target.closest('[data-m2-field-final]');
    if(btn){
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation)e.stopImmediatePropagation();
      run(btn.dataset.m2FieldFinal);
      return false;
    }
    if(!e.target.closest('#m2-field-dock')) closeMenu();
  },true);

  function boot(){
    makeDock();
    try{ if(window.map)map.invalidateSize(false); }catch(e){}
  }

  window.addEventListener('resize',function(){setTimeout(function(){try{if(window.map)map.invalidateSize(false)}catch(e){}},120)});
  window.addEventListener('orientationchange',function(){setTimeout(function(){try{if(window.map)map.invalidateSize(false)}catch(e){}},350)});
  window.addEventListener('load',function(){setTimeout(boot,700)});
  if(document.readyState!=='loading')setTimeout(boot,700);

  console.log('M2 clean field tools final fix loaded:',PATCH);
})();
</script>
<!-- === END M2 FIELD TOOLS CLEAN FINAL FIX v1 === -->


<!-- === M2 SATELLITE HARD FIX v1 === -->
<script id="m2-satellite-hard-fix-v1-js">
(function(){
  const PATCH='m2_satellite_hard_fix_v1';
  let m2SatLayer = null;
  let m2SatLabels = null;
  let m2SatOn = false;

  function toast(msg,type){
    try{ if(typeof showToast==='function') return showToast(msg,type||'info'); }catch(e){}
    try{ if(typeof showInfo==='function') return showInfo(msg,type||''); }catch(e){}
    console.log(msg);
  }

  function getMap(){
    try{ if(typeof map !== 'undefined' && map && typeof map.addLayer === 'function') return map; }catch(e){}
    try{ if(window.map && typeof window.map.addLayer === 'function') return window.map; }catch(e){}
    return null;
  }

  function getLeaflet(){
    try{ if(typeof L !== 'undefined' && L && L.tileLayer) return L; }catch(e){}
    try{ if(window.L && window.L.tileLayer) return window.L; }catch(e){}
    return null;
  }

  function saveSatelliteState(on){
    try{
      if(typeof state === 'object' && state){
        state.satellite = !!on;
        if(typeof saveState === 'function') saveState();
      }
    }catch(e){}
    try{ localStorage.setItem('m2_force_satellite_on_v1', on ? '1' : '0'); }catch(e){}
  }

  function createLayers(){
    const LL = getLeaflet();
    if(!LL) return false;

    if(!m2SatLayer){
      m2SatLayer = LL.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        { attribution:'© Esri', maxZoom:19, crossOrigin:true }
      );
    }

    if(!m2SatLabels){
      m2SatLabels = LL.tileLayer(
        'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
        { attribution:'', maxZoom:19, subdomains:'abcd', opacity:0.86, crossOrigin:true }
      );
    }
    return true;
  }

  function updateButtons(on){
    try{ document.getElementById('fab-satellite')?.classList.toggle('active', !!on); }catch(e){}
    document.querySelectorAll('[data-m2-field-final="satellite"], [data-m2-field="satellite"]').forEach(function(btn){
      btn.classList.toggle('active', !!on);
      btn.textContent = on ? '🛰️ Satellite On' : '🛰️ Satellite';
      if(on){
        btn.style.background = '#1f6feb';
        btn.style.borderColor = '#1f6feb';
        btn.style.color = '#fff';
      }else{
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';
      }
    });
  }

  function removeOriginalSatelliteLayers(m){
    try{ if(typeof satelliteTiles !== 'undefined' && m.hasLayer(satelliteTiles)) m.removeLayer(satelliteTiles); }catch(e){}
    try{ if(typeof satelliteLabels !== 'undefined' && m.hasLayer(satelliteLabels)) m.removeLayer(satelliteLabels); }catch(e){}
  }

  function addOriginalDarkLayer(m){
    try{
      if(typeof darkTiles !== 'undefined' && !m.hasLayer(darkTiles)){
        darkTiles.addTo(m);
      }
    }catch(e){}
  }

  function removeOriginalDarkLayer(m){
    try{
      if(typeof darkTiles !== 'undefined' && m.hasLayer(darkTiles)){
        m.removeLayer(darkTiles);
      }
    }catch(e){}
  }

  window.m2ForceSatellite = function(on){
    const m = getMap();
    if(!m){ toast('Map is not ready yet. Try again in one second.','warn'); return false; }
    if(!createLayers()){ toast('Satellite layer could not load because Leaflet is not ready.','warn'); return false; }

    on = !!on;
    try{
      if(on){
        removeOriginalDarkLayer(m);
        removeOriginalSatelliteLayers(m);
        if(!m.hasLayer(m2SatLayer)) m2SatLayer.addTo(m);
        if(!m.hasLayer(m2SatLabels)) m2SatLabels.addTo(m);
        m2SatOn = true;
      }else{
        if(m.hasLayer(m2SatLayer)) m.removeLayer(m2SatLayer);
        if(m.hasLayer(m2SatLabels)) m.removeLayer(m2SatLabels);
        removeOriginalSatelliteLayers(m);
        addOriginalDarkLayer(m);
        m2SatOn = false;
      }

      saveSatelliteState(m2SatOn);
      updateButtons(m2SatOn);

      try{ if(typeof renderMarkers === 'function') renderMarkers(); }catch(e){}
      setTimeout(function(){ try{ m.invalidateSize(false); }catch(e){} },80);

      toast(m2SatOn ? '✓ Satellite mode on' : 'Satellite mode off','success');
      return true;
    }catch(err){
      console.error('M2 satellite hard fix failed',err);
      toast('Satellite failed: '+(err.message || err),'error');
      return false;
    }
  };

  window.m2ToggleSatellite = function(){
    const m = getMap();
    let currently = m2SatOn;
    try{
      currently = !!(m && m2SatLayer && m.hasLayer(m2SatLayer));
    }catch(e){
      try{ currently = !!state.satellite; }catch(_){}
    }
    return window.m2ForceSatellite(!currently);
  };

  function bindSatelliteButtons(){
    const btns = [];
    const fab = document.getElementById('fab-satellite');
    if(fab) btns.push(fab);
    document.querySelectorAll('[data-m2-field-final="satellite"], [data-m2-field="satellite"]').forEach(b=>btns.push(b));

    btns.forEach(function(btn){
      if(btn.__m2SatelliteHardFixBound) return;
      btn.__m2SatelliteHardFixBound = true;
      btn.addEventListener('click',function(e){
        e.preventDefault();
        e.stopPropagation();
        if(e.stopImmediatePropagation) e.stopImmediatePropagation();
        window.m2ToggleSatellite();
        return false;
      },true);
    });
  }

  document.addEventListener('click',function(e){
    const b = e.target.closest('[data-m2-field-final="satellite"], [data-m2-field="satellite"], #fab-satellite');
    if(!b) return;
    e.preventDefault();
    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();
    window.m2ToggleSatellite();
    return false;
  },true);

  function boot(){
    bindSatelliteButtons();
    let shouldOn = false;
    try{ shouldOn = localStorage.getItem('m2_force_satellite_on_v1') === '1' || !!state.satellite; }catch(e){}
    if(shouldOn){
      setTimeout(function(){ window.m2ForceSatellite(true); },350);
    }else{
      updateButtons(false);
    }
  }

  window.addEventListener('load',function(){ setTimeout(boot,900); });
  if(document.readyState !== 'loading') setTimeout(boot,900);
  setInterval(bindSatelliteButtons,1500);

  console.log('M2 Satellite hard fix loaded:', PATCH);
})();
</script>

<style id="m2-lead-click-reliability-fix-v1-css">
  /* Make homeowner/name markers easy to tap/click */
  .m2-owner-label,
  .m2-regrid-marker,
  .m2-house-label,
  .m2-lead-label,

    pointer-events:auto!important;

  }
  @keyframes m2ClickPulse{
    from{transform:scale(.985);filter:brightness(1.18)}
    to{transform:scale(1);filter:brightness(1)}
  }
</style>

<script id="m2-lead-click-reliability-fix-v1-js">
(function(){
  const PATCH='m2_lead_click_reliability_fix_v1';
  let lastOpenId = null;
  let lastOpenAt = 0;

  function toast(msg,type){
    try{ if(typeof showToast==='function') return showToast(msg,type||'info'); }catch(e){}
    console.log(msg);
  }

  function allLeads(){
    try{ return Array.isArray(state.leads) ? state.leads : []; }catch(e){ return []; }
  }

  function norm(v){
    return String(v==null?'':v).trim().toLowerCase();
  }

  function cleanAddr(v){
    return norm(v).replace(/[^a-z0-9]/g,'');
  }

  function leadName(l){
    return norm(((l.first||'')+' '+(l.last||'')).trim() || l.last || l.name || '');
  }

  function byId(id){
    if(!id) return null;
    id = String(id);
    return allLeads().find(function(l){ return String(l.id)===id || String(l.local_id||'')===id; }) || null;
  }

  function byText(text){
    text = norm(text);
    if(!text || text.length < 2) return null;

    const compact = cleanAddr(text);
    const leads = allLeads();

    // exact/partial owner name match
    let found = leads.find(function(l){
      const nm = leadName(l);
      return nm && (text.includes(nm) || nm.includes(text));
    });
    if(found) return found;

    // last name match for short marker labels
    found = leads.find(function(l){
      const last = norm(l.last);
      return last && last.length >= 3 && text.includes(last);
    });
    if(found) return found;

    // address match
    found = leads.find(function(l){
      const addr = cleanAddr(l.addr || l.address || '');
      return addr && compact && (compact.includes(addr) || addr.includes(compact));
    });
    if(found) return found;

    // house number + last name match
    found = leads.find(function(l){
      const addr = String(l.addr || '').trim();
      const num = (addr.match(/\d+/)||[])[0] || '';
      const last = norm(l.last);
      return num && last && text.includes(num.slice(-2)) && text.includes(last);
    });
    if(found) return found;

    return null;
  }

  function findLeadFromElement(el){
    if(!el) return null;

    const closest = el.closest && el.closest(
      '[data-lead-id], [data-id], [data-m2-open-lead], [data-phase5-open], [data-phase5-open], [data-m2-v2="open-lead"], [data-m2-stab="open-lead"], .lead-item, .m2-mini-lead, .m2-follow-card, .followup-item, .leaflet-marker-icon'
    );

    const candidates = [];
    if(closest){
      candidates.push(
        closest.dataset && closest.dataset.leadId,
        closest.dataset && closest.dataset.id,
        closest.dataset && closest.dataset.m2OpenLead,
        closest.dataset && closest.dataset.phase5Open,
        closest.dataset && closest.getAttribute('data-id'),
        closest.dataset && closest.getAttribute('data-lead-id')
      );
    }
    candidates.push(
      el.dataset && el.dataset.leadId,
      el.dataset && el.dataset.id,
      el.dataset && el.dataset.m2OpenLead,
      el.getAttribute && el.getAttribute('data-id'),
      el.getAttribute && el.getAttribute('data-lead-id')
    );

    for(const id of candidates){
      const lead = byId(id);
      if(lead) return lead;
    }

    // Leaflet marker recovery: compare clicked marker lat/lng to known markers object
    try{
      if(closest && closest.classList && closest.classList.contains('leaflet-marker-icon') && typeof markers === 'object'){
        const markerEntries = Object.entries(markers || {});
        for(const pair of markerEntries){
          const id = pair[0], marker = pair[1];
          if(marker && marker._icon === closest){
            const lead = byId(id);
            if(lead) return lead;
          }
        }
      }
    }catch(e){}

    // class/title/inner text recovery for owner labels
    const text = [
      el.textContent,
      closest && closest.textContent,
      el.title,
      closest && closest.title,
      el.getAttribute && el.getAttribute('aria-label'),
      closest && closest.getAttribute && closest.getAttribute('aria-label')
    ].filter(Boolean).join(' ');

    return byText(text);
  }

  function openLeadReliable(lead, source){
    if(!lead || !lead.id) return false;

    const now = Date.now();
    if(lastOpenId === String(lead.id) && now - lastOpenAt < 450) return true;
    lastOpenId = String(lead.id);
    lastOpenAt = now;

    try{
      if(typeof switchView === 'function') switchView('map');
    }catch(e){}

    try{
      if(typeof map !== 'undefined' && map && lead.lat && lead.lng){
        const z = (typeof map.getZoom === 'function') ? Math.max(map.getZoom(), 18) : 18;
        map.setView([+lead.lat,+lead.lng], z, {animate:false});
      }
    }catch(e){
      try{
        if(window.map && lead.lat && lead.lng) window.map.setView([+lead.lat,+lead.lng],18,{animate:false});
      }catch(_){}
    }

    function attempt(){
      try{
        if(typeof openLead === 'function'){
          openLead(lead.id);
          return true;
        }
      }catch(err){
        console.warn('openLead failed first attempt',err);
      }
      return false;
    }

    const ok = attempt();

    // Retry after map/list view finishes switching. This is the reliability piece.
    setTimeout(function(){
      try{
        const sheet = document.getElementById('sheet');
        const isOpen = sheet && sheet.classList.contains('open');
        const currentName = document.getElementById('sh-name') && document.getElementById('sh-name').textContent;
        if(!isOpen || (currentName && !norm(currentName).includes(norm(lead.last || lead.first || '').slice(0,4)))){
          attempt();
        }
      }catch(e){ attempt(); }
    },180);

    setTimeout(function(){
      try{
        const sheet = document.getElementById('sheet');
        if(sheet && !sheet.classList.contains('open')) attempt();
      }catch(e){}
    },420);

    return ok;
  }

  function handleClick(e){
    const target = e.target;
    if(!target) return;

    // Do not steal clicks from forms/buttons inside an already-open sheet unless they are lead rows.
    const interactive = target.closest && target.closest('input, textarea, select, button, a, .qd-btn, .energy-chip');
    const isLeadOpenElement = target.closest && target.closest('[data-lead-id], [data-id], [data-m2-open-lead], [data-phase5-open], .lead-item, .leaflet-marker-icon, .m2-owner-label, .m2-regrid-marker, .m2-house-label, .m2-lead-label');
    if(interactive && !isLeadOpenElement) return;

    const lead = findLeadFromElement(target);
    if(!lead) return;

    if(target.closest && target.closest('#sheet') && !target.closest('.lead-item')) return;

    e.preventDefault();
    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();

    try{
      const el = target.closest('.lead-item, .leaflet-marker-icon, .m2-owner-label, .m2-regrid-marker, .m2-house-label, .m2-lead-label') || target;
      el.classList.add('m2-click-pulse');
      setTimeout(function(){el.classList.remove('m2-click-pulse')},240);
    }catch(_){}

    openLeadReliable(lead,'event');
    return false;
  }

  function attachDatasetToMarkers(){
    try{
      if(typeof markers !== 'object') return;
      Object.entries(markers || {}).forEach(function(pair){
        const id = pair[0], marker = pair[1];
        const lead = byId(id);
        if(!lead || !marker) return;

        if(marker._icon){
          marker._icon.dataset.id = lead.id;
          marker._icon.dataset.leadId = lead.id;
          marker._icon.title = (((lead.first||'')+' '+(lead.last||'')).trim() || lead.last || lead.addr || 'Lead') + ' · ' + (lead.addr || '');
          marker._icon.style.pointerEvents = 'auto';
          marker._icon.style.cursor = 'pointer';
        }

        if(!marker.__m2ReliableClick){
          marker.__m2ReliableClick = true;
          try{
            marker.off && marker.off('click');
          }catch(e){}
          marker.on && marker.on('click',function(ev){
            try{ if(ev && ev.originalEvent){ ev.originalEvent.preventDefault(); ev.originalEvent.stopPropagation(); } }catch(e){}
            openLeadReliable(lead,'marker');
          });
        }
      });
    }catch(e){}
  }

  function patchRenderMarkers(){
    try{
      if(typeof renderMarkers !== 'function' || renderMarkers.__m2ClickReliable) return;
      const old = renderMarkers;
      window.renderMarkers = function(){
        const r = old.apply(this,arguments);
        setTimeout(attachDatasetToMarkers,80);
        return r;
      };
      window.renderMarkers.__m2ClickReliable = true;
      try{ renderMarkers = window.renderMarkers; }catch(e){}
    }catch(e){}
  }

  function patchRenderList(){
    try{
      if(typeof renderList !== 'function' || renderList.__m2ClickReliable) return;
      const old = renderList;
      window.renderList = function(){
        const r = old.apply(this,arguments);
        setTimeout(function(){
          document.querySelectorAll('.lead-item[data-id]').forEach(function(el){
            const lead = byId(el.dataset.id);
            if(lead){
              el.dataset.leadId = lead.id;
              el.style.pointerEvents='auto';
              el.style.cursor='pointer';
            }
          });
        },60);
        return r;
      };
      window.renderList.__m2ClickReliable = true;
      try{ renderList = window.renderList; }catch(e){}
    }catch(e){}
  }

  document.addEventListener('click',handleClick,true);
  document.addEventListener('touchend',function(e){
    const target = e.target;
    if(!target) return;
    const lead = findLeadFromElement(target);
    if(!lead) return;
    if(target.closest && target.closest('#sheet') && !target.closest('.lead-item')) return;
    e.preventDefault();
    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();
    openLeadReliable(lead,'touch');
    return false;
  },{capture:true,passive:false});

  function boot(){
    patchRenderMarkers();
    patchRenderList();
    attachDatasetToMarkers();
    try{ if(typeof renderMarkers === 'function') setTimeout(attachDatasetToMarkers,180); }catch(e){}
  }

  window.addEventListener('load',function(){setTimeout(boot,900)});
  if(document.readyState!=='loading') setTimeout(boot,900);
  setInterval(attachDatasetToMarkers,1200);

  console.log('M2 lead click reliability fix loaded:', PATCH);
})();
</script>

    background:#0d1117!important;
    border:1px solid #30363d!important;
    border-radius:13px!important;
    padding:10px!important;
    margin-top:8px!important;
  }
  .m2-real-agent-row .nm{font-size:13px!important;font-weight:950!important;color:#f0f6fc!important;}
  .m2-real-agent-row .meta{font-size:11px!important;color:#8b949e!important;margin-top:3px!important;}

  @media(max-width:760px){
    #m2-real-settings-panel{padding:0!important;align-items:flex-end!important;}
    .m2-real-settings-card{border-radius:24px 24px 0 0!important;max-height:92dvh!important;padding:14px!important;}
    .m2-real-tabs{grid-template-columns:repeat(2,minmax(0,1fr))!important}
    .m2-real-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}
    .m2-real-actions{grid-template-columns:repeat(2,minmax(0,1fr))!important}
    .m2-real-form{grid-template-columns:1fr!important}
    .m2-real-agent-row{grid-template-columns:1fr!important}
  }
</style>

<script id="m2-independent-settings-panel-v6-js">
(function(){
  const PATCH='m2_independent_settings_panel_v6';
  const TAB_KEY='m2_real_settings_panel_tab_v6';

  function toast(msg,type){try{if(typeof showToast==='function')return showToast(msg,type||'info')}catch(e){}console.log(msg)}
  function esc(v){try{if(typeof escapeHtml==='function')return escapeHtml(v)}catch(e){}return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function acc(){try{if(typeof getAccountAccess==='function')return getAccountAccess()||{}}catch(e){}try{return JSON.parse(localStorage.getItem('m2_account_access_v1')||'{}')}catch(e){return{}}}
  function saveAcc(data){try{if(typeof saveAccountAccess==='function')return saveAccountAccess(data)}catch(e){}try{localStorage.setItem('m2_account_access_v1',JSON.stringify(data||{}))}catch(e){}}
  function sess(){try{if(typeof getCurrentSession==='function')return getCurrentSession()||{}}catch(e){}try{return JSON.parse(localStorage.getItem('m2_current_session_v1')||'{}')}catch(e){return{}}}
  function saveSess(data){try{if(typeof saveCurrentSession==='function')return saveCurrentSession(data)}catch(e){}try{localStorage.setItem('m2_current_session_v1',JSON.stringify(data||{}))}catch(e){}}
  function settings(){try{if(typeof getSettings==='function')return getSettings()||{}}catch(e){}try{return JSON.parse(localStorage.getItem('nyc_solar_settings_v1')||'{}')}catch(e){return{}}}
  function leads(){try{return Array.isArray(state.leads)?state.leads:[]}catch(e){return[]}}
  function agents(){const a=acc();return Array.isArray(a.agents)?a.agents:[]}
  function health(){try{return JSON.parse(localStorage.getItem('m2_crm_sync_health_v1')||'{}')}catch(e){return{}}}
  function short(v){if(!v)return'Not yet';try{return new Date(v).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}catch(e){return String(v)}}

  function closeSaas(){
    if(document.body.classList.contains('m2-manual-saas-open'))return;
    document.querySelectorAll('[id*="saas" i],[class*="saas" i]').forEach(function(el){
      if(el.id==='m2-real-settings-panel')return;
      el.classList.remove('open','show','active','visible');
      el.style.display='none';
      el.style.opacity='0';
      el.style.visibility='hidden';
      el.style.pointerEvents='none';
    });
  }

  function ensurePanel(){
    let panel=document.getElementById('m2-real-settings-panel');
    if(panel)return panel;

    panel=document.createElement('div');
    panel.id='m2-real-settings-panel';
    panel.innerHTML =
      '<div class="m2-real-settings-card" role="dialog" aria-modal="true">'+
        '<div class="m2-real-settings-top">'+
          '<div><h1>Settings & Account Center</h1><p>Independent settings panel. This does not use the old broken SaaS/Stats settings path.</p></div>'+
          '<button type="button" class="m2-real-settings-close" data-m2-real-close>×</button>'+
        '</div>'+
        '<div class="m2-real-tabs">'+
          '<button type="button" data-m2-real-tab="account">Account</button>'+
          '<button type="button" data-m2-real-tab="agents">Agents</button>'+
          '<button type="button" data-m2-real-tab="manager">Manager</button>'+
          '<button type="button" data-m2-real-tab="system">System</button>'+
        '</div>'+
        '<div class="m2-real-section" data-m2-real-section="account"></div>'+
        '<div class="m2-real-section" data-m2-real-section="agents"></div>'+
        '<div class="m2-real-section" data-m2-real-section="manager"></div>'+
        '<div class="m2-real-section" data-m2-real-section="system"></div>'+
      '</div>';
    document.body.appendChild(panel);
    return panel;
  }

  function renderAccount(){
    const box=document.querySelector('[data-m2-real-section="account"]'); if(!box)return;
    const a=acc(), se=sess(), st=settings(), h=health();
    const company=a.company_name||a.crm_name||st.company_name||st.businessName||'M2 Energy CRM';
    const plan=a.plan_type||st.plan||st.plan_tier||'Trial';
    const role=se.role||'master';
    box.innerHTML =
      '<div class="m2-real-box"><h2>👑 Account Center</h2><div class="sub">Master account, cloud sync, backups, customer accounts, and team controls.</div>'+
      '<div class="m2-real-grid">'+
        '<div class="m2-real-tile"><div class="k">Company</div><div class="v">'+esc(company)+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Role</div><div class="v">'+esc(role)+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Plan</div><div class="v">'+esc(plan)+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Leads</div><div class="v">'+leads().length+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Agents</div><div class="v">'+agents().length+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Master</div><div class="v">'+esc(a.master_name||se.name||'Not set')+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Cloud</div><div class="v">'+esc(short(h.lastLeadSync||h.lastAgentSync||h.lastMasterSync))+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Backup</div><div class="v">'+esc(short(h.lastManualBackup||h.lastAutoBackup))+'</div></div>'+
      '</div>'+
      '<div class="m2-real-actions">'+
        '<button class="blue" data-m2-real-action="login">Open Login</button>'+
        '<button class="green" data-m2-real-action="sync-agents">Sync Agents</button>'+
        '<button class="purple" data-m2-real-action="sync-master">Sync Master</button>'+
        '<button class="gold" data-m2-real-action="backup">Export Backup</button>'+
      '</div></div>'+
      '<div class="m2-real-box"><h2>🏢 Customer Accounts</h2><div class="sub">Customer accounts, subscriptions, and SaaS controls are preserved. SaaS only opens when you manually click it.</div>'+
      '<div class="m2-real-actions"><button data-m2-real-action="open-saas">Open SaaS Launch Center</button><button data-m2-real-action="customer-accounts">Customer Accounts</button><button data-m2-real-action="manual-subscriptions">Manual Subscriptions</button><button data-m2-real-action="account-refresh">Refresh</button></div></div>';
  }

  function renderAgents(){
    const box=document.querySelector('[data-m2-real-section="agents"]'); if(!box)return;
    const list=agents();
    box.innerHTML =
      '<div class="m2-real-box"><h2>👥 Agent Login Settings</h2><div class="sub">Create or update rep logins.</div>'+
      '<div class="m2-real-form">'+
        '<label>Agent Name<input id="m2-real-agent-name" placeholder="Rep name"></label>'+
        '<label>Territory<input id="m2-real-agent-territory" placeholder="Queens"></label>'+
        '<label>Email / Username<input id="m2-real-agent-email" placeholder="agent@email.com"></label>'+
        '<label>PIN / Password<input id="m2-real-agent-pin" placeholder="1234"></label>'+
      '</div>'+
      '<div class="m2-real-actions"><button class="blue" data-m2-real-action="save-agent">Save Agent</button><button data-m2-real-action="login">Open Login</button><button data-m2-real-action="load-agents">Load Cloud Agents</button><button class="green" data-m2-real-action="sync-agents">Sync Agents</button></div>'+
      '<div id="m2-real-agent-list" style="margin-top:10px;">'+
        (list.length?list.map(function(a){return '<div class="m2-real-agent-row"><div><div class="nm">'+esc(a.name||'Agent')+'</div><div class="meta">'+esc(a.email||'')+' · '+esc(a.territory||'No territory')+' · PIN: '+esc(a.pin||'')+'</div></div><div><button data-m2-real-agent-login="'+esc(a.id)+'">Login View</button> <button data-m2-real-agent-delete="'+esc(a.id)+'">Delete</button></div></div>'}).join(''):'<div class="sub">No agent logins created yet.</div>')+
      '</div></div>';
  }

  function renderManager(){
    const box=document.querySelector('[data-m2-real-section="manager"]'); if(!box)return;
    box.innerHTML =
      '<div class="m2-real-box"><h2>📊 Manager Dashboard</h2><div class="sub">Quick access to manager tools without using the broken old settings route.</div>'+
      '<div class="m2-real-grid">'+
        '<div class="m2-real-tile"><div class="k">Total Leads</div><div class="v">'+leads().length+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Agents</div><div class="v">'+agents().length+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Interested</div><div class="v">'+leads().filter(l=>l.status==="interested").length+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Appointments</div><div class="v">'+leads().filter(l=>l.status==="set"||l.status==="sat").length+'</div></div>'+
      '</div>'+
      '<div class="m2-real-actions"><button data-m2-real-action="open-stats">Open Full Stats</button><button data-m2-real-action="export">Export Leads</button><button data-m2-real-action="backup">Backup</button><button data-m2-real-action="close-panel">Close</button></div></div>';
  }

  function renderSystem(){
    const box=document.querySelector('[data-m2-real-section="system"]'); if(!box)return;
    const h=health();
    box.innerHTML =
      '<div class="m2-real-box"><h2>☁️ Cloud / Backup / System</h2><div class="sub">System controls stay here and do not pop over the map unless you choose them.</div>'+
      '<div class="m2-real-grid">'+
        '<div class="m2-real-tile"><div class="k">Last Lead Sync</div><div class="v">'+esc(short(h.lastLeadSync))+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Last Agent Sync</div><div class="v">'+esc(short(h.lastAgentSync))+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Storage</div><div class="v">'+esc(localStorage.getItem("m2_storage_used_label")||"Local")+'</div></div>'+
        '<div class="m2-real-tile"><div class="k">Build</div><div class="v">v6</div></div>'+
      '</div>'+
      '<div class="m2-real-actions"><button class="green" data-m2-real-action="sync-agents">Sync Agents</button><button class="purple" data-m2-real-action="sync-master">Sync Master</button><button class="gold" data-m2-real-action="backup">Export Backup</button><button data-m2-real-action="storage-fix">Storage Fix</button></div></div>';
  }

  function setTab(tab){
    tab=tab||localStorage.getItem(TAB_KEY)||'account';
    localStorage.setItem(TAB_KEY,tab);
    document.querySelectorAll('[data-m2-real-tab]').forEach(b=>b.classList.toggle('active',b.dataset.m2RealTab===tab));
    document.querySelectorAll('[data-m2-real-section]').forEach(s=>s.classList.toggle('active',s.dataset.m2RealSection===tab));
  }

  function renderAll(){
    ensurePanel();
    renderAccount();
    renderAgents();
    renderManager();
    renderSystem();
    setTab(localStorage.getItem(TAB_KEY)||'account');
  }

  function openPanel(){
    closeSaas();
    const panel=ensurePanel();
    renderAll();
    panel.classList.add('open');
    document.body.style.overflow='hidden';
  }

  function closePanel(){
    const panel=document.getElementById('m2-real-settings-panel');
    if(panel)panel.classList.remove('open');
    document.body.style.overflow='';
  }

  function bindSettingsButtons(){
    const buttons=document.querySelectorAll('.nav-btn,button,a,[role="button"]');
    buttons.forEach(function(btn){
      const txt=(btn.textContent||'').trim().toLowerCase();
      const data=(btn.dataset&&btn.dataset.view)||'';
      if(data==='stats' || txt==='settings' || txt.includes('settings')){
        if(btn.__m2RealSettingsBound)return;
        btn.__m2RealSettingsBound=true;
        btn.addEventListener('click',function(e){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation)e.stopImmediatePropagation();
          openPanel();
          return false;
        },true);
      }
    });
  }

  document.addEventListener('click',function(e){
    const close=e.target.closest&&e.target.closest('[data-m2-real-close]');
    if(close){e.preventDefault();closePanel();return}

    if(e.target && e.target.id==='m2-real-settings-panel'){closePanel();return}

    const tab=e.target.closest&&e.target.closest('[data-m2-real-tab]');
    if(tab){e.preventDefault();setTab(tab.dataset.m2RealTab);return}

    const action=e.target.closest&&e.target.closest('[data-m2-real-action]');
    if(action){
      e.preventDefault();
      const a=action.dataset.m2RealAction;
      if(a==='login'){try{if(typeof openLoginOverlay==='function')openLoginOverlay();else toast('Login screen unavailable','warn')}catch(err){}}
      if(a==='sync-agents'){try{if(typeof syncAgentAccountsToCloud==='function')syncAgentAccountsToCloud();else toast('Cloud sync not available yet','warn')}catch(err){toast('Sync error','error')}}
      if(a==='sync-master'){try{if(typeof syncMasterAccountToCloud==='function')syncMasterAccountToCloud();else toast('Master sync not available yet','warn')}catch(err){toast('Master sync error','error')}}
      if(a==='backup'){try{if(typeof exportM2FullBackup==='function')exportM2FullBackup();else document.getElementById('export-btn')?.click()}catch(err){toast('Backup error','error')}}
      if(a==='export'){try{document.getElementById('export-btn')?.click()}catch(err){}}
      if(a==='open-stats'){closePanel();try{if(typeof switchView==='function')switchView('stats')}catch(err){}}
      if(a==='close-panel'){closePanel()}
      if(a==='open-saas'){
        document.body.classList.add('m2-manual-saas-open');
        document.querySelectorAll('[id*="saas" i],[class*="saas" i]').forEach(function(el){el.style.display='';el.style.visibility='';el.style.opacity='';el.style.pointerEvents='';});
        try{ if(typeof openSaasLaunchCenter==='function') openSaasLaunchCenter(); }catch(err){toast('SaaS center is available in the original settings only.','warn')}
      }
      if(a==='customer-accounts'){setTab('account');toast('Customer Accounts section is preserved below when available.','info')}
      if(a==='manual-subscriptions'){setTab('account');toast('Manual Subscriptions section is preserved below when available.','info')}
      if(a==='storage-fix'){try{if(typeof runStorageRepair==='function')runStorageRepair();else toast('Storage check complete','success')}catch(err){}}
      if(a==='load-agents'){try{if(typeof loadAgentAccountsFromCloud==='function')loadAgentAccountsFromCloud();else toast('Cloud agent load not available yet','warn')}catch(err){}}
      if(a==='account-refresh'){renderAll();toast('Account Center refreshed','success')}
      if(a==='save-agent'){
        const name=document.getElementById('m2-real-agent-name')?.value.trim()||'';
        const territory=document.getElementById('m2-real-agent-territory')?.value.trim()||'';
        const email=document.getElementById('m2-real-agent-email')?.value.trim().toLowerCase()||'';
        const pin=document.getElementById('m2-real-agent-pin')?.value.trim()||'';
        if(!name||!email||!pin){alert('Agent name, email/username, and PIN are required.');return}
        const data=acc();data.agents=Array.isArray(data.agents)?data.agents:[];
        const existing=data.agents.find(x=>String(x.email||'').toLowerCase()===email);
        if(existing){existing.name=name;existing.email=email;existing.pin=pin;existing.territory=territory;existing.updated_at=new Date().toISOString()}
        else data.agents.push({id:'a_'+Date.now(),name,email,pin,territory,created_at:new Date().toISOString()});
        saveAcc(data);toast(existing?'✓ Agent updated':'✓ Agent created','success');renderAll();setTab('agents');
      }
      return;
    }

    const login=e.target.closest&&e.target.closest('[data-m2-real-agent-login]');
    if(login){
      const id=login.dataset.m2RealAgentLogin;
      const a=agents().find(x=>String(x.id)===String(id));
      if(a){saveSess({role:'agent',name:a.name,email:a.email,territory:a.territory||'',id:a.id});toast('✓ Using agent account','success');renderAll();setTab('agents')}
      return;
    }

    const del=e.target.closest&&e.target.closest('[data-m2-real-agent-delete]');
    if(del){
      const id=del.dataset.m2RealAgentDelete;
      const data=acc();data.agents=(data.agents||[]).filter(x=>String(x.id)!==String(id));
      saveAcc(data);toast('Agent removed','success');renderAll();setTab('agents');
      return;
    }

    const btn=e.target.closest&&e.target.closest('button,a,[role="button"]');
    if(btn){
      const txt=(btn.textContent||'').toLowerCase();
      const id=(btn.id||'').toLowerCase();
      if((txt==='settings'||txt.includes('settings')) && !btn.closest('#m2-real-settings-panel')){
        e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();openPanel();return false;
      }
      if(txt.includes('saas')||txt.includes('launch center')||id.includes('saas')){
        document.body.classList.add('m2-manual-saas-open');
      }
    }
  },true);

  function boot(){
    try{localStorage.setItem('m2_saas_launch_autoload','0');localStorage.removeItem('m2_saas_setup_open');localStorage.removeItem('m2_show_saas_launch')}catch(e){}
    document.body.classList.remove('m2-manual-saas-open');
    closeSaas();
    ensurePanel();
    bindSettingsButtons();
  }

  window.addEventListener('load',function(){setTimeout(boot,250);setTimeout(boot,900);setTimeout(closeSaas,1600)});
  if(document.readyState!=='loading'){setTimeout(boot,250);setTimeout(boot,900)}
  setInterval(function(){bindSettingsButtons();closeSaas()},1200);
  console.log('M2 independent settings panel loaded:',PATCH);
})();
</script>
<!-- === END M2 INDEPENDENT SETTINGS PANEL v6 - BYPASS OLD SETTINGS === -->

</body>
</html>
