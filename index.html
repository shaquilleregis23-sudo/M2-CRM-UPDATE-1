<style>
:root{--bg:#06121f;--panel:#0b1b2d;--panel2:#10283d;--card:#0f2236;--muted:#8fb0bf;--text:#ecfbff;--line:rgba(255,255,255,.1);--teal:#42ffd0;--teal2:#21c9a8;--sun:#ffc72c;--hot:#ff5c8a;--blue:#62a8ff;--good:#42ffd0;--bad:#ff6b6b;--shadow:0 18px 55px rgba(0,0,0,.38);--radius:22px;--bottom:78px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden} button,input,select,textarea{font:inherit} button{cursor:pointer;border:0}.app{height:100%;display:flex;flex-direction:column;background:radial-gradient(circle at 12% 8%,rgba(66,255,208,.16),transparent 30%),radial-gradient(circle at 88% 10%,rgba(255,199,44,.13),transparent 32%),linear-gradient(180deg,#06121f,#071827 58%,#04111b)}
.topbar{height:74px;padding:12px 14px calc(8px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);background:rgba(6,18,31,.9);backdrop-filter:blur(16px);z-index:40}.brandIcon{width:45px;height:45px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--sun));color:#06121f;display:grid;place-items:center;font-weight:900;font-size:22px;box-shadow:0 10px 25px rgba(66,255,208,.18)}.brandTitle{font-size:17px;font-weight:900;line-height:1.05}.brandSub{font-size:12px;color:var(--muted);margin-top:3px}.topActions{margin-left:auto;display:flex;gap:8px;align-items:center}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:999px;padding:8px 10px;color:var(--text);font-size:12px}.demoBadge{background:rgba(255,199,44,.18);border-color:rgba(255,199,44,.35);color:#fff2ba}.view{display:none;min-height:0;flex:1;overflow:auto;padding:12px 12px calc(var(--bottom) + env(safe-area-inset-bottom));}.view.active{display:block}.mapView{padding:0;position:relative}.mapWrap{height:100%;position:relative}.map{height:100%;width:100%;background:#071827}.mapOverlay{position:absolute;z-index:500;left:12px;right:12px;top:12px;display:flex;gap:8px;flex-wrap:wrap;pointer-events:none}.mapOverlay>*{pointer-events:auto}.mapTools{position:absolute;right:12px;top:92px;z-index:501;display:grid;gap:8px}.mapBtn,.smallBtn,.primaryBtn,.ghostBtn,.dangerBtn,.sunBtn{border-radius:16px;padding:10px 12px;font-weight:800;color:var(--text);background:rgba(11,27,45,.88);border:1px solid var(--line);box-shadow:0 10px 28px rgba(0,0,0,.23);backdrop-filter:blur(12px)}.mapBtn{width:48px;height:48px;padding:0;font-size:20px}.primaryBtn{background:linear-gradient(135deg,var(--teal),#24d7b5);color:#03171d;border:0}.sunBtn{background:linear-gradient(135deg,var(--sun),#ffe480);color:#291d00;border:0}.dangerBtn{background:rgba(255,107,107,.14);border-color:rgba(255,107,107,.34);color:#ffd7d7}.ghostBtn:hover,.smallBtn:hover,.mapBtn:hover{border-color:rgba(66,255,208,.5)}.bottomNav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--bottom) + env(safe-area-inset-bottom));padding:8px 8px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:rgba(6,18,31,.92);border-top:1px solid var(--line);backdrop-filter:blur(18px);z-index:80}.navBtn{border-radius:18px;background:transparent;color:var(--muted);font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.navBtn b{font-size:20px}.navBtn.active{background:rgba(66,255,208,.13);color:var(--teal);border:1px solid rgba(66,255,208,.24)}.card{background:linear-gradient(180deg,rgba(16,40,61,.9),rgba(9,24,39,.94));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.cardTitle{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:900;margin:0 0 9px}.muted{color:var(--muted)}.grid{display:grid;gap:10px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.stat{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:18px;padding:13px}.stat .num{font-size:25px;font-weight:950}.stat .lab{font-size:12px;color:var(--muted);margin-top:3px}.input,.select,.textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);border-radius:16px;padding:12px;outline:none}.textarea{min-height:90px;resize:vertical}.input:focus,.select:focus,.textarea:focus{border-color:rgba(66,255,208,.55);box-shadow:0 0 0 3px rgba(66,255,208,.08)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.between{display:flex;align-items:center;justify-content:space-between;gap:10px}.filters{display:flex;gap:8px;overflow:auto;padding:4px 0 10px}.filterBtn{white-space:nowrap;border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);font-weight:800}.filterBtn.active{background:rgba(66,255,208,.15);color:var(--teal);border-color:rgba(66,255,208,.35)}.leadItem{padding:12px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.055);margin-bottom:9px}.leadItem h4{margin:0 0 5px;font-size:16px}.tag{display:inline-flex;align-items:center;gap:4px;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid var(--line);font-size:11px;color:var(--muted);font-weight:800}.tag.sun{background:rgba(255,199,44,.15);color:#ffe596;border-color:rgba(255,199,44,.35)}.tag.hot{background:rgba(255,92,138,.13);color:#ffc0d1;border-color:rgba(255,92,138,.35)}.tag.good{background:rgba(66,255,208,.13);color:var(--teal);border-color:rgba(66,255,208,.35)}.statsShell{display:grid;gap:12px}.statsMenu{overflow:hidden;transition:max-height .28s ease,opacity .2s ease;max-height:900px;opacity:1}.statsMenu.collapsed{max-height:0;opacity:0;margin:0;padding:0;border:0}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tabBtn{border-radius:16px;padding:12px 8px;background:rgba(255,255,255,.055);border:1px solid var(--line);color:var(--text);font-weight:900}.tabBtn.active{background:rgba(66,255,208,.14);border-color:rgba(66,255,208,.4);color:var(--teal)}.quickSwitch{position:sticky;top:0;z-index:20;background:rgba(6,18,31,.86);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:20px;padding:8px;display:flex;gap:7px;overflow:auto;margin-bottom:12px}.quickSwitch button{white-space:nowrap;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--text);padding:9px 12px;font-size:12px;font-weight:900}.modalBack{position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:16px}.modalBack.show{display:flex}.modal{width:min(720px,100%);max-height:88vh;overflow:auto;background:linear-gradient(180deg,#10283d,#071827);border:1px solid rgba(255,255,255,.16);border-radius:30px;box-shadow:0 25px 90px rgba(0,0,0,.55);padding:18px}.modalHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.modalHead h2{margin:0}.xBtn{width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.09);color:var(--text);font-weight:900}.leadSheet{position:fixed;left:0;right:0;bottom:0;z-index:110;transform:translateY(105%);transition:transform .28s cubic-bezier(.2,.9,.25,1);background:linear-gradient(180deg,#10283d,#06121f);border-top:1px solid rgba(255,255,255,.14);box-shadow:0 -18px 70px rgba(0,0,0,.5);border-radius:28px 28px 0 0;max-height:86vh;display:flex;flex-direction:column}.leadSheet.show{transform:translateY(0)}.handle{width:58px;height:5px;border-radius:99px;background:rgba(255,255,255,.28);margin:10px auto}.sheetBody{overflow:auto;padding:0 14px calc(18px + env(safe-area-inset-bottom))}.toastWrap{position:fixed;left:12px;right:12px;top:88px;z-index:200;display:grid;gap:8px;pointer-events:none}.toast{pointer-events:auto;border-radius:18px;padding:12px 13px;border:1px solid var(--line);background:rgba(11,27,45,.95);box-shadow:var(--shadow);font-weight:800}.toast.success{border-color:rgba(66,255,208,.4)}.toast.error{border-color:rgba(255,107,107,.45)}.toast.warning{border-color:rgba(255,199,44,.45)}.sunMarker,.hotMarker,.dotMarker{display:grid;place-items:center;border-radius:999px;border:2px solid #fff;box-shadow:0 6px 18px rgba(0,0,0,.35);font-weight:900}.sunMarker{width:34px;height:34px;background:var(--sun);color:#3c2900}.hotMarker{width:30px;height:30px;background:var(--hot)}.dotMarker{width:24px;height:24px;background:var(--teal);color:#06121f}.hiddenFile{display:none}.walkOn{animation:pulse 1.2s infinite}@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(66,255,208,.45)}50%{box-shadow:0 0 0 9px rgba(66,255,208,0)}}@media(min-width:850px){.app{max-width:1200px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}.view{padding:18px 18px 95px}.gridDesk2{display:grid;grid-template-columns:1.05fr .95fr;gap:14px}.bottomNav{left:50%;transform:translateX(-50%);max-width:1200px}.mapTools{right:20px}.tabs{grid-template-columns:repeat(7,1fr)}}
</style>

<div class="app">
  <header class="topbar">
    <div class="brandIcon" id="brandIcon">M2</div>
    <div><div class="brandTitle" id="brandTitle">M2 Energy CRM</div><div class="brandSub" id="brandSub">Trial • Current session: Guest</div></div>
    <div class="topActions"><span id="demoBadge" class="pill demoBadge" style="display:none">DEMO MODE</span><button class="pill" data-action="open-launch">Login</button></div>
  </header>
  <main id="mapView" class="view mapView active"><div class="mapWrap"><div id="map" class="map"></div><div class="mapOverlay"><input id="searchInput" class="input" style="max-width:320px" placeholder="Search name, address, phone..." data-action="search-input"/><button class="smallBtn" data-action="open-launch">Launch</button><button class="smallBtn" data-action="load-demo">Load Demo</button></div><div class="mapTools"><button class="mapBtn" data-action="toggle-satellite" title="Satellite">🛰️</button><button class="mapBtn" data-action="toggle-walk" title="Walk Mode">🚶</button><button class="mapBtn" data-action="locate-me" title="Locate Me">📍</button><button class="mapBtn" data-action="clear-route" title="Clear Route">🧹</button><button class="mapBtn" data-action="fit-leads" title="Fit Leads">🎯</button></div></div></main>
  <main id="leadsView" class="view"><div class="card"><div class="between"><h2 class="cardTitle">🏠 Leads</h2><button class="primaryBtn" data-action="add-lead">+ Add Lead</button></div><div class="filters" id="filterBar"></div><input id="leadSearch" class="input" placeholder="Search leads..." /></div><div id="leadList"></div></main>
  <main id="statsView" class="view"></main>
  <main id="followView" class="view"><div class="card"><h2 class="cardTitle">📞 Follow-ups</h2><p class="muted">Today’s callbacks, appointments, and hot follow-up opportunities.</p></div><div id="followList"></div></main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
'use strict';
const STORE='m2_crm_state', SETTINGS='m2_crm_settings', SESSION='m2_crm_session', AGENTS='m2_crm_agents', BACKUP='m2_crm_last_auto_backup';
let map, baseLayer, satLayer, markersLayer, routeLayer, watchId=null, currentTab='overview', statsMenuOpen=true, selectedLeadId=null, guidedStep=0;
const filters=['all','new','hot','callback','appointment','closed','not interested','high sun','solar opportunity','hvac opportunity','mini split','boiler','assigned to me','unassigned'];
const state={leads:[],filter:'all',search:'',walkMode:false,satellite:false,route:[],team:{id:'team_m2_demo',name:'M2 Energy CRM'}};
let settings={businessName:'M2 Energy CRM',logoText:'M2',ownerName:'Shaquille',supportEmail:'',mainTerritory:'Queens / Long Island',defaultSource:'Door Knock',defaultAgentView:'assigned',autoSyncReminder:true,backupReminder:true,showDemoTools:true,showAdminTools:true,plan:'Trial',trialEnds:addDays(new Date(),14).toISOString(),supabaseUrl:'https://cghblukwgsqqwedlzmgh.supabase.co',supabaseKey:'sb_publishable_btkoyC4o37GZNUOFMKtasQ_KmLIrUVb'};
let session={role:'guest',name:'Guest',email:'',id:''};
let agents=[];
function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function uid(p='id'){return p+'_'+Math.random().toString(36).slice(2,9)+'_'+Date.now().toString(36)}
function save(){localStorage.setItem(STORE,JSON.stringify(state));localStorage.setItem(SETTINGS,JSON.stringify(settings));localStorage.setItem(SESSION,JSON.stringify(session));localStorage.setItem(AGENTS,JSON.stringify(agents));}
function load(){try{Object.assign(state,JSON.parse(localStorage.getItem(STORE)||'{}'));settings=Object.assign(settings,JSON.parse(localStorage.getItem(SETTINGS)||'{}'));session=Object.assign(session,JSON.parse(localStorage.getItem(SESSION)||'{}'));agents=JSON.parse(localStorage.getItem(AGENTS)||'[]')||[]}catch(e){console.warn(e)}}
function toast(msg,type='info'){const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;$('toastWrap').appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(-6px)'},2600);setTimeout(()=>t.remove(),3100)}
function role(){return session.role||'guest'} function isMaster(){return role()==='master'||role()==='demo'}
function visibleLeads(list=state.leads){if(role()!=='agent')return list;const email=(session.email||'').toLowerCase(), id=session.id;return list.filter(l=>(l.assigned_user_email||'').toLowerCase()===email||l.assigned_user_id===id||(l.assigned_agent||'').toLowerCase()===(session.name||'').toLowerCase())}
function leadName(l){return ((l.first||'')+' '+(l.last||'')).trim()||'Unnamed Lead'} function leadAddr(l){return [l.addr,l.city,l.zip].filter(Boolean).join(', ')}
function calcSunScore(l){let s=42; const notes=(l.roof_notes||l.notes||'').toLowerCase(), solar=(l.solar_status||'').toLowerCase(); const bill=Number(l.monthly_bill||0), units=Number(l.units||1), lot=Number(l.lot_sqft||0), vi=Number(l.viability||0); if(solar.includes('already'))s-=45; if(solar.includes('no solar')||solar==='unknown'||!solar)s+=12; if(solar.includes('interested'))s+=16; if(bill>=250)s+=20; else if(bill>=150)s+=13; else if(bill>=90)s+=7; if(notes.match(/good|new|south|sun|clear|flat|open/))s+=12; if(notes.match(/shade|tree|bad|old|blocked|north|repair/))s-=18; if(lot>=3000)s+=8; if(units<=2)s+=7; if(vi>=80)s+=8; else if(vi>=60)s+=4; if(String(l.hvac_opportunity||'').toLowerCase().includes('yes'))s+=3; s=Math.max(0,Math.min(100,Math.round(s))); l.sun_score=s; l.sun_level=s>=75?'High':s>=50?'Medium':'Low'; l.solar_priority=s>=75?'High':s>=50?'Medium':'Low'; return s}
function ensureScores(){state.leads.forEach(l=>{if(l.sun_score==null)calcSunScore(l)})}
function filteredLeads(){ensureScores();let arr=visibleLeads(state.leads);const f=state.filter;const q=(state.search||'').toLowerCase(); if(f&&f!=='all'){arr=arr.filter(l=>{const st=(l.status||'new').toLowerCase(); const hv=(l.hvac_opportunity||'').toLowerCase(); if(f==='high sun')return Number(l.sun_score)>=75; if(f==='solar opportunity')return !String(l.solar_status||'').toLowerCase().includes('already')&&Number(l.sun_score)>=55; if(f==='hvac opportunity')return hv.includes('yes')||hv.includes('hvac'); if(f==='mini split')return hv.includes('mini'); if(f==='boiler')return hv.includes('boiler')||String(l.heating_type||'').toLowerCase().includes('oil'); if(f==='assigned to me')return !!l.assigned_agent; if(f==='unassigned')return !l.assigned_agent; return st===f;})} if(q){arr=arr.filter(l=>(leadName(l)+' '+leadAddr(l)+' '+(l.phone||'')+' '+(l.email||'')).toLowerCase().includes(q))} return arr}
function initMap(){if(!window.L){$('map').innerHTML='<div class="card" style="margin:20px">Map library not loaded. Check internet connection.</div>';return} map=L.map('map',{zoomControl:false}).setView([40.7128,-74.0060],11); baseLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OSM'}).addTo(map); satLayer=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,attribution:'© Esri'}); markersLayer=L.layerGroup().addTo(map); routeLayer=L.polyline([], {color:'#42ffd0',weight:4,opacity:.9}).addTo(map);}
function markerIcon(l){const score=Number(l.sun_score||0), st=(l.status||'').toLowerCase(); if(score>=75)return L.divIcon({className:'',html:'<div class="sunMarker">☀</div>',iconSize:[34,34],iconAnchor:[17,17]}); if(st==='hot')return L.divIcon({className:'',html:'<div class="hotMarker">🔥</div>',iconSize:[30,30],iconAnchor:[15,15]}); return L.divIcon({className:'',html:'<div class="dotMarker">•</div>',iconSize:[24,24],iconAnchor:[12,12]});}
function renderMarkers(){if(!markersLayer)return;markersLayer.clearLayers(); filteredLeads().forEach(l=>{if(!l.lat||!l.lng)return; const m=L.marker([l.lat,l.lng],{icon:markerIcon(l)}).addTo(markersLayer); m.on('click',()=>openLead(l.id));}); if(routeLayer)routeLayer.setLatLngs(state.route||[])}
function fitLeads(){const pts=filteredLeads().filter(l=>l.lat&&l.lng).map(l=>[l.lat,l.lng]); if(!pts.length)return toast('No visible leads to fit','warning'); map.fitBounds(pts,{padding:[40,40]})}
function toggleSatellite(){if(!map)return;state.satellite=!state.satellite;if(state.satellite){map.removeLayer(baseLayer);satLayer.addTo(map)}else{map.removeLayer(satLayer);baseLayer.addTo(map)}save();toast(state.satellite?'Satellite mode on':'Street map on','success')}
function toggleWalk(){state.walkMode=!state.walkMode;save();toast(state.walkMode?'Walk Mode on. Locate me to start route.':'Walk Mode off',state.walkMode?'success':'info')}
function locateMe(){if(!navigator.geolocation)return toast('Location not available','error');navigator.geolocation.getCurrentPosition(pos=>{const ll=[pos.coords.latitude,pos.coords.longitude];map.setView(ll,17); if(state.walkMode){state.route=state.route||[];state.route.push(ll);routeLayer.setLatLngs(state.route);save()} toast('Location found','success')},err=>toast('Location error: '+err.message,'error'),{enableHighAccuracy:true,timeout:10000})}
function clearRoute(){state.route=[];if(routeLayer)routeLayer.setLatLngs([]);save();toast('Route cleared','success')}
function renderBrand(){ $('brandIcon').textContent=settings.logoText||'M2'; $('brandTitle').textContent=settings.businessName||'M2 Energy CRM'; $('brandSub').textContent=`${settings.plan||'Trial'} • Current session: ${session.name||'Guest'} — ${(session.role||'guest').toUpperCase()}`; $('demoBadge').style.display=session.role==='demo'?'inline-flex':'none'}
function renderFilterBar(){const el=$('filterBar'); if(!el)return;el.innerHTML=filters.map(f=>`<button class="filterBtn ${state.filter===f?'active':''}" data-action="set-filter" data-filter="${esc(f)}">${esc(label(f))}</button>`).join('')}
function label(f){return f.split(' ').map(w=>w[0]?.toUpperCase()+w.slice(1)).join(' ')}
function renderLeads(){renderFilterBar(); const list=$('leadList'); if(!list)return; const arr=filteredLeads(); list.innerHTML=arr.length?arr.map(l=>leadItemHtml(l)).join(''):'<div class="card muted">No leads in this view.</div>'; renderMarkers(); renderFollowups();}
function leadItemHtml(l){return `<div class="leadItem" data-action="open-lead" data-id="${esc(l.id)}"><div class="between"><h4>${esc(leadName(l))}</h4><span class="tag ${Number(l.sun_score)>=75?'sun':''}">☀ ${l.sun_score??'-'}</span></div><div class="muted" style="font-size:13px">${esc(leadAddr(l))}</div><div class="row" style="margin-top:8px"><span class="tag ${l.status==='hot'?'hot':''}">${esc(label(l.status||'new'))}</span><span class="tag">${esc(l.territory||'No territory')}</span>${l.assigned_agent?`<span class="tag good">👤 ${esc(l.assigned_agent)}</span>`:'<span class="tag">Unassigned</span>'}</div></div>`}
function openLead(id){const l=state.leads.find(x=>x.id===id); if(!l)return; selectedLeadId=id; calcSunScore(l); const body=$('sheetBody'); body.scrollTop=0; body.innerHTML=`<div class="between"><h2>${esc(leadName(l))}</h2><button class="xBtn" data-action="close-lead">×</button></div><p class="muted">${esc(leadAddr(l))}</p><div class="grid3"><div class="stat"><div class="num">☀ ${l.sun_score}</div><div class="lab">Sun Score</div></div><div class="stat"><div class="num">${esc(l.sun_level)}</div><div class="lab">Sun Level</div></div><div class="stat"><div class="num">$${esc(l.monthly_bill||0)}</div><div class="lab">Monthly Bill</div></div></div><div class="grid2" style="margin-top:12px"><label>Status<select class="select" id="lead_status">${['new','hot','callback','appointment','closed','not interested'].map(s=>`<option ${l.status===s?'selected':''} value="${s}">${label(s)}</option>`).join('')}</select></label><label>Solar Status<input class="input" id="lead_solar" value="${esc(l.solar_status||'Unknown')}"></label><label>Heating Type<input class="input" id="lead_heat" value="${esc(l.heating_type||'Unknown')}"></label><label>Monthly Bill<input class="input" id="lead_bill" type="number" value="${esc(l.monthly_bill||0)}"></label><label>Callback Due<input class="input" id="lead_callback" type="datetime-local" value="${esc(toLocalDateTime(l.callback_due))}"></label><label>Appointment<input class="input" id="lead_appt" type="datetime-local" value="${esc(toLocalDateTime(l.appt_time))}"></label><label>Assigned Closer<input class="input" id="lead_closer" value="${esc(l.assigned_closer||'')}"></label><label>Outcome<input class="input" id="lead_outcome" value="${esc(l.appt_outcome||'')}"></label></div><label style="display:block;margin-top:10px">Roof Notes<textarea class="textarea" id="lead_roof">${esc(l.roof_notes||'')}</textarea></label><label style="display:block;margin-top:10px">Notes<textarea class="textarea" id="lead_notes">${esc(l.notes||'')}</textarea></label><div class=" function toLocalDateTime(v){if(!v)return'';try{const d=new Date(v);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}catch{return''}}
function saveLead(){const l=state.leads.find(x=>x.id===selectedLeadId); if(!l)return; l.status=$('lead_status').value; l.solar_status=$('lead_solar').value; l.heating_type=$('lead_heat').value; l.monthly_bill=Number($('lead_bill').value||0); l.callback_due=$('lead_callback').value?new Date($('lead_callback').value).toISOString():''; l.appt_time=$('lead_appt').value?new Date($('lead_appt').value).toISOString():''; l.assigned_closer=$('lead_closer').value; l.appt_outcome=$('lead_outcome').value; l.roof_notes=$('lead_roof').value; l.notes=$('lead_notes').value; l.updated_at=new Date().toISOString(); calcSunScore(l); save(); renderAll(); toast('Lead saved','success'); openLead(l.id)}
function renderStats(){const el=$('statsView'); const total=visibleLeads(state.leads), high=total.filter(l=>Number(l.sun_score)>=75), hot=total.filter(l=>l.status==='hot'), fu=total.filter(l=>l.callback_due), appt=total.filter(l=>l.appt_time), assigned=total.filter(l=>l.assigned_agent), closed=total.filter(l=>l.status==='closed'); el.innerHTML=`<div class="quickSwitch"><button data-action="open-stats-menu">☰ Stats Menu</button>${['overview','activity','team','settings','admin','sell','all'].map(t=>`<button data-action="stats-tab" data-tab="${t}">${label(t==='sell'?'sell crm':t)}</button>`).join('')}<button data-action="export-backup">Backup</button></div><div id="statsMenu" class="card statsMenu ${statsMenuOpen?'':'collapsed'}"><div class="between"><h2 class="cardTitle">📊 CRM Command Center</h2><button class="ghostBtn" data-action="close-stats-menu">Collapse</button></div><div class="tabs">${['overview','activity','team','settings','admin','sell','all'].map(t=>`<button class="tabBtn ${currentTab===t?'active':''}" data-action="stats-tab" data-tab="${t}">${label(t==='sell'?'sell crm':t)}</button>`).join('')}</div></div><div id="statsContent">${statsSection(currentTab,{total,high,hot,fu,appt,assigned,closed})}</div>`}
function statsSection(tab,c){if(tab==='all')return ['overview','activity','team','settings','admin','sell'].map(t=>statsSection(t,c)).join(''); if(tab==='overview')return `<div class="card"><h2 class="cardTitle">📈 Overview</h2><div class="grid3"><div class="stat"><div class="num">${c.total.length}</div><div class="lab">Total Leads</div></div><div class="stat"><div class="num">${c.hot.length}</div><div class="lab">Hot Leads</div></div><div class="stat"><div class="num">${c.high.length}</div><div class="lab">High Sun</div></div><div class="stat"><div class="num">${c.fu.length}</div><div class="lab">Follow-ups</div></div><div class="stat"><div class="num">${c.appt.length}</div><div class="lab">Appointments</div></div><div class="stat"><div class="num">${c.closed.length}</div><div class="lab">Closed</div></div></div></div>${topLeadsCard()}`; if(tab==='activity')return `<div class="card"><h2 class="cardTitle">✅ Activity</h2><div class="grid"><label><input type="checkbox"> 25 conversations today</label><label><input type="checkbox"> Follow up hot leads</label><label><input type="checkbox"> Assign new leads</label><label><input type="checkbox"> Export backup</label></div></div>${followCard()}`; if(tab==='team')return teamSection(); if(tab==='settings')return settingsSection(); if(tab==='admin')return adminSection(); if(tab==='sell')return sellSection(); return ''}

function demoLeads(){const base=[['Alicia','Brown','125-10 Linden Blvd','Queens','11420',40.668,-73.822,280,'No Solar','Gas','Yes - mini split','hot','Good south roof, clear sun'],['Marcus','Lee','222-15 Merrick Blvd','Queens','11413',40.683,-73.752,190,'Unknown','Oil','Boiler replacement','callback','Some trees in back'],['Nina','Patel','88-20 179th St','Jamaica','11432',40.708,-73.784,330,'Interested','Gas','Yes','appointment','Open roof, high sun'],['Robert','King','31-12 45th Ave','Long Island City','11101',40.745,-73.943,160,'Already Has Solar','Electric','No','new','Already has panels'],['Denise','Carter','45 Maple Ave','Hempstead','11550',40.706,-73.619,245,'No Solar','Oil','Mini split + boiler','hot','Large roof clear']];let out=[];for(let i=0;i<18;i++){const b=base[i%base.length];out.push({id:uid('lead'),first:b[0],last:b[1],addr:b[2],city:b[3],zip:b[4],lat:b[5]+(Math.random()-.5)*.06,lng:b[6]+(Math.random()-.5)*.06,monthly_bill:b[7]+i*8,solar_status:b[8],heating_type:b[9],hvac_opportunity:b[10],status:b[11],roof_notes:b[12],territory:i%2?'Queens':'Long Island',source:'Demo',phone:'555-010'+(i%10),email:`demo${i}@m2crm.com`,units:i%3+1,lot_sqft:2500+i*120,viability:60+i%35,team_id:'demo_team',owner_id:'demo_master',callback_due:i%4===0?addDays(new Date(),i%3).toISOString():'',appt_time:i%5===0?addDays(new Date(),1).toISOString():''})}return out}

function exportLeads(){download('m2-crm-leads.json',JSON.stringify(state.leads,null,2))} function exportAgents(){download('m2-crm-agents.json',JSON.stringify(agents,null,2))}
function download(name,txt){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'application/json'}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function importBackup(){$('importFile').click()} $('importFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{autoBackup();const data=JSON.parse(r.result); if(!confirm('Import backup and replace current local data? Auto-backup created.'))return; if(data.state)Object.assign(state,data.state); if(data.settings)settings=Object.assign(settings,data.settings); if(data.session)session=Object.assign(session,data.session); if(data.agents)agents=data.agents; save();renderAll();toast('Backup imported','success')}catch(err){toast('Import error: '+err.message,'error')}};r.readAsText(f);e.target.value=''});
function restoreBackup(){const raw=localStorage.getItem(BACKUP);if(!raw)return toast('No auto-backup found','warning');const data=JSON.parse(raw);Object.assign(state,data.state||{});settings=Object.assign(settings,data.settings||{});session=Object.assign(session,data.session||{});agents=data.agents||[];save();renderAll();toast('Auto-backup restored','success')}
function copyText(txt){navigator.clipboard?.writeText(txt).then(()=>toast('Copied','success')).catch(()=>{prompt('Copy this:',txt);})}
function guidedDemo(){guidedStep=0;showGuide()} const guide=['Smart Map: show homeowners, sun icons, and field route controls.','High Sun Homes: prioritize homes with stronger solar potential.','Lead Cards: track status, bills, roof notes, callbacks, and appointments.','Agent Assignment: assign visible or unassigned territory leads.','Follow-ups: keep callbacks and appointments from falling through.','Cloud Sync: sync leads, agents, and master login with Supabase.','Pricing: Starter, Growth, and Office plans for selling monthly.','Invite Agent: create rep access and copy invite messages.','Backup/Security: export backups and protect team data.'];
function showGuide(){modal('Guided Demo',`<div class="card"><div class="muted">Step ${guidedStep+1} of ${guide.length}</div><h2>${esc(guide[guidedStep])}</h2></div><div class="row"><button class="ghostBtn" data-action="guide-prev">Previous</button><button class="primaryBtn" data-action="guide-next">Next</button><button class="ghostBtn" data-action="close-modal">Close</button></div>`)}
function pricing(){modal('Pricing',`<div class="grid3"><div class="card"><h2>Starter</h2><h1>$99/mo</h1><p class="muted">3 agents • 2,500 leads • Basic cloud sync</p></div><div class="card"><h2>Growth</h2><h1>$199/mo</h1><p class="muted">10 agents • 10,000 leads • Team assignment • High Sun tools</p></div><div class="card"><h2>Office</h2><h1>$299/mo</h1><p class="muted">25 agents • 50,000 leads • Manager tools • Priority support</p></div></div>`)}
function valueCalc(){modal('CRM Value Calculator',`<div class="grid2"><label>Agents<input class="input" id="vc_agents" type="number" value="5"></label><label>Leads/agent/week<input class="input" id="vc_leads" type="number" value="40"></label><label>Average close value<input class="input" id="vc_value" type="number" value="5000"></label><label>Close rate %<input class="input" id="vc_rate" type="number" value="3"></label><label>Monthly CRM cost<input class="input" id="vc_cost" type="number" value="199"></label></div><button class="primaryBtn" style="margin-top:12px" data-action="calc-value">Calculate ROI</button><div id="vcResult" class="card" style="margin-top:12px">Enter numbers and calculate.</div>`)}
function calcValue(){const agents=+$('vc_agents').value, leads=+$('vc_leads').value, val=+$('vc_value').value, rate=+$('vc_rate').value/100, cost=+$('vc_cost').value; const opp=agents*leads*4; const rev=opp*rate*val; $('vcResult').innerHTML=`<h2>Estimated monthly opportunities: ${opp}</h2><p>Estimated revenue potential: $${Math.round(rev).toLocaleString()}</p><p>Estimated ROI after CRM cost: $${Math.round(rev-cost).toLocaleString()}</p>`}
function cloudClient(){if(!window.supabase)return null; if(!settings.supabaseUrl||!settings.supabaseKey)return null; return window.supabase.createClient(settings.supabaseUrl,settings.supabaseKey)}
async function cloudStub(name){toast(`${name}: cloud structure is ready. Confirm Supabase tables/RLS before production.`, 'info')}
function tagTeam(){state.leads.forEach(l=>{l.team_id=state.team.id;l.owner_id=session.id||'master'});save();renderAll();toast('Current leads tagged to team','success')}
function validateTeam(){const miss=state.leads.filter(l=>!l.team_id).length;toast(miss?`${miss} leads missing team_id`:'All leads have team_id',miss?'warning':'success')}
function recalcVisible(){filteredLeads().forEach(calcSunScore);save();renderAll();toast('Sun scores calculated for visible homes','success')}
function handleAction(btn){const a=btn.dataset.action; switch(a){case'nav':return nav(btn.dataset.view);case'open-launch':return openLaunch();case'close-modal':return closeModal();case'login-master':return loginMaster();case'login-agent':return loginAgent();case'load-demo':return loadDemo();case'clear-demo':return clearDemo();case'toggle-satellite':return toggleSatellite();case'toggle-walk':return toggleWalk();case'locate-me':return locateMe();case'clear-route':return clearRoute();case'fit-leads':return fitLeads();case'set-filter':state.filter=btn.dataset.filter;save();return renderAll();case'open-lead':return openLead(btn.dataset.id);case'close-lead':return closeLead();case'add-lead':return addLead();case'save-lead':return saveLead();case'recalc-lead-sun':{const l=state.leads.find(x=>x.id===selectedLeadId);if(l){calcSunScore(l);save();renderAll();openLead(l.id);toast('Sun score recalculated','success')}return}case'recalc-visible-sun':return recalcVisible();case'open-stats-menu':return openStatsMenu();case'close-stats-menu':return closeStatsMenu();case'stats-tab':return showStatsTab(btn.dataset.tab);case'invite-agent':return inviteAgent();case'create-agent':return createAgent(false);case'create-copy-agent':return createAgent(true);case'copy-blank-invite':return copyText(`You’ve been invited to M2 Energy CRM.\nLogin link: ${location.href}\nEmail:\nPIN:\nContact your manager if you need help.`);case'assign-filter':return assignFilter(btn.dataset.agent);case'assign-unassigned':return assignUnassigned(btn.dataset.agent);case'login-view':return loginView(btn.dataset.agent);case'save-settings':return saveSettings();case'reset-settings':return resetSettings();case'copy-plan':return copyText(`${settings.businessName} • Plan: ${settings.plan} • Trial days left: ${trialDays()} • Leads: ${state.leads.length} • Agents: ${agents.length}`);case'extend-trial':settings.trialEnds=addDays(new Date(settings.trialEnds||new Date()),14).toISOString();save();renderAll();return toast('Trial extended','success');case'pricing':return pricing();case'export-backup':return exportBackup();case'import-backup':return importBackup();case'restore-backup':return restoreBackup();case'export-leads':return exportLeads();case'export-agents':return exportAgents();case'tag-team':return tagTeam();case'validate-team':return validateTeam();case'sync-master':return cloudStub('Sync Master to Cloud');case'sync-agents':return cloudStub('Sync Agents to Cloud');case'load-agents':return cloudStub('Load Cloud Agents');case'sync-leads':if(!isMaster())return toast('Only master can sync all leads up','error');return cloudStub('Sync Leads Up');case'load-leads-cloud':return cloudStub('Load Cloud Leads');case'guided-demo':return guidedDemo();case'guide-next':guidedStep=Math.min(guide.length-1,guidedStep+1);return showGuide();case'guide-prev':guidedStep=Math.max(0,guidedStep-1);return showGuide();case'value-calc':return valueCalc();case'calc-value':return calcValue();case'copy-demo-text':return copyText('M2 Energy CRM helps solar, HVAC, and clean heat teams map homeowner leads, score high-sun homes, assign reps, track follow-ups, and sync data to the cloud.');case'copy-book-demo':return copyText('Hey, I built a CRM for solar/HVAC door-to-door teams. It helps managers assign leads, reps see their map, and teams prioritize high-sun homes. Want to see a quick demo?');default:toast('Unknown action: '+a,'error')}}
document.addEventListener('click',e=>{const btn=e.target.closest('[data-action]'); if(!btn)return; try{handleAction(btn)}catch(err){console.error(err);toast('Button error: '+err.message,'error')}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeLead()}});
['searchInput','leadSearch'].forEach(id=>document.addEventListener('input',e=>{if(e.target.id===id){state.search=e.target.value;save();renderAll()}}));
function pwa(){if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}}
load();initMap();if(!state.leads.length){state.leads=[]}ensureScores();renderAll();setTimeout(()=>{if(map){map.invalidateSize();renderMarkers()}},250);pwa();
</script>
</body>
</html>
