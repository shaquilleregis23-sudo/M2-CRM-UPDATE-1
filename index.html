        <div class="m2-qd-actions">
          <button type="button" id="m2QdExpand">Expand Lead</button>
          <button type="button" id="m2QdClear">Clear</button>
        </div>
      </div>
    `;
    document.body.appendChild(panel);

    document.getElementById('m2QdClose').onclick=function(ev){ev.preventDefault();ev.stopPropagation();closeQuickDispo()};
    document.getElementById('m2QdClear').onclick=function(ev){
      ev.preventDefault();ev.stopPropagation();
      closeQuickDispo();
      try{window._m2SelectedLeadId=null;currentLeadId=null}catch(e){}
      try{if(window._m2PropertyHighlight&&map){map.removeLayer(window._m2PropertyHighlight);window._m2PropertyHighlight=null}}catch(e){}
      try{if(window.renderMarkers)window.renderMarkers()}catch(e){}
    };
    document.getElementById('m2QdExpand').onclick=function(ev){
      ev.preventDefault();ev.stopPropagation();
      closeQuickDispo();
      openLeadExpanded(l);
    };
    panel.querySelectorAll('[data-dispo]').forEach(btn=>{
      btn.onclick=function(ev){
        ev.preventDefault();ev.stopPropagation();
        const v=btn.dataset.dispo;
        setLeadDisposition(l,v);
        closeQuickDispo();
        toastSafe('Saved: '+normalize(v));
      };
    });
  }

  window.m2OpenQuickDispositionForLead=openQuickDispoForLead;
  window.m2OpenSelectedDisposition=function(){
    const id=window._m2SelectedLeadId||currentLeadId;
    openQuickDispoForLead(byId(id));
  };
  window.showSelectedStrip=function(lead){
    clearBottomBar();
    openQuickDispoForLead(lead);
  };
  window.updateSelectedStrip=function(){clearBottomBar()};

  // Remove/disable bottom selected-card behavior and Next behavior.
  window.m2CloseSelectedCard=function(){clearBottomBar()};
  window.m2GoNextSelectOnly=function(){toastSafe('Next removed — tap the next homeowner name')};
  window.m2NextForwardBlock=function(){toastSafe('Next removed — tap the next homeowner name')};
  window.m2NextStrictSameBlock=function(){toastSafe('Next removed — tap the next homeowner name')};

  function removeOldUi(){
    clearBottomBar();
    document.querySelectorAll('button').forEach(btn=>{
      const text=(btn.textContent||'').trim().toLowerCase();
      const id=(btn.id||'').toLowerCase();
      if(id.includes('next') || text==='next' || text==='next address' || text.includes('save & next') || text.includes('next home')){
        btn.remove();
      }
      if(id==='m2seldispo' || id==='m2selexpand' || id==='m2selclear' || id==='m2sellock'){
        btn.remove();
      }
    });
  }

  // Intercept Leaflet marker/label taps after original handlers run.
  document.addEventListener('click',function(ev){
    const target=ev.target;
    const marker=target.closest && target.closest('.leaflet-marker-icon');
    if(!marker)return;

    setTimeout(()=>{
      const id=window._m2SelectedLeadId||currentLeadId;
      const l=byId(id);
      if(l)openQuickDispoForLead(l);
    },80);
  },true);

  const css=document.createElement('style');
  css.textContent=`
    #m2SelectedStrip,#m2SelectedMini,.m2-next-note,.m2-block-walk-note,.m2-strict-block-note{
      display:none!important;opacity:0!important;pointer-events:none!important;
    }
    #m2QuickDispoPanel{
      position:fixed!important;
      inset:auto 8px 72px 8px!important;
      z-index:100000!important;
      background:transparent!important;
      pointer-events:none!important;
      color:white!important;
    }
    #m2QuickDispoPanel .m2-qd-card{
      pointer-events:auto!important;
      background:rgba(3,7,18,.94)!important;
      border:1px solid rgba(249,115,22,.32)!important;
      border-radius:20px!important;
      padding:10px!important;
      box-shadow:0 22px 46px rgba(0,0,0,.48)!important;
      backdrop-filter:blur(16px)!important;
      -webkit-backdrop-filter:blur(16px)!important;
    }
    .m2-qd-head{
      display:flex!important;
      align-items:flex-start!important;
      justify-content:space-between!important;
      gap:8px!important;
      margin-bottom:8px!important;
    }
    .m2-qd-selected{
      display:inline-flex!important;
      padding:2px 7px!important;
      border-radius:999px!important;
      background:rgba(34,197,94,.15)!important;
      border:1px solid rgba(34,197,94,.32)!important;
      color:#bbf7d0!important;
      font:950 8.5px/1 system-ui,-apple-system,Segoe UI,sans-serif!important;
      letter-spacing:.045em!important;
      margin-bottom:5px!important;
    }
    .m2-qd-head b{
      display:block!important;
      font:950 14px/1.05 system-ui,-apple-system,Segoe UI,sans-serif!important;
      color:white!important;
      max-width:250px!important;
      white-space:nowrap!important;
      overflow:hidden!important;
      text-overflow:ellipsis!important;
    }
    .m2-qd-head span{
      display:block!important;
      color:#cbd5e1!important;
      font:800 11px/1.2 system-ui,-apple-system,Segoe UI,sans-serif!important;
      margin-top:3px!important;
      max-width:250px!important;
      white-space:nowrap!important;
      overflow:hidden!important;
      text-overflow:ellipsis!important;
    }
    #m2QdClose{
      appearance:none!important;
      width:31px!important;height:31px!important;
      border:0!important;border-radius:999px!important;
      background:rgba(30,41,59,.9)!important;
      color:white!important;
      font:950 18px/1 system-ui!important;
      flex:0 0 auto!important;
    }
    .m2-qd-grid{
      display:grid!important;
      grid-template-columns:repeat(3,1fr)!important;
      gap:7px!important;
    }
    .m2-qd-grid button{
      appearance:none!important;
      border:1px solid rgba(148,163,184,.16)!important;
      border-radius:15px!important;
      background:rgba(15,23,42,.92)!important;
      color:white!important;
      padding:10px 6px!important;
      font:950 10.5px/1.08 system-ui,-apple-system,Segoe UI,sans-serif!important;
      min-height:58px!important;
    }
    .m2-qd-grid button span{
      display:block!important;
      font-size:18px!important;
      margin-bottom:4px!important;
    }
    .m2-qd-actions{
      display:grid!important;
      grid-template-columns:1fr 92px!important;

    }
    .m2-qd-actions button{
      appearance:none!important;
      border:0!important;

    @media(max-width:420px){
      #m2QuickDispoPanel{bottom:68px!important;left:7px!important;right:7px!important;}
      .m2-qd-grid{grid-template-columns:repeat(2,1fr)!important;}
      .m2-qd-head b,.m2-qd-head span{max-width:220px!important;}

  `;
  document.head.appendChild(css);

  setInterval(removeOldUi,650);
  window.addEventListener('load',()=>setTimeout(()=>{
    removeOldUi();
    toastSafe('✓ Tap homeowner name/pin to disposition instantly.');
  },900));

<script>
/* M2 Smart Field Flow Upgrades
   Adds:
   - Safe Save confirmation
   - One-tap next action after disposition
   - Smart follow-up prompts
   - Block Return List
   - Better mobile sync queue
   - Lead quality color system
   - Territory lock
   - Field Mode / Manager Mode split
*/
(function(){
  const QUEUE_KEY='m2_sync_queue_v1';
  const TERRITORY_KEY='m2_territory_locks_v1';
  const MODE_KEY='m2_view_mode_v1';

  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function leads(){try{return (state.leads||[]).filter(Boolean)}catch(e){return []}}
  function agents(){try{return (state.agents||state.agentAccounts||state.teamAgents||[]).filter(Boolean)}catch(e){return []}}
  function selectedId(){try{return window._m2SelectedLeadId||currentLeadId||null}catch(e){return null}}
  function byId(id){return leads().find(l=>l&&l.id===id)||null}
  function selectedLead(){return byId(selectedId())}
  function nameOf(l){return String(l?.owner||l?.ownerName||l?.name||l?.fullName||(((l?.first||'')+' '+(l?.last||'')).trim())||'Homeowner').trim()}
  function addressOf(l){return String(l?.address||l?.property||l?.streetAddress||l?.fullAddress||'').trim()}
  function phoneOf(l){return String(l?.phone||l?.phoneNumber||l?.mobile||'').trim()}
  function emailOf(l){return String(l?.email||l?.emailAddress||'').trim()}
  function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
  function todayISO(){const d=new Date();d.setHours(0,0,0,0);return d.toISOString().slice(0,10)}
  function tomorrowISO(){const d=new Date();d.setDate(d.getDate()+1);d.setHours(0,0,0,0);return d.toISOString().slice(0,10)}
  function statusText(l){return String(l?.status||l?.leadStatus||l?.disposition||l?.pipelineStage||'').toLowerCase()}

  function saveSafe(){
    try{saveState()}catch(e){try{persist&&persist()}catch(_){}}
  }

  function getQueue(){try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]')||[]}catch(e){return []}}
  function setQueue(q){try{localStorage.setItem(QUEUE_KEY,JSON.stringify((q||[]).slice(-500)))}catch(e){} renderSyncQueueBadge()}
  function queueChange(type,leadId,summary){
    const q=getQueue();
    q.push({type,leadId,summary:summary||type,at:new Date().toISOString()});
    setQueue(q);
    try{window.m2MarkUnsynced&&window.m2MarkUnsynced(q.length+' changes waiting')}catch(e){}
  }
  function clearQueue(){setQueue([]); try{window.m2MarkCloudSynced&&window.m2MarkCloudSynced('Queue cleared after sync')}catch(e){}}

  function safeSaveConfirm(l, action){
    closeSafeSave();
    const box=document.createElement('div');
    box.id='m2SafeSave';
    box.innerHTML=`<b>Saved: ${esc(action)}</b><span>${esc(addressOf(l))}</span>`;
    document.body.appendChild(box);
    setTimeout(()=>{box.classList.add('show')},20);
    setTimeout(()=>{box.classList.remove('show'); setTimeout(()=>box.remove(),180)},2600);
  }
  function closeSafeSave(){const b=document.getElementById('m2SafeSave'); if(b)b.remove()}

  function normalize(v){return String(v||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}

  function applyDisposition(l,value){
    if(!l)return;
    const label=normalize(value);
    l.disposition=value;
    l.status=label;
    l.leadStatus=label;
    l.lastDispositionAt=new Date().toISOString();
    l.updatedAt=new Date().toISOString();

    if(value==='callback'){
      l.nextFollowUpDate = l.nextFollowUpDate || todayISO();
      l.followUpType='Callback';
    }
    if(value==='interested'){
      l.pipelineStage='Hot Lead';
      l.nextFollowUpDate = l.nextFollowUpDate || tomorrowISO();
      l.followUpType='Interested follow-up';
    }
    if(value==='appointment_set'){
      l.pipelineStage='Appointment Set';
      l.appointmentDate = l.appointmentDate || todayISO();
    }
    if(value==='not_home'){
      l.returnLater=true;
      l.nextFollowUpDate = l.nextFollowUpDate || tomorrowISO();
      l.followUpType='Return later';
    }
    if(value==='do_not_knock'){
      l.doNotKnock=true;
      l.hiddenFromField=true;
    }
    if(!Array.isArray(l.timeline))l.timeline=[];
    l.timeline.unshift({type:'disposition',value:label,at:new Date().toISOString()});
    saveSafe();
    queueChange('disposition',l.id,label+' - '+addressOf(l));
    try{if(window.renderMarkers)window.renderMarkers()}catch(e){}
    try{if(window.renderList)window.renderList()}catch(e){}
    safeSaveConfirm(l,label);
    smartAfterAction(l,value);
  }

  function smartAfterAction(l,value){
    closeAfterAction();
    const needs = ['callback','interested','appointment_set','not_home'].includes(value);
    if(!needs)return;
    const panel=document.createElement('div');
    panel.id='m2AfterAction';
    const callHref=phoneOf(l)?`tel:${phoneOf(l).replace(/[^0-9+]/g,'')}`:'#';
    const textHref=phoneOf(l)?`sms:${phoneOf(l).replace(/[^0-9+]/g,'')}`:'#';
    panel.innerHTML=`
      <div class="m2-aa-card">
        <div class="m2-aa-head">
          <div><b>${esc(normalize(value))} saved</b><span>${esc(nameOf(l))}</span></div>
          <button type="button" id="m2AaClose">×</button>
        </div>
        <div class="m2-aa-actions">
          <a href="${callHref}" class="${phoneOf(l)?'':'disabled'}">Call</a>
          <a href="${textHref}" class="${phoneOf(l)?'':'disabled'}">Text</a>
          <button type="button" id="m2SetFollow">Set Follow-Up</button>
          <button type="button" id="m2ExpandAfter">Expand</button>
        </div>
      </div>`;
    document.body.appendChild(panel);
    document.getElementById('m2AaClose').onclick=closeAfterAction;
    document.getElementById('m2ExpandAfter').onclick=function(){closeAfterAction(); try{openLead(l.id||l)}catch(e){}};
    document.getElementById('m2SetFollow').onclick=function(){promptFollowUp(l,value)};
    setTimeout(()=>{if(document.getElementById('m2AfterAction'))closeAfterAction()},9000);
  }
  function closeAfterAction(){const p=document.getElementById('m2AfterAction'); if(p)p.remove()}

  function promptFollowUp(l,value){
    const current = l.nextFollowUpDate || tomorrowISO();
    const date = prompt('Follow-up date/time. Example: 2026-06-08 5:30 PM', current);
    if(!date)return;
    l.nextFollowUpDate=date;
    l.followUpType = normalize(value)+' follow-up';
    l.updatedAt=new Date().toISOString();
    if(!Array.isArray(l.timeline))l.timeline=[];
    l.timeline.unshift({type:'follow_up_set',value:date,at:new Date().toISOString()});
    saveSafe();
    queueChange('follow_up',l.id,'Follow-up set: '+date);
    safeSaveConfirm(l,'Follow-up set');
    closeAfterAction();
  }

  // Override quick disposition save if panel exists from previous build
  function wireQuickDispo(){
    document.querySelectorAll('#m2QuickDispoPanel [data-dispo]').forEach(btn=>{
      if(btn.dataset.smartFlow==='1')return;
      btn.dataset.smartFlow='1';
      btn.onclick=function(ev){
        ev.preventDefault();ev.stopPropagation();
        const l=selectedLead();
        if(!l)return toastSafe('Select a home first');
        const v=btn.dataset.dispo;
        const p=document.getElementById('m2QuickDispoPanel'); if(p)p.remove();
        applyDisposition(l,v);
        return false;
      };
    });
  }

  /* Block Return List */
  function blockKey(l){
    const addr=addressOf(l);
    let m=addr.match(/^\s*(\d{2,4})[-\s](\d{1,3})\s+(.+)$/);
    if(m)return m[1]+'|'+streetClean(m[3]);
    m=addr.match(/^\s*(\d{4,6})\s+(.+)$/);
    if(m){const full=m[1]; const prefix=full.length>=5?full.slice(0,full.length-2):String(Math.floor(Number(full)/100)); return prefix+'|'+streetClean(m[2])}
    return '|'+streetClean(addr.replace(/^\s*\d+\s+/,''));
  }
  function streetClean(s){return String(s||'').toLowerCase().replace(/,\s*.*/,'').replace(/\b(street)\b/g,'st').replace(/\b(avenue)\b/g,'ave').replace(/\b(road)\b/g,'rd').replace(/\b(boulevard)\b/g,'blvd').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim()}
  function returnLeadsForBlock(l){
    const key=blockKey(l);
    return leads().filter(x=>{
      if(blockKey(x)!==key)return false;
      const st=statusText(x);
      return x.returnLater || /not home|callback|interested|needs bill|follow/.test(st);
    });
  }
  function openReturnList(){
    const l=selectedLead();
    if(!l)return toastSafe('Select a home/block first');
    closeReturnList();
    const arr=returnLeadsForBlock(l);
    const modal=document.createElement('div');
    modal.id='m2ReturnList';
    modal.innerHTML=`
      <div class="m2-return-card">
        <div class="m2-aa-head">
          <div><b>Block Return List</b><span>${esc(blockKey(l).replace('|',' '))}</span></div>
          <button type="button" id="m2ReturnClose">×</button>
        </div>
        <div class="m2-return-list">
          ${arr.map(x=>`<button type="button" data-lead="${esc(x.id)}"><b>${esc(nameOf(x))}</b><span>${esc(addressOf(x))}</span><em>${esc(x.status||x.leadStatus||x.disposition||'Return')}</em></button>`).join('') || '<p>No return homes on this block yet.</p>'}
        </div>
      </div>`;
    document.body.appendChild(modal);
    document.getElementById('m2ReturnClose').onclick=closeReturnList;
    modal.querySelectorAll('[data-lead]').forEach(btn=>{
      btn.onclick=function(){
        const x=byId(btn.dataset.lead);
        if(x){
          closeReturnList();
          try{window.m2OpenQuickDispositionForLead?window.m2OpenQuickDispositionForLead(x):(window.showSelectedStrip&&window.showSelectedStrip(x))}catch(e){}
          try{if(x.lat&&x.lng&&map)map.flyTo([+x.lat,+x.lng],Math.max(map.getZoom?map.getZoom():18,18),{animate:true,duration:.3})}catch(e){}
        }
      }
    });
  }
  function closeReturnList(){const m=document.getElementById('m2ReturnList'); if(m)m.remove()}

  function addReturnButton(){
    const p=document.getElementById('m2LiveLocationPanel') || document.body;
    if(document.getElementById('m2ReturnListBtn'))return;
    const b=document.createElement('button');
    b.id='m2ReturnListBtn';
    b.type='button';
    b.textContent='Returns';
    b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();openReturnList()};
    if(p===document.body)document.body.appendChild(b); else p.appendChild(b);
  }

  /* Better sync queue badge */
  function renderSyncQueueBadge(){
    let b=document.getElementById('m2SyncQueueBadge');
    if(!b){
      b=document.createElement('button');
      b.id='m2SyncQueueBadge';
      b.type='button';
      b.onclick=openSyncQueue;
      document.body.appendChild(b);
    }
    const q=getQueue();
    const last=q.length?q[q.length-1].at:null;
    const online=navigator.onLine!==false;
    b.className=q.length?'waiting':'';
    if(!online)b.classList.add('offline');
    b.innerHTML=q.length?`<b>${q.length}</b><span>waiting</span>`:`<b>✓</b><span>synced</span>`;
    b.title=last?'Last local save: '+new Date(last).toLocaleString():'No pending changes';
  }
  function openSyncQueue(){
    closeSyncQueue();
    const q=getQueue();
    const modal=document.createElement('div');
    modal.id='m2SyncQueueModal';
    modal.innerHTML=`
      <div class="m2-return-card">
        <div class="m2-aa-head">
          <div><b>Mobile Sync Queue</b><span>${q.length} local changes waiting</span></div>
          <button type="button" id="m2SyncQueueClose">×</button>
        </div>
        <div class="m2-return-list">
          ${q.slice(-20).reverse().map(item=>`<div class="m2-qitem"><b>${esc(item.type)}</b><span>${esc(item.summary)}</span><em>${new Date(item.at).toLocaleString()}</em></div>`).join('') || '<p>No pending changes.</p>'}
        </div>
        <button type="button" id="m2QueueRetry">Try Cloud Sync</button>
      </div>`;
    document.body.appendChild(modal);
    document.getElementById('m2SyncQueueClose').onclick=closeSyncQueue;
    document.getElementById('m2QueueRetry').onclick=function(){
      try{
        const fn=window.syncLeadsUp||window.pushLeadsToCloud||window.m2SyncUp;
        if(fn){Promise.resolve(fn()).then(clearQueue).catch(()=>toastSafe('Sync failed — changes still safe locally'))}
        else toastSafe('Use Sync Leads Up from Cloud panel');
      }catch(e){toastSafe('Sync failed — changes still safe locally')}
    };
  }
  function closeSyncQueue(){const m=document.getElementById('m2SyncQueueModal'); if(m)m.remove()}

  /* Lead quality color system */
  function leadColorClass(l){
    const st=statusText(l);
    if(/do not knock|dnk|not interested|not qualified|renter/.test(st))return 'm2-lead-red';
    if(/appointment/.test(st))return 'm2-lead-blue';
    if(/callback|follow/.test(st))return 'm2-lead-orange';
    if(/interested|hot/.test(st) || Number(l.score||l.leadScore||0)>=70)return 'm2-lead-green';
    if(/not home/.test(st))return 'm2-lead-gray';
    return 'm2-lead-default';
  }
  function colorizeMarkers(){
    try{
      document.querySelectorAll('.m2-field-home-pin,.sun-marker').forEach(el=>{
        el.classList.remove('m2-lead-red','m2-lead-blue','m2-lead-orange','m2-lead-green','m2-lead-gray','m2-lead-default');
      });
    }catch(e){}
  }
  const oldRenderMarkers=window.renderMarkers;
  if(typeof oldRenderMarkers==='function' && !oldRenderMarkers._m2ColorWrapped){
    window.renderMarkers=function(){
      const r=oldRenderMarkers.apply(this,arguments);
      setTimeout(colorizeMarkers,70);
      return r;
    };
    window.renderMarkers._m2ColorWrapped=true;
  }

  /* Territory Lock */
  function getLocks(){try{return JSON.parse(localStorage.getItem(TERRITORY_KEY)||'{}')||{}}catch(e){return {}}}
  function setLocks(x){try{localStorage.setItem(TERRITORY_KEY,JSON.stringify(x||{}))}catch(e){}}
  function openTerritoryLock(){
    const l=selectedLead();
    if(!l)return toastSafe('Select a block first');
    closeTerritoryLock();
    const lock=getLocks()[blockKey(l)]||'';
    const ag=agents();
    const modal=document.createElement('div');
    modal.id='m2TerritoryLock';
    modal.innerHTML=`
      <div class="m2-return-card">
        <div class="m2-aa-head">
          <div><b>Territory Lock</b><span>${esc(blockKey(l).replace('|',' '))}</span></div>
          <button type="button" id="m2TerritoryClose">×</button>
        </div>
        <select id="m2TerritoryAgent">
          <option value="">Unlocked</option>
          ${ag.map(a=>{const name=a.name||a.fullName||a.email||a.username||'Agent';const val=a.email||a.id||name;return `<option value="${esc(val)}">${esc(name)}</option>`}).join('')}
        </select>
        <button type="button" id="m2TerritorySave">Save Territory Lock</button>
      </div>`;
    document.body.appendChild(modal);
    document.getElementById('m2TerritoryAgent').value=lock;
    document.getElementById('m2TerritoryClose').onclick=closeTerritoryLock;
    document.getElementById('m2TerritorySave').onclick=function(){
      const locks=getLocks();
      const val=document.getElementById('m2TerritoryAgent').value;
      if(val)locks[blockKey(l)]=val; else delete locks[blockKey(l)];
      setLocks(locks);
      queueChange('territory_lock',null,'Territory lock changed: '+blockKey(l));
      closeTerritoryLock();
      toastSafe(val?'Block locked to rep':'Block unlocked');
    };
  }
  function closeTerritoryLock(){const m=document.getElementById('m2TerritoryLock'); if(m)m.remove()}

  function addTerritoryButton(){
    const p=document.getElementById('m2LiveLocationPanel') || document.body;
    if(document.getElementById('m2TerritoryLockBtn'))return;
    const b=document.createElement('button');
    b.id='m2TerritoryLockBtn';
    b.type='button';
    b.textContent='Lock Block';
    b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();openTerritoryLock()};
    if(p===document.body)document.body.appendChild(b); else p.appendChild(b);
  }

  /* Field Mode / Manager Mode */
  function setMode(mode){
    localStorage.setItem(MODE_KEY,mode);
    document.body.classList.toggle('m2-field-mode',mode==='field');
    document.body.classList.toggle('m2-manager-mode',mode==='manager');
    renderModeToggle();
    toastSafe(mode==='field'?'Field Mode on':'Manager Mode on');
  }
  function currentMode(){return localStorage.getItem(MODE_KEY)||'field'}
  function renderModeToggle(){
    let b=document.getElementById('m2ModeToggle');
    if(!b){
      b=document.createElement('button');
      b.id='m2ModeToggle';
      b.type='button';
      b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();setMode(currentMode()==='field'?'manager':'field')};
      document.body.appendChild(b);
    }
    b.textContent=currentMode()==='field'?'Field Mode':'Manager Mode';
  }

  const css=document.createElement('style');
  css.textContent=`
    #m2SafeSave{
      position:fixed!important;left:12px!important;right:12px!important;top:calc(env(safe-area-inset-top,0px) + 12px)!important;
      z-index:100200!important;transform:translateY(-20px)!important;opacity:0!important;
      background:rgba(6,78,59,.94)!important;color:white!important;border:1px solid rgba(34,197,94,.4)!important;
      border-radius:16px!important;padding:10px 12px!important;box-shadow:0 16px 35px rgba(0,0,0,.34)!important;
      transition:.18s ease!important;backdrop-filter:blur(14px)!important;-webkit-backdrop-filter:blur(14px)!important;
    }

    #m2SafeSave b{display:block!important;font:950 13px/1.1 system-ui!important;}
    #m2SafeSave span{display:block!important;color:#d1fae5!important;font:800 11px/1.2 system-ui!important;margin-top:3px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;}

    #m2AfterAction{position:fixed!important;inset:auto 10px 76px 10px!important;z-index:100050!important;color:white!important;}
    .m2-aa-card,.m2-return-card{
      background:rgba(3,7,18,.94)!important;border:1px solid rgba(56,189,248,.25)!important;border-radius:20px!important;
      padding:12px!important;box-shadow:0 22px 48px rgba(0,0,0,.48)!important;backdrop-filter:blur(16px)!important;-webkit-backdrop-filter:blur(16px)!important;color:white!important;
    }
    .m2-aa-head{display:flex!important;align-items:flex-start!important;justify-content:space-between!important;gap:8px!important;margin-bottom:10px!important;}
    .m2-aa-head b{display:block!important;font:950 14px/1.05 system-ui!important;color:white!important;}
    .m2-aa-head span{display:block!important;color:#cbd5e1!important;font:800 11px/1.2 system-ui!important;margin-top:3px!important;max-width:245px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;}
    .m2-aa-head button{appearance:none!important;border:0!important;border-radius:999px!important;width:31px!important;height:31px!important;background:rgba(30,41,59,.9)!important;color:white!important;font:950 18px/1 system-ui!important;}
    .m2-aa-actions{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:7px!important;}
    .m2-aa-actions a,.m2-aa-actions button,#m2QueueRetry,#m2TerritorySave{
      appearance:none!important;text-decoration:none!important;text-align:center!important;border:1px solid rgba(148,163,184,.16)!important;border-radius:14px!important;
      background:rgba(15,23,42,.92)!important;color:white!important;padding:11px 7px!important;font:950 11px/1 system-ui!important;
    }
    .m2-aa-actions a:first-child{background:linear-gradient(135deg,#16a34a,#059669)!important;}
    .m2-aa-actions a:nth-child(2){background:linear-gradient(135deg,#0ea5e9,#2563eb)!important;}
    .m2-aa-actions .disabled{opacity:.35!important;pointer-events:none!important;}

    #m2ReturnList,#m2SyncQueueModal,#m2TerritoryLock{
      position:fixed!important;inset:0!important;z-index:100060!important;display:flex!important;align-items:flex-end!important;justify-content:center!important;
      padding:14px!important;background:rgba(2,6,23,.35)!important;backdrop-filter:blur(2px)!important;-webkit-backdrop-filter:blur(2px)!important;
    }
    #m2ReturnList .m2-return-card,#m2SyncQueueModal .m2-return-card,#m2TerritoryLock .m2-return-card{width:min(520px,100%)!important;max-height:82vh!important;overflow:auto!important;}
    .m2-return-list{display:grid!important;gap:7px!important;}
    .m2-return-list button,.m2-qitem{
      border:1px solid rgba(148,163,184,.16)!important;border-radius:14px!important;background:rgba(15,23,42,.86)!important;color:white!important;

    }
    .m2-return-list b,.m2-qitem b{display:block!important;font:950 13px/1.1 system-ui!important;}
    .m2-return-list span,.m2-qitem span{display:block!important;color:#cbd5e1!important;font:800 11px/1.2 system-ui!important;margin-top:3px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;}
    .m2-return-list em,.m2-qitem em{display:block!important;color:#fbbf24!important;font:900 10px/1.2 system-ui!important;margin-top:4px!important;font-style:normal!important;}
    #m2TerritoryAgent{width:100%!important;margin:8px 0!important;border-radius:15px!important;border:1px solid rgba(148,163,184,.2)!important;background:rgba(15,23,42,.92)!important;color:white!important;padding:12px!important;font:900 13px/1 system-ui!important;}

    #m2SyncQueueBadge{
      position:fixed!important;left:10px!important;top:calc(env(safe-area-inset-top,0px) + 112px)!important;z-index:99988!important;
      border:1px solid rgba(34,197,94,.35)!important;border-radius:14px!important;background:rgba(6,78,59,.84)!important;color:#bbf7d0!important;
      padding:6px 8px!important;box-shadow:0 10px 24px rgba(0,0,0,.28)!important;backdrop-filter:blur(12px)!important;-webkit-backdrop-filter:blur(12px)!important;
    }
    #m2SyncQueueBadge b{display:block!important;font:950 12px/1 system-ui!important;}
    #m2SyncQueueBadge span{display:block!important;font:850 8.5px/1 system-ui!important;margin-top:2px!important;}
    #m2SyncQueueBadge.waiting{border-color:rgba(251,191,36,.5)!important;background:rgba(120,53,15,.88)!important;color:#fde68a!important;}
    #m2SyncQueueBadge.offline{border-color:rgba(239,68,68,.55)!important;background:rgba(127,29,29,.88)!important;color:#fecaca!important;}

    #m2ReturnListBtn,#m2TerritoryLockBtn,#m2ModeToggle{
      border:1px solid rgba(148,163,184,.22)!important;border-radius:12px!important;background:rgba(15,23,42,.9)!important;color:white!important;
      padding:8px 8px!important;font:950 10px/1 system-ui!important;
    }
    body>#m2ReturnListBtn{position:fixed!important;right:10px!important;top:calc(env(safe-area-inset-top,0px) + 126px)!important;z-index:99987!important;}
    body>#m2TerritoryLockBtn{position:fixed!important;right:10px!important;top:calc(env(safe-area-inset-top,0px) + 166px)!important;z-index:99987!important;}
    #m2ModeToggle{
      position:fixed!important;left:10px!important;top:calc(env(safe-area-inset-top,0px) + 150px)!important;z-index:99987!important;

    }

    .m2-lead-green .last,.m2-lead-green{border-color:#22c55e!important;background:rgba(22,163,74,.24)!important;}
    .m2-lead-orange .last,.m2-lead-orange{border-color:#f97316!important;background:rgba(249,115,22,.24)!important;}
    .m2-lead-blue .last,.m2-lead-blue{border-color:#38bdf8!important;background:rgba(14,165,233,.24)!important;}
    .m2-lead-gray .last,.m2-lead-gray{border-color:#94a3b8!important;background:rgba(100,116,139,.22)!important;}
    .m2-lead-red .last,.m2-lead-red{border-color:#ef4444!important;background:rgba(239,68,68,.24)!important;}

    body.m2-field-mode .manager-only,body.m2-field-mode #managerPanel,body.m2-field-mode #settingsPanel,body.m2-field-mode .admin-only{display:none!important;}
    body.m2-manager-mode .field-only-hidden{display:none!important;}

    @media(max-width:420px){
      #m2AfterAction{bottom:68px!important;left:7px!important;right:7px!important;}
      .m2-aa-actions{grid-template-columns:repeat(2,1fr)!important;}
      #m2SyncQueueBadge{top:calc(env(safe-area-inset-top,0px) + 104px)!important;}
      #m2ModeToggle{top:calc(env(safe-area-inset-top,0px) + 140px)!important;}
    }
  `;
  document.head.appendChild(css);

  // expose functions
  window.m2ApplySmartDisposition=applyDisposition;
  window.m2OpenReturnList=openReturnList;
  window.m2OpenTerritoryLock=openTerritoryLock;
  window.m2RenderSyncQueueBadge=renderSyncQueueBadge;
  window.m2SetMode=setMode;

  // wrap cloud sync functions to clear queue on successful push
  ['syncLeadsUp','pushLeadsToCloud','m2SyncUp'].forEach(fn=>{
    if(typeof window[fn]==='function' && !window[fn]._m2QueueWrapped){
      const old=window[fn];
      window[fn]=async function(){
        const r=await old.apply(this,arguments);
        clearQueue();
        return r;
      };
      window[fn]._m2QueueWrapped=true;
    }
  });

  function boot(){
    wireQuickDispo();
    addReturnButton();
    addTerritoryButton();
    renderSyncQueueBadge();
    renderModeToggle();
    setMode(currentMode());
  }

  setInterval(boot,900);
  window.addEventListener('online',renderSyncQueueBadge);
  window.addEventListener('offline',renderSyncQueueBadge);
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>setTimeout(boot,700));
  else setTimeout(boot,700);
})();
</script>


<script>
/* M2 Mobile Fit + Map Dismiss + Cloud Actions Patch
   - Keeps app fitted to Safari mobile viewport
   - Dismisses menus/panels when tapping the map
   - Adds Load Cloud + Save Cloud buttons directly in sync queue panel
*/
(function(){
  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function qs(s){return document.querySelector(s)}
  function qsa(s){return Array.from(document.querySelectorAll(s))}
  function setVh(){
    const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
    document.documentElement.style.setProperty('--m2vh', `${vh}px`);
    document.body.style.minHeight = `calc(var(--m2vh) * 100)`;
    try{
      const app = qs('.app') || qs('#app') || qs('main');
      if(app) app.style.minHeight = `calc(var(--m2vh) * 100)`;
    }catch(e){}
    try{ if(window.map && map.invalidateSize) setTimeout(()=>map.invalidateSize(false),80); }catch(e){}
  }

  function closeFieldMenus(keepQuick){
    const selectors = [
      '#m2AfterAction',
      '#m2ReturnList',
      '#m2SyncQueueModal',
      '#m2TerritoryLock',
      '#m2TodayPopup',
      '#m2BlockCompleteModal',
      '#m2AssignPanel',
      '#m2SelectedStrip',
      '#m2SelectedMini',
      '.leaflet-popup'
    ];
    if(!keepQuick) selectors.unshift('#m2QuickDispoPanel');
    selectors.forEach(sel=>{
      qsa(sel).forEach(el=>{
        try{el.remove()}catch(e){}
      });
    });
    try{ if(window.map && map.closePopup) map.closePopup(); }catch(e){}
  }

  function isMapTap(ev){
    const t = ev.target;
    if(!t || !t.closest) return false;
    return !!(
      t.closest('#map') ||
      t.closest('.leaflet-container') ||
      t.classList?.contains('leaflet-container')
    );
  }

  document.addEventListener('click', function(ev){
    if(!isMapTap(ev)) return;
    if(ev.target.closest && (
      ev.target.closest('.leaflet-marker-icon') ||
      ev.target.closest('.leaflet-popup') ||
      ev.target.closest('#m2QuickDispoPanel') ||
      ev.target.closest('button,a,input,select,textarea')
    )) return;
    closeFieldMenus(false);
  }, true);

  function wireMapDismiss(){
    try{
      if(window.map && map.on && !map._m2DismissMenusWired){
        map._m2DismissMenusWired = true;
        map.on('movestart zoomstart dragstart', function(){ closeFieldMenus(false); });
      }
    }catch(e){}
  }

  function findSaveCloudFn(){
    return window.syncLeadsUp || window.pushLeadsToCloud || window.saveCloudLeads || window.m2SyncUp || window.syncUp || null;
  }
  function findLoadCloudFn(){
    return window.loadCloudLeads || window.pullLeadsFromCloud || window.loadLeadsFromCloud || window.m2LoadCloud || window.syncLeadsDown || null;
  }

  async function saveCloudNow(){
    const fn=findSaveCloudFn();
    if(!fn){toastSafe('Cloud save function not found — use Supabase panel'); return;}
    const btn=qs('#m2CloudSaveNow');
    if(btn) btn.textContent='Saving…';
    try{
      await Promise.resolve(fn());
      try{localStorage.setItem('m2_sync_queue_v1','[]')}catch(e){}
      try{window.m2RenderSyncQueueBadge&&window.m2RenderSyncQueueBadge()}catch(e){}
      try{window.m2MarkCloudSynced&&window.m2MarkCloudSynced('Saved to cloud')}catch(e){}
      toastSafe('Saved to cloud');
      closeFieldMenus(false);
    }catch(e){
      console.error(e);
      toastSafe('Cloud save failed');
    }finally{
      if(btn) btn.textContent='Save Cloud';
    }
  }

  async function loadCloudNow(){
    const fn=findLoadCloudFn();
    if(!fn){toastSafe('Cloud load function not found — use Supabase panel'); return;}
    const btn=qs('#m2CloudLoadNow');
    if(btn) btn.textContent='Loading…';
    try{
      await Promise.resolve(fn());
      try{if(window.renderMarkers)window.renderMarkers()}catch(e){}
      try{if(window.renderList)window.renderList()}catch(e){}
      try{window.m2MarkCloudSynced&&window.m2MarkCloudSynced('Loaded cloud leads')}catch(e){}
      toastSafe('Loaded cloud leads');
      closeFieldMenus(false);
    }catch(e){
      console.error(e);
      toastSafe('Cloud load failed');
    }finally{
      if(btn) btn.textContent='Load Cloud';
    }
  }

  window.m2SaveCloudNow = saveCloudNow;
  window.m2LoadCloudNow = loadCloudNow;

  function enhanceSyncQueuePanel(){
    const modal=qs('#m2SyncQueueModal .m2-return-card');
    if(!modal || qs('#m2CloudInlineActions')) return;
    const actions=document.createElement('div');
    actions.id='m2CloudInlineActions';
    actions.innerHTML=`
      <button type="button" id="m2CloudSaveNow">Save Cloud</button>
      <button type="button" id="m2CloudLoadNow">Load Cloud</button>
    `;
    const retry=qs('#m2QueueRetry');
    if(retry) retry.insertAdjacentElement('beforebegin', actions);
    else modal.appendChild(actions);
    qs('#m2CloudSaveNow').onclick=function(ev){ev.preventDefault();ev.stopPropagation();saveCloudNow();};
    qs('#m2CloudLoadNow').onclick=function(ev){ev.preventDefault();ev.stopPropagation();loadCloudNow();};
  }

  function openMiniSyncPanel(){
    let old=qs('#m2SyncQueueModal');
    if(old){old.remove(); return;}
    const q=(()=>{try{return JSON.parse(localStorage.getItem('m2_sync_queue_v1')||'[]')||[]}catch(e){return []}})();
    const modal=document.createElement('div');
    modal.id='m2SyncQueueModal';
    modal.innerHTML=`
      <div class="m2-return-card">
        <div class="m2-aa-head">
          <div><b>Cloud Sync</b><span>${q.length} local changes waiting</span></div>
          <button type="button" id="m2SyncQueueClose">×</button>
        </div>
        <div id="m2CloudInlineActions">
          <button type="button" id="m2CloudSaveNow">Save Cloud</button>
          <button type="button" id="m2CloudLoadNow">Load Cloud</button>
        </div>
        <div class="m2-sync-mini-list">
          ${q.slice(-6).reverse().map(item=>`<div><b>${String(item.type||'change')}</b><span>${String(item.summary||'Local change')}</span></div>`).join('') || '<p>No pending local changes.</p>'}
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    qs('#m2SyncQueueClose').onclick=()=>modal.remove();
    qs('#m2CloudSaveNow').onclick=function(ev){ev.preventDefault();ev.stopPropagation();saveCloudNow();};
    qs('#m2CloudLoadNow').onclick=function(ev){ev.preventDefault();ev.stopPropagation();loadCloudNow();};
  }

  function patchSyncBadges(){
    qsa('#m2SyncQueueBadge,#m2OfflineBadge').forEach(b=>{
      if(b.dataset.cloudActions==='1') return;
      b.dataset.cloudActions='1';
      b.onclick=function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        openMiniSyncPanel();
        setTimeout(enhanceSyncQueuePanel,50);
      };
    });
  }

  // Add a visible tiny cloud button if badge isn't present yet.
  function ensureCloudButton(){
    if(qs('#m2CloudMiniBtn')) return;
    const b=document.createElement('button');
    b.id='m2CloudMiniBtn';
    b.type='button';
    b.textContent='Cloud';
    b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();openMiniSyncPanel();};
    document.body.appendChild(b);
  }

  const css=document.createElement('style');
  css.textContent=`
    html,body{
      width:100%!important;
      min-width:0!important;
      max-width:100vw!important;
      min-height:calc(var(--m2vh,1vh) * 100)!important;
      overflow-x:hidden!important;
      overscroll-behavior:none!important;
      -webkit-text-size-adjust:100%!important;
      touch-action:manipulation;
    }
    body{
      position:relative!important;
      margin:0!important;
      padding:0!important;
    }
    .app,#app,main{
      width:100%!important;
      max-width:100vw!important;
      min-height:calc(var(--m2vh,1vh) * 100)!important;
      overflow-x:hidden!important;
    }
    #map,.leaflet-container{
      max-width:100vw!important;
      touch-action:pan-x pan-y!important;
    }
    input,select,textarea,button{
      font-size:16px!important; /* prevents iPhone Safari zoom jump */
    }
    .leaflet-control-container{
      max-width:100vw!important;
    }

    #m2SyncQueueModal,#m2ReturnList,#m2TerritoryLock,#m2TodayPopup,#m2BlockCompleteModal,#m2AssignPanel{
      position:fixed!important;
      inset:0!important;
      z-index:100060!important;
      display:flex!important;
      align-items:flex-end!important;
      justify-content:center!important;
      padding:10px!important;
      padding-bottom:calc(env(safe-area-inset-bottom,0px) + 10px)!important;
      background:rgba(2,6,23,.28)!important;
      overflow:hidden!important;
    }
    #m2SyncQueueModal .m2-return-card{
      width:min(520px,100%)!important;
      max-height:min(74vh,560px)!important;
      overflow:auto!important;
      border-radius:20px!important;
    }
    #m2CloudInlineActions{
      display:grid!important;
      grid-template-columns:1fr 1fr!important;
      gap:8px!important;
      margin:8px 0 10px!important;
    }
    #m2CloudInlineActions button,#m2CloudMiniBtn{
      appearance:none!important;
      border:0!important;
      border-radius:14px!important;
      padding:12px 9px!important;
      color:white!important;
      font:950 13px/1 system-ui,-apple-system,Segoe UI,sans-serif!important;
      background:linear-gradient(135deg,#2563eb,#7c3aed)!important;
      box-shadow:0 10px 24px rgba(0,0,0,.24)!important;
    }
    #m2CloudLoadNow{
      background:linear-gradient(135deg,#0ea5e9,#059669)!important;
    }
    .m2-sync-mini-list{
      display:grid!important;
      gap:6px!important;
      max-height:170px!important;
      overflow:auto!important;
      -webkit-overflow-scrolling:touch!important;
    }
    .m2-sync-mini-list div,.m2-sync-mini-list p{
      margin:0!important;
      border:1px solid rgba(148,163,184,.16)!important;
      border-radius:12px!important;
      background:rgba(15,23,42,.78)!important;
      padding:8px!important;
      color:white!important;
    }
    .m2-sync-mini-list b{
      display:block!important;
      font:900 11px/1.1 system-ui!important;
      text-transform:capitalize!important;
    }
    .m2-sync-mini-list span{
      display:block!important;
      color:#cbd5e1!important;
      font:800 10px/1.2 system-ui!important;
      margin-top:3px!important;
      white-space:nowrap!important;
      overflow:hidden!important;
      text-overflow:ellipsis!important;
    }
    #m2CloudMiniBtn{
      position:fixed!important;
      left:10px!important;
      top:calc(env(safe-area-inset-top,0px) + 186px)!important;
      z-index:99986!important;
      padding:8px 10px!important;
      font-size:10px!important;
      border-radius:999px!important;
    }

    #m2QuickDispoPanel{
      max-width:calc(100vw - 14px)!important;
      left:7px!important;
      right:7px!important;
      bottom:calc(env(safe-area-inset-bottom,0px) + 66px)!important;
    }
    #m2AfterAction{
      max-width:calc(100vw - 14px)!important;
      left:7px!important;
      right:7px!important;
      bottom:calc(env(safe-area-inset-bottom,0px) + 66px)!important;
    }

    @media(max-width:430px){
      #m2LiveLocationPanel{
        max-width:calc(100vw - 16px)!important;
        transform:scale(.94)!important;
        transform-origin:top right!important;
      }
      #m2OfflineBadge,#m2SyncQueueBadge{
        max-width:96px!important;
        white-space:nowrap!important;
        overflow:hidden!important;
      }
      .m2-aa-card,.m2-return-card,.m2-qd-card{
        max-width:100%!important;
        box-sizing:border-box!important;
      }
    }
  `;
  document.head.appendChild(css);

  window.m2CloseFieldMenus = closeFieldMenus;

  function boot(){
    setVh();
    wireMapDismiss();
    patchSyncBadges();
    enhanceSyncQueuePanel();
    ensureCloudButton();
  }

  window.addEventListener('resize',setVh);
  if(window.visualViewport){
    visualViewport.addEventListener('resize',setVh);
    visualViewport.addEventListener('scroll',setVh);
  }
  window.addEventListener('orientationchange',()=>setTimeout(setVh,350));

  setInterval(boot,900);
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>setTimeout(boot,600));
  else setTimeout(boot,600);
})();
</script>


<script>
/* M2 CRM SaaS Launch Pro
   Adds sellable SaaS layer:
   - Customer onboarding setup
   - Subscription / plan enforcement
   - Trial / Active / Past Due / Disabled status
   - Seat limit tracking
   - Tenant branding
   - SaaS Admin Launch Center
   - Demo mode
   - Support/contact panel
   - Billing notice overlays
   - Customer export handoff
*/
(function(){
  const SAAS_KEY='m2_saas_customer_account_v1';
  const BRAND_KEY='m2_saas_branding_v1';
  const SUPPORT_KEY='m2_saas_support_v1';
  const DEMO_KEY='m2_saas_demo_mode_v1';

  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
  function leads(){try{return (state.leads||[]).filter(Boolean)}catch(e){return []}}
  function agents(){try{return (state.agents||state.agentAccounts||state.teamAgents||[]).filter(Boolean)}catch(e){return []}}
  function saveSafe(){try{saveState()}catch(e){try{persist&&persist()}catch(_){}}}

  function defaultAccount(){
    return {
      companyName:'M2 Energy CRM',
      ownerName:'',
      ownerEmail:'',
      market:'Queens / Long Island',
      plan:'Pro',
      status:'Trial',
      seatLimit:5,
      monthlyPrice:97,
      trialEnds:'',
      renewalDate:'',
      createdAt:new Date().toISOString(),
      notes:'',
      onboarding:{
        company:false,
        cloud:false,
        import:false,
        firstAgent:false,
        fieldTest:false
      }
    };
  }
  function getAccount(){
    try{return Object.assign(defaultAccount(), JSON.parse(localStorage.getItem(SAAS_KEY)||'{}')||{})}catch(e){return defaultAccount()}
  }
  function setAccount(a){
    localStorage.setItem(SAAS_KEY,JSON.stringify(Object.assign(getAccount(),a||{})));
    applySaasRules();
    renderSaasButton();
  }
  function getBrand(){
    try{return Object.assign({appName:'M2 CRM',accent:'#38bdf8',logoText:'M2'}, JSON.parse(localStorage.getItem(BRAND_KEY)||'{}')||{})}catch(e){return {appName:'M2 CRM',accent:'#38bdf8',logoText:'M2'}}
  }
  function setBrand(b){
    localStorage.setItem(BRAND_KEY,JSON.stringify(Object.assign(getBrand(),b||{})));
    applyBrand();
  }
  function getSupport(){
    try{return Object.assign({supportName:'Shaquille Regis',supportEmail:'shaquilleregis23@gmail.com',supportPhone:'',bookDemo:'',terms:''}, JSON.parse(localStorage.getItem(SUPPORT_KEY)||'{}')||{})}catch(e){return {supportName:'Shaquille Regis',supportEmail:'shaquilleregis23@gmail.com',supportPhone:'',bookDemo:'',terms:''}}
  }
  function setSupport(s){localStorage.setItem(SUPPORT_KEY,JSON.stringify(Object.assign(getSupport(),s||{})))}
  function demoMode(){return localStorage.getItem(DEMO_KEY)==='1'}
  function setDemo(on){localStorage.setItem(DEMO_KEY,on?'1':'0'); document.body.classList.toggle('m2-demo-mode',!!on); toastSafe(on?'Demo mode on':'Demo mode off')}

  function planConfig(plan){
    const p=String(plan||'Pro').toLowerCase();
    if(p==='starter')return {seats:2,leads:500,price:49,features:['Field map','Cloud sync','Basic dispositions']};
    if(p==='team')return {seats:10,leads:5000,price:197,features:['Rep management','Manager dashboard','Territory tools','Priority support']};
    if(p==='enterprise')return {seats:999,leads:999999,price:497,features:['Unlimited seats','Custom onboarding','Advanced support']};
    return {seats:5,leads:2000,price:97,features:['Cloud sync','Rep mode','Block mode','Manager tools']};
  }

  function isDisabled(){
    const a=getAccount();
    return ['disabled','past due'].includes(String(a.status||'').toLowerCase());
  }
  function isTrialExpired(){
    const a=getAccount();
    if(String(a.status||'').toLowerCase()!=='trial' || !a.trialEnds)return false;
    const t=new Date(a.trialEnds).getTime();
    return !Number.isNaN(t) && Date.now()>t;
  }
  function overSeatLimit(){
    const a=getAccount();
    return agents().length > Number(a.seatLimit||planConfig(a.plan).seats);
  }
  function overLeadLimit(){
    const cfg=planConfig(getAccount().plan);
    return leads().length > cfg.leads;
  }

  function applyBrand(){
    const b=getBrand();
    document.documentElement.style.setProperty('--m2-saas-accent', b.accent || '#38bdf8');
    try{
      document.title = b.appName || 'M2 CRM';
      document.querySelectorAll('.brand-title,.app-title,h1').forEach(el=>{
        if((el.textContent||'').toLowerCase().includes('m2'))el.textContent=b.appName||'M2 CRM';
      });
    }catch(e){}
  }

  function applySaasRules(){
    const a=getAccount();
    const disabled=isDisabled()||isTrialExpired();
    document.body.classList.toggle('m2-saas-disabled',disabled);
    document.body.classList.toggle('m2-saas-over-seat',overSeatLimit());
    document.body.classList.toggle('m2-saas-over-leads',overLeadLimit());
    document.body.classList.toggle('m2-demo-mode',demoMode());
    renderBillingOverlay();
  }

  function renderBillingOverlay(){
    let ov=document.getElementById('m2BillingOverlay');
    const a=getAccount();
    const disabled=isDisabled()||isTrialExpired();
    if(!disabled){
      if(ov)ov.remove();
      return;
    }
    if(!ov){
      ov=document.createElement('div');
      ov.id='m2BillingOverlay';
      document.body.appendChild(ov);
    }
    const support=getSupport();
    ov.innerHTML=`
      <div class="m2-bill-card">
        <div class="m2-bill-badge">Account ${esc(isTrialExpired()?'Trial Expired':a.status)}</div>
        <h2>${esc(a.companyName||'M2 CRM')} is currently limited</h2>
        <p>Your CRM data is safe. Cloud sync and editing are paused until the account is reactivated.</p>
        <div class="m2-bill-actions">
          ${support.supportPhone?`<a href="tel:${esc(support.supportPhone)}">Call Support</a>`:''}
          ${support.supportEmail?`<a href="mailto:${esc(support.supportEmail)}">Email Support</a>`:''}
          <button type="button" id="m2BillAdmin">Admin Override</button>
        </div>
      </div>
    `;
    const admin=document.getElementById('m2BillAdmin');
    if(admin)admin.onclick=function(){openSaasAdmin()};
  }

  function blockWriteIfDisabled(){
    if(!(isDisabled()||isTrialExpired()))return false;
    toastSafe('Account limited — reactivate in SaaS Admin');
    renderBillingOverlay();
    return true;
  }

  ['saveLead','updateLead','saveCurrentLead','syncLeadsUp','pushLeadsToCloud','m2SyncUp','importCsv','importCSV'].forEach(fn=>{
    if(typeof window[fn]==='function' && !window[fn]._m2SaasGuard){
      const old=window[fn];
      window[fn]=function(){
        if(blockWriteIfDisabled())return null;
        return old.apply(this,arguments);
      };
      window[fn]._m2SaasGuard=true;
    }
  });

  function onboardingPct(a){
    const o=a.onboarding||{};
    const vals=[o.company,o.cloud,o.import,o.firstAgent,o.fieldTest];
    return Math.round(vals.filter(Boolean).length/vals.length*100);
  }

  function openSaasAdmin(){
    closeSaasAdmin();
    const a=getAccount();
    const b=getBrand();
    const s=getSupport();
    const cfg=planConfig(a.plan);
    const modal=document.createElement('div');
    modal.id='m2SaasAdminModal';
    modal.innerHTML=`
      <div class="m2-saas-card">
        <div class="m2-saas-head">
          <div>
            <b>SaaS Launch Center</b>
            <span>${esc(a.companyName)} • ${esc(a.status)} • ${esc(a.plan)}</span>
          </div>
          <button type="button" id="m2SaasClose">×</button>
        </div>

        <div class="m2-saas-tabs">
          <button type="button" data-tab="setup" class="active">Setup</button>
          <button type="button" data-tab="billing">Billing</button>
          <button type="button" data-tab="brand">Brand</button>
          <button type="button" data-tab="support">Support</button>
          <button type="button" data-tab="launch">Launch</button>
        </div>

        <div class="m2-saas-body">
          <section data-panel="setup" class="active">
            <div class="m2-saas-progress"><span style="width:${onboardingPct(a)}%"></span></div>
            <p class="m2-small">${onboardingPct(a)}% onboarding complete</p>
            <label>Company / Team Name<input id="m2CompanyName" value="${esc(a.companyName)}"></label>
            <label>Owner/Admin Name<input id="m2OwnerName" value="${esc(a.ownerName)}"></label>
            <label>Owner/Admin Email<input id="m2OwnerEmail" value="${esc(a.ownerEmail)}"></label>
            <label>Market / Territory<input id="m2Market" value="${esc(a.market)}"></label>
            <div class="m2-check-grid">
              <label><input type="checkbox" id="m2OnCompany" ${a.onboarding?.company?'checked':''}> Company setup</label>
              <label><input type="checkbox" id="m2OnCloud" ${a.onboarding?.cloud?'checked':''}> Supabase connected</label>
              <label><input type="checkbox" id="m2OnImport" ${a.onboarding?.import?'checked':''}> Leads imported</label>
              <label><input type="checkbox" id="m2OnAgent" ${a.onboarding?.firstAgent?'checked':''}> First rep created</label>
              <label><input type="checkbox" id="m2OnField" ${a.onboarding?.fieldTest?'checked':''}> Field test complete</label>
            </div>
          </section>

          <section data-panel="billing">
            <div class="m2-metrics-grid">
              <div><b>${agents().length}</b><span>Seats used / ${esc(a.seatLimit)}</span></div>
              <div><b>${leads().length}</b><span>Leads used / ${cfg.leads}</span></div>
              <div><b>$${esc(a.monthlyPrice)}</b><span>Monthly</span></div>
            </div>
            <label>Plan<select id="m2Plan">
              ${['Starter','Pro','Team','Enterprise'].map(p=>`<option ${a.plan===p?'selected':''}>${p}</option>`).join('')}
            </select></label>
            <label>Status<select id="m2Status">
              ${['Trial','Active','Past Due','Disabled'].map(p=>`<option ${a.status===p?'selected':''}>${p}</option>`).join('')}
            </select></label>
            <label>Seat Limit<input id="m2SeatLimit" type="number" value="${esc(a.seatLimit)}"></label>
            <label>Monthly Price<input id="m2MonthlyPrice" type="number" value="${esc(a.monthlyPrice)}"></label>
            <label>Trial Ends<input id="m2TrialEnds" type="date" value="${esc(String(a.trialEnds||'').slice(0,10))}"></label>
            <label>Renewal Date<input id="m2RenewalDate" type="date" value="${esc(String(a.renewalDate||'').slice(0,10))}"></label>
            <label>Admin Notes<textarea id="m2AdminNotes">${esc(a.notes)}</textarea></label>
          </section>

          <section data-panel="brand">
            <label>App Name<input id="m2BrandName" value="${esc(b.appName)}"></label>
            <label>Logo Text<input id="m2LogoText" value="${esc(b.logoText)}"></label>
            <label>Accent Color<input id="m2Accent" type="color" value="${esc(b.accent)}"></label>
            <p class="m2-small">Use this to white-label the CRM for each sales team.</p>
          </section>

          <section data-panel="support">
            <label>Support Name<input id="m2SupportName" value="${esc(s.supportName)}"></label>
            <label>Support Email<input id="m2SupportEmail" value="${esc(s.supportEmail)}"></label>
            <label>Support Phone<input id="m2SupportPhone" value="${esc(s.supportPhone)}"></label>
            <label>Book Demo Link<input id="m2BookDemo" value="${esc(s.bookDemo)}"></label>
            <label>Terms / Notes<textarea id="m2Terms">${esc(s.terms)}</textarea></label>
          </section>

          <section data-panel="launch">
            <div class="m2-launch-box">
              <b>Launch Readiness</b>
              <ul>
                <li class="${a.onboarding?.company?'done':''}">Company profile complete</li>
                <li class="${a.onboarding?.cloud?'done':''}">Supabase connected</li>
                <li class="${a.onboarding?.import?'done':''}">Leads imported</li>
                <li class="${a.onboarding?.firstAgent?'done':''}">Agents created</li>
                <li class="${a.onboarding?.fieldTest?'done':''}">Field test completed</li>
              </ul>
            </div>
            <button type="button" id="m2DemoMode">${demoMode()?'Turn Demo Off':'Turn Demo On'}</button>

        <div class="m2-saas-actions">
          <button type="button" id="m2SaveSaas">Save SaaS Settings</button>
        </div>
      </div>`;
    document.body.appendChild(modal);

    modal.querySelector('#m2SaasClose').onclick=closeSaasAdmin;
    modal.querySelectorAll('[data-tab]').forEach(btn=>{
      btn.onclick=function(){
        modal.querySelectorAll('[data-tab]').forEach(b=>b.classList.remove('active'));
        modal.querySelectorAll('[data-panel]').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        modal.querySelector(`[data-panel="${btn.dataset.tab}"]`).classList.add('active');
      };
    });
    modal.querySelector('#m2Plan')?.addEventListener('change',function(){
      const pc=planConfig(this.value);
      modal.querySelector('#m2SeatLimit').value=pc.seats;
      modal.querySelector('#m2MonthlyPrice').value=pc.price;
    });
    modal.querySelector('#m2DemoMode')?.addEventListener('click',function(){setDemo(!demoMode()); this.textContent=demoMode()?'Turn Demo Off':'Turn Demo On'});
    modal.querySelector('#m2ExportCustomer')?.addEventListener('click',exportCustomerSetup);
    modal.querySelector('#m2CopySalesPitch')?.addEventListener('click',copySalesPitch);
    modal.querySelector('#m2ResetOnboarding')?.addEventListener('click',function(){
      setAccount({onboarding:{company:false,cloud:false,import:false,firstAgent:false,fieldTest:false}});
      closeSaasAdmin(); openSaasAdmin();
    });
    modal.querySelector('#m2SaveSaas').onclick=function(){
      const newAcct={
        companyName:val('m2CompanyName'),
        ownerName:val('m2OwnerName'),
        ownerEmail:val('m2OwnerEmail'),
        market:val('m2Market'),
        plan:val('m2Plan'),
        status:val('m2Status'),
        seatLimit:Number(val('m2SeatLimit')||0),
        monthlyPrice:Number(val('m2MonthlyPrice')||0),
        trialEnds:val('m2TrialEnds'),
        renewalDate:val('m2RenewalDate'),
        notes:val('m2AdminNotes'),
        onboarding:{
          company:checked('m2OnCompany'),
          cloud:checked('m2OnCloud'),
          import:checked('m2OnImport'),
          firstAgent:checked('m2OnAgent'),
          fieldTest:checked('m2OnField')
        }
      };
      setAccount(newAcct);
      setBrand({appName:val('m2BrandName'),logoText:val('m2LogoText'),accent:val('m2Accent')});
      setSupport({supportName:val('m2SupportName'),supportEmail:val('m2SupportEmail'),supportPhone:val('m2SupportPhone'),bookDemo:val('m2BookDemo'),terms:val('m2Terms')});
      toastSafe('SaaS settings saved');
      closeSaasAdmin();

  function val(id){return document.getElementById(id)?.value||''}
  function checked(id){return !!document.getElementById(id)?.checked}
  function closeSaasAdmin(){const m=document.getElementById('m2SaasAdminModal'); if(m)m.remove()}

  function exportCustomerSetup(){
    const payload={account:getAccount(),branding:getBrand(),support:getSupport(),exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const a=document.createElement('a');

    a.download='m2-crm-customer-setup.json';

It helps reps:
• See homeowner/property info before knocking
• Disposition leads fast from the map

Current plan: ${a.plan} — $${a.monthlyPrice}/month, ${a.seatLimit} seats.`;

<script>
/* M2 SaaS Clean Map SAFE Fix
   Safe rollback-based patch:
   - Keeps app loading
   - Hides SaaS/plan buttons from daily field map unless Manager Mode
   - Adds tiny manager shortcut
   - Compresses GPS panel visually without rewriting the original GPS logic
   - Minimizes overlay clutter
*/
(function(){
  function safe(fn){try{return fn()}catch(e){console.warn("M2 safe map patch:",e)}}
  function qs(s){return document.querySelector(s)}
  function isManager(){
    return document.body.classList.contains("m2-manager-mode") || localStorage.getItem("m2_view_mode_v1")==="manager";
  }
  function applyCleanMap(){
    safe(function(){
      var saas=qs("#m2SaasAdminBtn");
      if(saas) saas.style.display = isManager() ? "" : "none";
      var plan=qs("#m2PlanBadge");
      if(plan) plan.style.display = isManager() ? "" : "none";
    });

    safe(function(){
      var panel=qs("#m2LiveLocationPanel");
      if(panel){
        panel.classList.add("m2-gps-compact-safe");
        var toggle=qs("#m2LiveToggle");
        var follow=qs("#m2LiveFollow");
        var status=qs("#m2LiveStatus");
        if(toggle) toggle.innerHTML="📍";
        if(follow) follow.innerHTML="◎";
        if(status){
          status.setAttribute("title", status.textContent || "GPS");
          status.innerHTML="GPS";
        }
      }
    });

    safe(function(){
      ["#m2CloudMiniBtn","#m2ReturnListBtn","#m2TerritoryLockBtn","#m2ModeToggle","#m2SyncQueueBadge","#m2OfflineBadge","#m2CompleteBlockBtn"].forEach(function(sel){
        var el=qs(sel);
        if(el) el.classList.add("m2-map-small-safe");
      });
    });
  }

  function makeShortcut(){
    if(qs("#m2ManagerMiniGear")) return;
    var b=document.createElement("button");
    b.id="m2ManagerMiniGear";
    b.type="button";
    b.textContent="⚙️";
    b.title="Manager / SaaS tools";
    b.onclick=function(ev){
      ev.preventDefault();
      ev.stopPropagation();
      if(window.m2SetMode) window.m2SetMode("manager");
      else {
        localStorage.setItem("m2_view_mode_v1","manager");
        document.body.classList.add("m2-manager-mode");
        document.body.classList.remove("m2-field-mode");
      }
      setTimeout(function(){
        applyCleanMap();
        if(window.m2OpenSaasAdmin) window.m2OpenSaasAdmin();
      },80);
    };
    document.body.appendChild(b);
  }

  function closeMenusOnMap(){
    safe(function(){
      if(window.map && map.on && !map._m2SafeCloseMenus){
        map._m2SafeCloseMenus=true;
        map.on("click dragstart zoomstart movestart", function(){
          ["#m2QuickDispoPanel","#m2AfterAction","#m2ReturnList","#m2SyncQueueModal","#m2TerritoryLock","#m2TodayPopup","#m2BlockCompleteModal","#m2AssignPanel","#m2SelectedStrip","#m2SelectedMini"].forEach(function(sel){
            var el=qs(sel);
            if(el) el.remove();
          });
          try{ if(map.closePopup) map.closePopup(); }catch(e){}
        });
      }
    });
  }

  function fitMobile(){
    safe(function(){
      var vh=(window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
      document.documentElement.style.setProperty("--m2vh", vh+"px");
      if(window.map && map.invalidateSize) setTimeout(function(){map.invalidateSize(false)},80);
    });
  }

  var css=document.createElement("style");
  css.textContent = `
    html,body{
      width:100%!important;
      max-width:100vw!important;
      min-height:calc(var(--m2vh,1vh) * 100)!important;

      overflow-x:hidden!important;
    }
    input,select,textarea,button{font-size:16px!important;}

    body:not(.m2-manager-mode) #m2SaasAdminBtn,
    body:not(.m2-manager-mode) #m2PlanBadge{
      display:none!important;
      opacity:0!important;
      pointer-events:none!important;
    }

    #m2ManagerMiniGear{
      position:fixed!important;
      right:8px!important;
      bottom:calc(env(safe-area-inset-bottom,0px) + 10px)!important;
      z-index:99984!important;
      width:32px!important;
      height:32px!important;
      border-radius:999px!important;
      border:1px solid rgba(148,163,184,.22)!important;
      background:rgba(3,7,18,.48)!important;
      color:white!important;
      font:900 14px/1 system-ui!important;
      opacity:.58!important;
      box-shadow:0 8px 22px rgba(0,0,0,.24)!important;
      backdrop-filter:blur(10px)!important;
      -webkit-backdrop-filter:blur(10px)!important;
    }

    #m2LiveLocationPanel.m2-gps-compact-safe{
      right:8px!important;
      top:calc(env(safe-area-inset-top,0px) + 58px)!important;
      gap:3px!important;
      padding:4px!important;
      border-radius:999px!important;
      background:rgba(3,7,18,.62)!important;
      border:1px solid rgba(56,189,248,.24)!important;
      transform:scale(.90)!important;
      transform-origin:top right!important;
      max-width:126px!important;
      overflow:hidden!important;
    }
    #m2LiveLocationPanel.m2-gps-compact-safe #m2LiveStatus{
      max-width:32px!important;
      font-size:9px!important;
      padding:0 3px!important;
    }
    #m2LiveLocationPanel.m2-gps-compact-safe button{
      min-width:30px!important;
      width:30px!important;
      height:30px!important;
      padding:0!important;
      border-radius:999px!important;
      font-size:14px!important;
      display:inline-flex!important;
      align-items:center!important;
      justify-content:center!important;
    }

    .m2-map-small-safe{
      transform:scale(.86)!important;
      transform-origin:top left!important;
      opacity:.82!important;
    }

    #m2CloudMiniBtn{left:8px!important;top:calc(env(safe-area-inset-top,0px) + 152px)!important;}
    #m2ModeToggle{left:8px!important;top:calc(env(safe-area-inset-top,0px) + 118px)!important;}
    #m2SyncQueueBadge{left:8px!important;top:calc(env(safe-area-inset-top,0px) + 82px)!important;}
    #m2OfflineBadge{left:8px!important;top:calc(env(safe-area-inset-top,0px) + 48px)!important;max-width:84px!important;overflow:hidden!important;}
    body>#m2ReturnListBtn{right:8px!important;top:calc(env(safe-area-inset-top,0px) + 108px)!important;}
    body>#m2TerritoryLockBtn{right:8px!important;top:calc(env(safe-area-inset-top,0px) + 142px)!important;}
    body>#m2CompleteBlockBtn{right:8px!important;top:calc(env(safe-area-inset-top,0px) + 176px)!important;}

    #m2QuickDispoPanel,#m2AfterAction{
      bottom:calc(env(safe-area-inset-bottom,0px) + 58px)!important;
      left:7px!important;
      right:7px!important;
      max-width:calc(100vw - 14px)!important;
    }

    @media(max-width:430px){
      #m2LiveLocationPanel.m2-gps-compact-safe{
        top:calc(env(safe-area-inset-top,0px) + 54px)!important;
        right:7px!important;
      }
    }
  `;
  document.head.appendChild(css);

  function boot(){
    fitMobile();
    makeShortcut();
    applyCleanMap();
    closeMenusOnMap();
  }
  window.addEventListener("resize", fitMobile);
  window.addEventListener("orientationchange", function(){setTimeout(fitMobile,350)});
  if(window.visualViewport){
    visualViewport.addEventListener("resize", fitMobile);
    visualViewport.addEventListener("scroll", fitMobile);
  }
  setInterval(boot,1000);
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", function(){setTimeout(boot,700)});
  else setTimeout(boot,700);
})();
</script>


<script>
/* M2 Manager Login Mobile Fix
   Safe login system:
   - Manager mode login closes immediately on phone
   - No stuck login overlay
   - Field mode stays clean
   - Admin/SaaS tools tucked into Admin hub
*/
(function(){
  var LOGIN_KEY = "m2_saas_login_session_v2";
  var COMPANY_KEY = "m2_company_code_v2";

  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function qs(s){return document.querySelector(s)}
  function esc(s){return String(s||"").replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]})}

  function getSession(){
    try{return JSON.parse(localStorage.getItem(LOGIN_KEY)||"null")}catch(e){return null}
  }
  function saveSession(s){
    if(s)localStorage.setItem(LOGIN_KEY,JSON.stringify(s));
    else localStorage.removeItem(LOGIN_KEY);
  }
  function setMode(mode){
    localStorage.setItem("m2_view_mode_v1",mode);
    document.body.classList.toggle("m2-field-mode",mode==="field");
    document.body.classList.toggle("m2-manager-mode",mode==="manager");
    document.body.classList.toggle("m2-field-app-clean",mode==="field");
    document.body.classList.toggle("m2-manager-app",mode==="manager");
    try{if(window.m2SetMode)window.m2SetMode(mode)}catch(e){}
  }

  function removeLogin(){
    var el=qs("#m2LoginScreenFixed");
    if(el)el.remove();
    document.body.classList.remove("m2-login-open");
  }

  function enterCRM(role,name,company,demo){
    removeLogin(); // important: remove overlay first so mobile doesn't stay stuck
    saveSession({
      role: role || "rep",
      user: name || "Field User",
      companyCode: company || "M2",
      demo: !!demo,
      loginAt: new Date().toISOString()
    });
    localStorage.setItem(COMPANY_KEY,company||"M2");
    setMode(role==="manager" ? "manager" : "field");
    renderUserPill();
    renderAdminButton();

    if(demo){
      loadDemoData();
      try{window.m2SetDemoMode&&window.m2SetDemoMode(true)}catch(e){}
    }

    setTimeout(function(){
      try{if(window.map&&map.invalidateSize)map.invalidateSize(false)}catch(e){}
      if(role==="manager"){
        toastSafe("Manager Mode loaded");
        openAdminHub();
      }else{
        toastSafe("Field Mode loaded");
      }
    },180);
  }

  function showLogin(force){
    if(getSession() && !force)return;
    if(qs("#m2LoginScreenFixed"))return;

    var company=localStorage.getItem(COMPANY_KEY)||"M2";
    var appName="M2 Field CRM";
    try{
      if(window.m2GetSaasAccount){
        var a=window.m2GetSaasAccount();
        if(a && a.companyName)appName=a.companyName;
      }
    }catch(e){}

    var div=document.createElement("div");
    div.id="m2LoginScreenFixed";
    div.innerHTML =
      '<div class="m2-login-card-fixed">'+
        '<div class="m2-login-logo-fixed">M2</div>'+
        '<h1>'+esc(appName)+'</h1>'+
        '<p>Choose Field Mode for reps or Manager Mode for admin tools.</p>'+
        '<label>Company Code<input id="m2LoginCompanyFixed" value="'+esc(company)+'"></label>'+
        '<label>Name or Email<input id="m2LoginNameFixed" placeholder="Your name or email"></label>'+
        '<label>Mode<select id="m2LoginRoleFixed"><option value="rep">Rep / Field Mode</option><option value="manager">Manager / Admin Mode</option></select></label>'+
        '<button type="button" id="m2LoginEnterFixed">Enter CRM</button>'+
        '<div class="m2-login-row-fixed">'+
          '<button type="button" id="m2LoginDemoFixed">Demo Mode</button>'+
          '<button type="button" id="m2LoginSkipFixed">Skip</button>'+
        '</div>'+
        '<small>Tip: Manager tools are hidden from the daily field map.</small>'+
      '</div>';
    document.body.appendChild(div);
    document.body.classList.add("m2-login-open");

    qs("#m2LoginEnterFixed").onclick=function(ev){
      ev.preventDefault();ev.stopPropagation();
      var role=qs("#m2LoginRoleFixed").value;
      var name=qs("#m2LoginNameFixed").value.trim() || (role==="manager"?"Manager":"Rep");
      var code=qs("#m2LoginCompanyFixed").value.trim() || "M2";
      enterCRM(role,name,code,false);
    };
    qs("#m2LoginSkipFixed").onclick=function(ev){
      ev.preventDefault();ev.stopPropagation();
      enterCRM("rep","Field User",company,false);
    };
    qs("#m2LoginDemoFixed").onclick=function(ev){
      ev.preventDefault();ev.stopPropagation();
      enterCRM("manager","Demo Manager","DEMO",true);
    };
  }

  function renderUserPill(){
    var s=getSession();
    if(!s)return;
    var p=qs("#m2UserPillFixed");
    if(!p){
      p=document.createElement("button");
      p.id="m2UserPillFixed";
      p.type="button";
      p.onclick=function(ev){ev.preventDefault();ev.stopPropagation();openSwitchPanel()};

  function renderAdminButton(){
    var b=qs("#m2AdminHubFixed");

      b=document.createElement("button");
      b.id="m2AdminHubFixed";

  function openAdminHub(){
    closePanel();
    var m=document.createElement("div");

      '</div>';
    document.body.appendChild(m);
    qs("#m2PanelCloseFixed").onclick=closePanel;
    qs("#m2HubSaasFixed").onclick=function(){closePanel(); if(window.m2OpenSaasAdmin)window.m2OpenSaasAdmin(); else toastSafe("SaaS tools loading")};

  function openCloudPanel(){
    closePanel();
    var m=document.createElement("div");
    m.id="m2LoginPanelFixed";

    document.body.appendChild(m);

      var sample=[
        ["demo_1","Maria Johnson","259-02 Francis Lewis Blvd","Fresh","fresh",82,40.7071,-73.7531],
        ["demo_2","Anthony Williams","259-08 Francis Lewis Blvd","Interested","interested",91,40.70725,-73.7529],
        ["demo_3","Patricia Brown","259-14 Francis Lewis Blvd","Callback","callback",76,40.7074,-73.75275],
        ["demo_4","Robert Davis","259-20 Francis Lewis Blvd","Appointment Set","appointment_set",88,40.70755,-73.7526],
        ["demo_5","Linda Miller","259-26 Francis Lewis Blvd","Not Home","not_home",61,40.7077,-73.75245]
      ];

        if(!state.leads.some(function(l){return l.id===x[0]})){
          state.leads.push({id:x[0],owner:x[1],address:x[2],phone:"718555011"+i,status:x[3],disposition:x[4],score:x[5],lat:x[6],lng:x[7],nextFollowUpDate:today,notes:"Demo lead for sales presentation."});
        }

      var reps=[{id:"agent_demo_1",name:"Demo Rep 1",email:"rep1@m2demo.com",role:"rep"},{id:"agent_demo_2",name:"Demo Rep 2",email:"rep2@m2demo.com",role:"rep"}];
      reps.forEach(function(a){
        if(!state.agents.some(function(x){return x.id===a.id}))state.agents.push(a);
      });
      try{saveState()}catch(e){}
      try{if(window.renderMarkers)window.renderMarkers()}catch(e){}
      try{if(window.renderList)window.renderList()}catch(e){}
    }catch(e){console.warn(e)}
  }

  css.textContent=`

<script>
/* M2 Supabase Quota Fix
   Fixes phone/browser quota exceeded errors:
   - Adds Fix Storage button
   - Cleans heavy localStorage/sessionStorage cache safely
   - Wraps localStorage.setItem to prevent app crash
   - Keeps important login/Supabase/team/account keys
   - Adds lightweight cloud retry controls
*/
(function(){
  var KEEP_PATTERNS = [
    /^m2_saas_login_session/,
    /^m2_company_code/,
    /^m2_saas_customer_account/,
    /^m2_saas_branding/,
    /^m2_saas_support/,
    /^m2_cloud_sync_enabled/,
    /^m2_supabase/,
    /^sb-/,
    /supabase/i,
    /team/i,
    /auth/i
  ];

  var HEAVY_PATTERNS = [
    /pluto/i,
    /hpd/i,
    /cache/i,
    /tiles/i,
    /geojson/i,
    /property/i,
    /homeowner/i,
    /marker/i,
    /debug/i,
    /backup/i,
    /demo_sample/i,
    /sync_queue/i,
    /block_completion/i
  ];

  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function qs(s){return document.querySelector(s)}

  function shouldKeepKey(k){
    return KEEP_PATTERNS.some(function(rx){return rx.test(k)});
  }
  function isHeavyKey(k){
    return HEAVY_PATTERNS.some(function(rx){return rx.test(k)});
  }
  function sizeOfStorage(store){
    var total=0;
    try{
      for(var i=0;i<store.length;i++){
        var k=store.key(i);
        var v=store.getItem(k)||"";
        total += k.length + v.length;
      }
    }catch(e){}
    return total;
  }
  function pretty(bytes){
    var mb=bytes/1024/1024;
    return mb.toFixed(2)+" MB";
  }

  function clearHeavyStorage(){
    var before=sizeOfStorage(localStorage)+sizeOfStorage(sessionStorage);
    var removed=0;

    try{
      var keys=[];
      for(var i=0;i<localStorage.length;i++)keys.push(localStorage.key(i));
      keys.forEach(function(k){
        if(!k)return;
        if(isHeavyKey(k) && !shouldKeepKey(k)){
          try{localStorage.removeItem(k);removed++}catch(e){}
        }
      });
    }catch(e){}

    try{
      var skeys=[];
      for(var j=0;j<sessionStorage.length;j++)skeys.push(sessionStorage.key(j));
      skeys.forEach(function(k){
        if(!k)return;
        if(isHeavyKey(k) || !shouldKeepKey(k)){
          try{sessionStorage.removeItem(k);removed++}catch(e){}
        }
      });
    }catch(e){}

    try{
      // Keep app usable but shrink noisy queues.
      localStorage.setItem("m2_sync_queue_v1","[]");
    }catch(e){}

    var after=sizeOfStorage(localStorage)+sizeOfStorage(sessionStorage);
    toastSafe("Storage cleaned: "+removed+" items removed");
    updateQuotaBadge(before, after);
    try{if(window.map&&map.invalidateSize)setTimeout(function(){map.invalidateSize(false)},100)}catch(e){}
    return {before:before,after:after,removed:removed};
  }

  function emergencyClearButKeepCore(){
    var before=sizeOfStorage(localStorage)+sizeOfStorage(sessionStorage);
    var kept={};
    try{
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k && shouldKeepKey(k)) kept[k]=localStorage.getItem(k);
      }
      localStorage.clear();
      Object.keys(kept).forEach(function(k){try{localStorage.setItem(k,kept[k])}catch(e){}});
    }catch(e){}
    try{sessionStorage.clear()}catch(e){}
    var after=sizeOfStorage(localStorage)+sizeOfStorage(sessionStorage);
    toastSafe("Emergency storage reset complete");
    updateQuotaBadge(before, after);
    return {before:before,after:after};
  }

  var originalSetItem = Storage.prototype.setItem;
  if(!Storage.prototype._m2QuotaWrapped){
    Storage.prototype.setItem = function(k,v){
      try{
        return originalSetItem.call(this,k,v);
      }catch(e){
        var msg=String(e && (e.name||e.message)||e);
        if(/quota|exceeded|storage/i.test(msg)){
          try{clearHeavyStorage()}catch(_){}
          try{return originalSetItem.call(this,k,v)}catch(e2){
            try{emergencyClearButKeepCore()}catch(_){}
            try{return originalSetItem.call(this,k,v)}catch(e3){
              console.warn("M2 quota protected write skipped:",k,e3);
              toastSafe("Phone storage full — cleaned cache. Try Save Cloud again.");
              return;
            }
          }
        }
        throw e;
      }
    };
    Storage.prototype._m2QuotaWrapped=true;
  }

  function updateQuotaBadge(before, after){
    var b=qs("#m2QuotaBadge");
    if(!b)return;
    var size=sizeOfStorage(localStorage)+sizeOfStorage(sessionStorage);
    b.innerHTML="<b>Storage</b><span>"+pretty(size)+"</span>";
    b.classList.toggle("warn", size > 4.2*1024*1024);
  }

  function openQuotaPanel(){
    closeQuotaPanel();
    var size=sizeOfStorage(localStorage)+sizeOfStorage(sessionStorage);
    var modal=document.createElement("div");
    modal.id="m2QuotaPanel";
    modal.innerHTML =
      '<div class="m2-quota-card">'+
        '<div class="m2-quota-head"><div><b>Storage / Supabase Fix</b><span>Current phone storage: '+pretty(size)+'</span></div><button type="button" id="m2QuotaClose">×</button></div>'+
        '<p>Quota exceeded means Safari/local browser storage is full. Your Supabase cloud can still work after clearing heavy local cache.</p>'+
        '<button type="button" id="m2FixStorageBtn">Fix Storage</button>'+
        '<button type="button" id="m2EmergencyStorageBtn">Emergency Reset Cache</button>'+
        '<div class="m2-quota-grid">'+
          '<button type="button" id="m2QuotaSaveCloud">Save Cloud</button>'+
          '<button type="button" id="m2QuotaLoadCloud">Load Cloud</button>'+
        '</div>'+
        '<small>Fix Storage removes temporary homeowner/property/cache data but keeps login, team, SaaS, and Supabase settings.</small>'+
      '</div>';
    document.body.appendChild(modal);
    qs("#m2QuotaClose").onclick=closeQuotaPanel;
    qs("#m2FixStorageBtn").onclick=function(){clearHeavyStorage(); updateQuotaBadge();};
    qs("#m2EmergencyStorageBtn").onclick=function(){
      if(confirm("This clears local cache but keeps login/Supabase basics. Continue?")){
