   - Labels only show when zoomed in / visible area only to prevent bunching
   - Selecting a home highlights the whole property footprint approximation
   - Full homeowner details stay tap-to-expand */
(function(){
  const isPhone=()=>/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||Math.min(screen.width||9999,window.innerWidth||9999)<=820;
  const css=document.createElement('style');
  css.textContent=`
    .m2-field-home-pin{width:92px!important;height:48px!important;display:flex!important;align-items:center!important;justify-content:center!important;pointer-events:auto!important;}
    .m2-field-home-pin .dot{display:none!important;}
    .m2-field-home-pin .tap-zone{position:absolute!important;inset:1px 7px!important;border-radius:12px!important;background:rgba(56,189,248,.035)!important;border:1px solid rgba(255,255,255,.10)!important;box-shadow:0 2px 8px rgba(0,0,0,.18)!important;}
    .m2-field-home-pin .last{display:flex!important;align-items:center!important;gap:3px!important;max-width:76px!important;min-width:0!important;padding:3px 5px!important;border-radius:7px!important;background:rgba(7,17,29,.54)!important;color:rgba(255,255,255,.92)!important;border:1px solid rgba(255,255,255,.22)!important;box-shadow:0 4px 12px rgba(0,0,0,.22)!important;backdrop-filter:blur(7px)!important;-webkit-backdrop-filter:blur(7px)!important;font:900 8.5px/1.05 system-ui,-apple-system,Segoe UI,sans-serif!important;text-shadow:0 1px 2px rgba(0,0,0,.45)!important;overflow:hidden!important;white-space:nowrap!important;text-overflow:ellipsis!important;}
    .m2-field-home-pin .last .hn{color:#f9c74f;font-weight:1000;font-size:9.5px;flex:0 0 auto;}
    .m2-field-home-pin .last .ln{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
    .m2-field-home-pin.no-name .last{display:none!important;}
    .m2-field-home-pin.no-name .dot{display:grid!important;opacity:.75!important;width:18px!important;height:18px!important;font-size:9px!important;}
    .m2-field-home-pin.worked .last{background:rgba(22,101,52,.50)!important;border-color:rgba(74,222,128,.36)!important;}
    .m2-field-home-pin.hot .last{background:rgba(8,47,73,.58)!important;border-color:rgba(45,212,191,.42)!important;}
    .m2-field-home-pin.dnk .last{background:rgba(40,40,45,.45)!important;color:rgba(255,255,255,.45)!important;border-color:rgba(255,255,255,.10)!important;}
    .m2-field-home-pin.selected{transform:translate(-50%,-50%) scale(1.04)!important;z-index:9999!important;}
    .m2-field-home-pin.selected .tap-zone{inset:1px 8px!important;background:rgba(56,189,248,.12)!important;border:1.5px solid rgba(255,255,255,.90)!important;box-shadow:0 0 0 2px rgba(56,189,248,.24),0 0 14px rgba(56,189,248,.55)!important;}
    .m2-field-home-pin.selected .last{background:rgba(7,17,29,.94)!important;color:#fff!important;border:2px solid #38bdf8!important;font-size:9.5px!important;max-width:92px!important;box-shadow:0 0 0 3px rgba(56,189,248,.25),0 12px 28px rgba(0,0,0,.38)!important;}
    .m2-field-home-pin.selected:after{content:'SELECTED';position:absolute;left:50%;top:-18px;transform:translateX(-50%);font:1000 7px/1 system-ui,-apple-system,Segoe UI,sans-serif;letter-spacing:.35px;color:#00111f;background:#38bdf8;border:1px solid #fff;border-radius:999px;padding:3px 6px;box-shadow:0 8px 16px rgba(0,0,0,.28);z-index:4;}
    .m2-property-highlight{pointer-events:none!important;filter:drop-shadow(0 0 9px rgba(56,189,248,.65));}
    .leaflet-interactive.m2-property-highlight{outline:none!important;}
  `;
  try{document.head.appendChild(css)}catch(e){}

  function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
  function nameOfSafe(l){try{if(typeof nameOf==='function'){let n=nameOf(l); if(n) return n;}}catch(e){} return (`${l.first||''} ${l.last||''}`.trim() || l.raw_owner || l.owner || 'Homeowner');}
  function lastName(l){let n=nameOfSafe(l).trim(); if(!n||/homeowner|imported lead/i.test(n)) return 'Owner'; let parts=n.split(/\s+/).filter(Boolean); return (parts[parts.length-1]||n).replace(/[^a-zA-Z'\-]/g,'').slice(0,10) || 'Owner';}
  function shortHouseDigits(l){
    const addr=String((l&&(l.addr||l.address))||'').trim();
    const first=(addr.split(/\s+/)[0]||'').replace(/[^0-9-]/g,'');
    let piece='';
    if(first.includes('-')){ const parts=first.split('-').filter(Boolean); piece=parts[parts.length-1]||''; }
    else { const digits=first.replace(/\D/g,''); piece=digits.length>2?digits.slice(-2):digits; }
    piece=piece.replace(/^0+(?=\d)/,''); return piece||'•';
  }
  function statusClass(l){let st=(l.status||'fresh'); if(['do_not_knock','not_qualified','not_interested'].includes(st))return'dnk'; if(['knocked','not_home','callback','interested','set','sat','closed'].includes(st))return'worked'; try{return leadQuality(l)>=70?'hot':''}catch(e){return''}}
  function selectedId(){return window._m2SelectedLeadId || (typeof currentLeadId!=='undefined'?currentLeadId:'') || '';}
  function shouldShowLabels(){try{return map && map.getZoom && map.getZoom()>=18;}catch(e){return false}}
  function regridIcon(l,idx){
    const show=shouldShowLabels(); const selected=selectedId()===l.id;
    const row=idx%3; const dx=(idx%2?7:-7); const dy=(row-1)*5;
    const h=shortHouseDigits(l), ln=lastName(l);
    const html=`<div class="m2-field-home-pin ${statusClass(l)} ${show?'':'no-name'} ${selected?'selected':''}" style="margin-left:${show&&!selected?dx:0}px;margin-top:${show&&!selected?dy:0}px"><span class="tap-zone"></span><span class="dot">☀️</span><span class="last"><span class="hn">${esc(h)}</span><span class="ln">${esc(ln)}</span></span></div>`;
    return L.divIcon({className:'',html,iconSize:[show?92:34,show?48:34],iconAnchor:[show?46:17,show?24:17],popupAnchor:[0,-16]});
  }
  function popupHtml(l){let q=0, ss=0; try{q=leadQuality(l)}catch(e){} try{ss=sunScore(l)}catch(e){} return `<b>✅ SELECTED</b><br><b>${esc(nameOfSafe(l))}</b><br><span>${esc(l.addr||l.address||'')}</span><br>${l.phone?`📞 ${esc(l.phone)}<br>`:''}${l.email?`✉️ ${esc(l.email)}<br>`:''}<span>Score ${ss} · Quality ${q}</span><div class="m2-pop-actions"><button onclick="try{map.closePopup()}catch(e){}">Close</button><button onclick="try{openLead('${esc(l.id)}')}catch(e){}">Expand Lead</button></div>`;}

  function highlightProperty(l){
    try{ if(window._m2PropertyHighlight){ map.removeLayer(window._m2PropertyHighlight); window._m2PropertyHighlight=null; } }catch(e){}
    if(!map||!l||!l.lat||!l.lng) return;
    const lat=+l.lat,lng=+l.lng;
    // Approximate NYC lot footprint around pin. Keeps UI smooth without needing full parcel geometry.
    let zoom=map.getZoom?map.getZoom():18;
    let latD=zoom>=19?0.000017:0.000023;
    let lngD=zoom>=19?0.000022:0.000030;
    try{
      window._m2PropertyHighlight=L.rectangle([[lat-latD,lng-lngD],[lat+latD,lng+lngD]],{
        className:'m2-property-highlight',color:'#38bdf8',weight:2,fillColor:'#38bdf8',fillOpacity:.22,opacity:.95,dashArray:'5 3',interactive:false
      }).addTo(map);
      window._m2PropertyHighlight.bringToFront();
    }catch(e){}
  }
  function ensureSelectedStrip(){
    let s=document.getElementById('m2SelectedStrip'); if(s) return s;
    s=document.createElement('div'); s.id='m2SelectedStrip'; s.className='m2-selected-strip';
    s.innerHTML=`<div class="sel-dot">✓</div><div class="sel-main"><b id="m2SelName">Selected house</b><span id="m2SelAddr"></span></div><button id="m2SelOpen">Open</button><button class="gray" id="m2SelClear">Clear</button>`;
    (document.querySelector('.map-wrap')||document.body).appendChild(s);
    s.querySelector('#m2SelOpen').onclick=()=>{let id=selectedId(); if(id) try{openLead(id)}catch(e){}};
    s.querySelector('#m2SelClear').onclick=()=>{window._m2SelectedLeadId=''; if(typeof currentLeadId!=='undefined') currentLeadId=null; s.classList.remove('open'); try{if(window._m2PropertyHighlight){map.removeLayer(window._m2PropertyHighlight);window._m2PropertyHighlight=null;}}catch(e){} try{map.closePopup()}catch(e){} try{window.renderMarkers()}catch(e){}};
    return s;
  }
  function showSelectedStrip(l){let s=ensureSelectedStrip(); let n=s.querySelector('#m2SelName'), a=s.querySelector('#m2SelAddr'); if(n)n.textContent='Selected: '+nameOfSafe(l); if(a)a.textContent=(l.addr||l.address||'')+(l.phone?(' · '+l.phone):''); s.classList.add('open');}
  function disableMapCreate(){try{if(map&&map.off) map.off('click')}catch(e){} try{if(window.draftMarker){window.draftMarker.remove();window.draftMarker=null}}catch(e){} window._openCreateFromDraft=function(){try{toast('Tap-to-create is off. Use Add Lead.')}catch(e){}};}
  function selectLead(l,m){
    window._m2SelectedLeadId=l.id; if(typeof currentLeadId!=='undefined') currentLeadId=l.id;
    highlightProperty(l); showSelectedStrip(l);
    try{ if(map&&map.panTo) map.panTo([+l.lat,+l.lng],{animate:true,duration:.18}); }catch(e){}
    try{ Object.entries(markers||{}).forEach(([id,mm],i)=>{let lead=(state.leads||[]).find(x=>x.id===id); if(lead&&mm&&mm.setIcon) mm.setIcon(regridIcon(lead,i));}); }catch(e){}
    try{ if(m&&m.bindPopup)m.bindPopup(popupHtml(l),{autoPan:true,closeButton:true,maxWidth:230}).openPopup(); }catch(e){}
  }
  window.renderMarkers=function(){
    try{
      disableMapCreate();
      Object.values(markers||{}).forEach(m=>map.removeLayer(m)); markers={};
      let arr=(typeof filterLeads==='function'?filterLeads():((state&&state.leads)||[])).filter(l=>l&&l.lat&&l.lng);
      const b=map&&map.getBounds?map.getBounds().pad(0.10):null;
      if(b) arr=arr.filter(l=>b.contains([+l.lat,+l.lng]));
      // Keep field view smooth: nearby visible labels only on phone; desktop can handle more.
      arr=arr.sort((a,b)=>{try{return leadQuality(b)-leadQuality(a)}catch(e){return 0}}).slice(0,isPhone()?150:900);
      arr.forEach((l,i)=>{
        const m=L.marker([+l.lat,+l.lng],{icon:regridIcon(l,i),interactive:true,keyboard:false,riseOnHover:true}).addTo(map);
        m.on('click',ev=>{try{if(ev&&ev.originalEvent)L.DomEvent.stop(ev.originalEvent)}catch(e){} selectLead(l,m);});
        markers[l.id]=m;
      });
      try{let sid=selectedId(); let l=(state.leads||[]).find(x=>x.id===sid); if(l) highlightProperty(l);}catch(e){}
    }catch(e){try{info('Regrid marker render protected: '+e.message)}catch(_){}}
  };
  try{renderMarkers=window.renderMarkers}catch(e){}
  const oldOpen=window.openLead;
  if(typeof oldOpen==='function'){
    window.openLead=function(id){try{let l=(state.leads||[]).find(x=>x.id===id); if(l){window._m2SelectedLeadId=id; if(typeof currentLeadId!=='undefined')currentLeadId=id; highlightProperty(l); showSelectedStrip(l);}}catch(e){} return oldOpen.apply(this,arguments);};
  }
  try{map.on('zoomstart movestart',()=>{try{map.closePopup()}catch(e){}}); map.on('zoomend moveend',()=>{clearTimeout(window._m2RegridRender); window._m2RegridRender=setTimeout(()=>{try{window.renderMarkers()}catch(e){}},230);});}catch(e){}
  window.addEventListener('load',()=>setTimeout(()=>{disableMapCreate(); try{window.renderMarkers()}catch(e){} try{info('✓ Regrid-style labels on: transparent last-name labels + selected property highlight.')}catch(e){}},950));
})();
</script>



<script>
/* M2 MOBILE SMOOTH + SAAS SETUP V1
   - Smoother mobile label rendering: hide labels while moving, restore after idle
   - Better selected-property field card actions: Call, Text, Disposition, Expand, Next Address
   - SaaS customer setup wizard: company, admin, seats, market, Supabase, import/rep checklist
   - Subscription/admin screen: plan, seat limit, status, renewal date, activate/deactivate controls */
(function(){
  const isPhone=()=>/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||Math.min(screen.width||9999,window.innerWidth||9999)<=820;
  const SAAS_KEY='m2_saas_setup_v1';
  const PLAN_KEY='m2_subscription_admin_v1';
  const css=document.createElement('style');
  css.textContent=`
    body.m2-map-moving .m2-field-home-pin .last{opacity:0!important;transform:scale(.86)!important;pointer-events:none!important;}
    body.m2-map-moving .m2-property-highlight{opacity:.45!important;}
    body.m2-map-moving .leaflet-popup{display:none!important;}
    .m2-selected-strip{display:none;position:absolute;left:10px;right:10px;bottom:74px;z-index:900;background:rgba(7,17,29,.88);border:1px solid rgba(56,189,248,.35);border-radius:18px;padding:9px;box-shadow:0 12px 32px rgba(0,0,0,.42);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);gap:8px;align-items:center;}
    .m2-selected-strip.open{display:flex;}
    .m2-selected-strip .sel-dot{width:31px;height:31px;border-radius:999px;background:#38bdf8;color:#06101c;display:grid;place-items:center;font-weight:1000;flex:0 0 auto;box-shadow:0 0 0 4px rgba(56,189,248,.22)}
    .m2-selected-strip .sel-main{min-width:0;flex:1}.m2-selected-strip .sel-main b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}.m2-selected-strip .sel-main span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#9fb1c6;font-size:10.5px;margin-top:2px}
    .m2-selected-strip .sel-actions{display:flex;gap:5px;overflow-x:auto;max-width:54%;padding-bottom:1px}.m2-selected-strip button{border:0;border-radius:999px;padding:8px 10px;font-size:10.5px;font-weight:1000;background:#1f6feb;color:#fff;white-space:nowrap}.m2-selected-strip button.gray{background:#26384f}.m2-selected-strip button.green{background:#238636}.m2-selected-strip button.gold{background:#8a6500;color:#fff}.m2-selected-strip button.red{background:#7f1d1d}
    @media(max-width:700px){.m2-selected-strip{left:7px;right:7px;bottom:68px;padding:8px;border-radius:16px}.m2-selected-strip .sel-actions{max-width:50%}.m2-selected-strip button{padding:7px 8px;font-size:10px}}
    .m2-saas-card{border:1px solid rgba(42,255,194,.20)!important;background:linear-gradient(180deg,rgba(42,255,194,.075),rgba(56,189,248,.045))!important}.m2-saas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}.m2-saas-step{border:1px solid rgba(255,255,255,.10);border-radius:13px;padding:9px;background:rgba(255,255,255,.045)}.m2-saas-step b{display:block;font-size:11px}.m2-saas-step span{font-size:10px;color:#9fb1c6}.m2-saas-step.ok{border-color:rgba(42,255,194,.32);background:rgba(42,255,194,.08)}.m2-saas-step.warn{border-color:rgba(249,199,79,.32);background:rgba(249,199,79,.07)}
    .m2-plan-pill{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.055);padding:5px 8px;border-radius:999px;font-size:10px;font-weight:900;margin:3px 3px 3px 0}.m2-plan-pill.active{background:rgba(42,255,194,.12);border-color:rgba(42,255,194,.28);color:#2affc2}.m2-plan-pill.past{background:rgba(248,81,73,.12);border-color:rgba(248,81,73,.32);color:#ff8d87}.m2-plan-pill.trial{background:rgba(249,199,79,.12);border-color:rgba(249,199,79,.32);color:#f9c74f}.m2-form-note{font-size:11px;color:#9fb1c6;margin:8px 0 0;line-height:1.35}.m2-mini-check{display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);border-radius:12px;padding:8px;margin-top:6px}.m2-mini-check input{width:17px;height:17px}.m2-mini-check span{font-size:11px;color:#d8e2f0}.m2-safe-section{scroll-margin-top:80px;}
  `;
  document.head.appendChild(css);

  function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
  function getJSON(k,d){try{return JSON.parse(localStorage.getItem(k)||'')||d}catch(e){return d}}
  function putJSON(k,v){localStorage.setItem(k,JSON.stringify(v));}
  function saas(){return getJSON(SAAS_KEY,{company:'',admin_name:'',admin_email:'',seats:3,market:'Queens / Long Island',supabase_saved:false,import_done:false,first_rep_done:false,setup_done:false});}
  function plan(){return getJSON(PLAN_KEY,{plan:'Pro',seat_limit:3,status:'Trial',renewal:'',price:97,notes:''});}
  function saveSaasFromForm(){
    const s=saas();
    ['company','admin_name','admin_email','market'].forEach(k=>{let el=document.getElementById('saas_'+k); if(el)s[k]=el.value.trim();});
    let seats=document.getElementById('saas_seats'); if(seats)s.seats=+seats.value||1;
    ['supabase_saved','import_done','first_rep_done'].forEach(k=>{let el=document.getElementById('saas_'+k); if(el)s[k]=!!el.checked;});
    s.setup_done=!!(s.company&&s.admin_email&&s.seats&&s.market&&s.supabase_saved&&s.import_done&&s.first_rep_done);
    s.updated_at=new Date().toISOString(); putJSON(SAAS_KEY,s);
    try{let st=typeof settings==='function'?settings():{}; st.company=s.company||st.company; st.territory=s.market||st.territory; saveSettings(st);}catch(e){}
    try{toast('✓ SaaS setup saved')}catch(e){}
    try{closeModal()}catch(e){}
    try{renderStats()}catch(e){}
  }
  function savePlanFromForm(){
    const p=plan();
    ['plan','status','renewal','notes'].forEach(k=>{let el=document.getElementById('sub_'+k); if(el)p[k]=el.value;});
    let sl=document.getElementById('sub_seat_limit'); if(sl)p.seat_limit=+sl.value||1;
    let pr=document.getElementById('sub_price'); if(pr)p.price=+pr.value||0;
    p.updated_at=new Date().toISOString(); putJSON(PLAN_KEY,p);
    try{toast('✓ Subscription settings saved')}catch(e){}
    try{closeModal()}catch(e){}
    try{renderStats()}catch(e){}
  }
  function openSaasSetup(){
    const s=saas();
    if(typeof modal!=='function')return alert('Setup wizard unavailable');
    modal('🚀 SaaS Customer Setup',`<div class="form-grid-2"><div class="form-row"><label>Company / Team Name</label><input id="saas_company" value="${esc(s.company)}" placeholder="Example: Queens Solar Team"></div><div class="form-row"><label>Market / Territory</label><input id="saas_market" value="${esc(s.market)}" placeholder="Queens / Long Island"></div><div class="form-row"><label>Owner / Admin Name</label><input id="saas_admin_name" value="${esc(s.admin_name)}" placeholder="Admin name"></div><div class="form-row"><label>Owner / Admin Email</label><input id="saas_admin_email" value="${esc(s.admin_email)}" placeholder="admin@email.com"></div><div class="form-row"><label>Agent Seats</label><input id="saas_seats" type="number" min="1" value="${esc(s.seats)}"></div></div><p class="m2-form-note">Use this when setting up a new paying customer/team. It keeps onboarding simple: company, admin, seats, market, Supabase, import leads, create first rep.</p><label class="m2-mini-check"><input type="checkbox" id="saas_supabase_saved" ${s.supabase_saved?'checked':''}><span>Supabase connection saved and tested</span></label><label class="m2-mini-check"><input type="checkbox" id="saas_import_done" ${s.import_done?'checked':''}><span>Leads imported or loaded from cloud</span></label><label class="m2-mini-check"><input type="checkbox" id="saas_first_rep_done" ${s.first_rep_done?'checked':''}><span>First rep created and lead assignment tested</span></label><div class="action-grid"><button class="green" data-saas="saveSetup">Save Setup</button><button class="blue" data-action="openAgentSetup">Create First Rep</button><button class="gold" data-action="closeModal">Close</button></div>`);
  }
  function openSubscription(){
    const p=plan();
    if(typeof modal!=='function')return alert('Subscription screen unavailable');
    modal('💳 Subscription / Account Admin',`<div class="form-grid-2"><div class="form-row"><label>Plan</label><select id="sub_plan"><option ${p.plan==='Starter'?'selected':''}>Starter</option><option ${p.plan==='Pro'?'selected':''}>Pro</option><option ${p.plan==='Team'?'selected':''}>Team</option><option ${p.plan==='Enterprise'?'selected':''}>Enterprise</option></select></div><div class="form-row"><label>Status</label><select id="sub_status"><option ${p.status==='Trial'?'selected':''}>Trial</option><option ${p.status==='Active'?'selected':''}>Active</option><option ${p.status==='Past Due'?'selected':''}>Past Due</option><option ${p.status==='Disabled'?'selected':''}>Disabled</option></select></div><div class="form-row"><label>Seat Limit</label><input id="sub_seat_limit" type="number" min="1" value="${esc(p.seat_limit)}"></div><div class="form-row"><label>Monthly Price</label><input id="sub_price" type="number" min="0" value="${esc(p.price)}"></div><div class="form-row"><label>Renewal Date</label><input id="sub_renewal" type="date" value="${esc(p.renewal)}"></div></div><div class="form-row"><label>Admin Notes</label><textarea id="sub_notes" placeholder="Payment notes, customer status, support notes">${esc(p.notes)}</textarea></div><div class="action-grid"><button class="green" data-saas="savePlan">Save Subscription</button><button class="blue" data-saas="activatePlan">Mark Active</button><button class="red" data-saas="disablePlan">Disable Account</button><button data-action="closeModal">Close</button></div><p class="m2-form-note">Manual billing control for now. Stripe can be added later, but this gives you plan/status/seat controls right away.</p>`);
  }
  function setupProgress(){const s=saas(); const steps=[!!s.company,!!s.admin_email,!!s.seats,!!s.market,!!s.supabase_saved,!!s.import_done,!!s.first_rep_done]; return {done:steps.filter(Boolean).length,total:steps.length,steps};}
  function subscriptionPill(){const p=plan(), cl=String(p.status||'Trial').toLowerCase().includes('active')?'active':String(p.status||'').toLowerCase().includes('past')?'past':'trial'; return `<span class="m2-plan-pill ${cl}">${esc(p.status||'Trial')}</span><span class="m2-plan-pill">${esc(p.plan||'Pro')}</span><span class="m2-plan-pill">Seats ${esc(p.seat_limit||1)}</span><span class="m2-plan-pill">$${esc(p.price||0)}/mo</span>${p.renewal?`<span class="m2-plan-pill">Renews ${esc(p.renewal)}</span>`:''}`;}
  function saasPanel(){
    const s=saas(), p=plan(), pg=setupProgress();
    const labels=['Company','Admin','Seats','Market','Supabase','Import','First Rep'];

  function enhanceSelectedStrip(){

  }
  const oldOpen=window.openLead;
  if(typeof oldOpen==='function'){
    window.openLead=function(id){let r=oldOpen.apply(this,arguments); setTimeout(updateSelectedStrip,30); return r;};
    try{openLead=window.openLead}catch(e){}
  }
  const oldStats=window.renderStats|| (typeof renderStats==='function'?renderStats:null);
  if(oldStats){
    window.renderStats=function(){oldStats.apply(this,arguments); setTimeout(injectSaasPanel,60);};
    try{renderStats=window.renderStats}catch(e){}
  }

  // Movement smoothness: don't render labels until map is idle.
  function markMoving(on){document.body.classList.toggle('m2-map-moving',!!on)}
  try{
    map.on('movestart zoomstart',()=>{markMoving(true); clearTimeout(window._m2SmoothIdle);});
    map.on('moveend zoomend',()=>{clearTimeout(window._m2SmoothIdle); window._m2SmoothIdle=setTimeout(()=>{markMoving(false); try{window.renderMarkers()}catch(e){}}, isPhone()?420:220);});
  }catch(e){}

  document.addEventListener('click',function(ev){
    const btn=ev.target.closest('[data-saas]'); if(!btn)return;
    const a=btn.dataset.saas;
    if(a==='openSetup')openSaasSetup();

  });

  window.addEventListener('load',()=>setTimeout(()=>{try{injectSaasPanel()}catch(e){} try{enhanceSelectedStrip()}catch(e){} try{toast('✓ Mobile Smooth + SaaS Setup loaded')}catch(e){}},1200));
})();

  }

  window.m2SelectLeadOnly = selectLeadOnly;

  function nextFromLead(lead){

             (typeof nextAfterDisposition==='function'?nextAfterDisposition(lead):null) ||
             (typeof nextBestLead==='function'?nextBestLead():null);

  // Add a small field-safe note in the selected card so reps know Expand is manual.

<script>
/* M2 Next Forward Block Patch
   Fixes Next Address bounce-back. It now walks forward along the same block/street,
   using house-number order and a remembered direction instead of nearest-neighbor only. */
(function(){
  const WALK_KEY='m2_block_walk_state_v1';

  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function norm(s){return String(s||'').toLowerCase().replace(/\b(street|st|avenue|ave|road|rd|boulevard|blvd|drive|dr|lane|ln|place|pl|court|ct|terrace|ter|circle|cir|parkway|pkwy)\b/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim()}
  function streetName(address){
    const a=String(address||'').trim();
    // remove leading Queens-style number: 259-27, 25927, 259 27, etc.
    return norm(a.replace(/^\s*\d{1,5}(?:[-\s]\d{1,4})?\s+/,'').replace(/,\s*.*$/,''));
  }
  function houseNum(address){
    const a=String(address||'').trim();
    let m=a.match(/^\s*(\d{1,5})[-\s](\d{1,4})\b/);
    if(m){
      const prefix=parseInt(m[1],10)||0;
      const suffix=parseInt(m[2],10)||0;
      return prefix*1000 + suffix;
    }
    m=a.match(/^\s*(\d{1,6})\b/);
    if(m) return parseInt(m[1],10)||0;
    return 0;
  }
  function side(num){return Math.abs(num)%2}
  function isOpenLead(l){
    const s=String(l?.status||l?.leadStatus||l?.disposition||'').toLowerCase();
    const ap=String(l?.appointmentOutcome||l?.apptOutcome||'').toLowerCase();
    return !/(closed|do not knock|dnk|not qualified|not interested|renter)/.test(s) && !/(closed|lost)/.test(ap);
  }
  function getLeads(){
    try{return (state.leads||[]).filter(Boolean)}catch(e){return []}
  }
  function getWalk(){
    try{return JSON.parse(localStorage.getItem(WALK_KEY)||'{}')||{}}catch(e){return {}}
  }
  function saveWalk(w){
    try{localStorage.setItem(WALK_KEY,JSON.stringify(w||{}))}catch(e){}
  }
  function selectedLead(){
    try{
      const id=window._m2SelectedLeadId||currentLeadId;
      return getLeads().find(l=>l.id===id) || null;
    }catch(e){return null}
  }
  function sameBlockCandidates(current){
    const st=streetName(current.address||current.property||current.street||'');
    const n=houseNum(current.address||current.property||'');
    if(!st || !n)return [];
    return getLeads()
      .filter(l=>l && l.id!==current.id && isOpenLead(l))
      .map(l=>({lead:l, st:streetName(l.address||l.property||l.street||''), n:houseNum(l.address||l.property||''), sd:side(houseNum(l.address||l.property||''))}))
      .filter(x=>x.st===st && x.n>0)
      .sort((a,b)=>a.n-b.n);
  }

  function nextForwardOnBlock(current){
    if(!current)return null;
    const curN=houseNum(current.address||current.property||'');
    const curStreet=streetName(current.address||current.property||current.street||'');
    const curSide=side(curN);
    const cands=sameBlockCandidates(current);
    if(!cands.length)return null;

    let walk=getWalk();
    if(walk.street!==curStreet || !walk.direction){
      walk={street:curStreet,direction:'up',lastId:current.id,lastNumber:curN,side:curSide};
    }

    // Stay on same side of street first, then opposite side if same side is done.
    let sameSide=cands.filter(x=>x.sd===curSide);
    let otherSide=cands.filter(x=>x.sd!==curSide);

    function pickForward(list){
      if(walk.direction==='down'){
        return [...list].sort((a,b)=>b.n-a.n).find(x=>x.n<curN) || null;
      }
      return [...list].sort((a,b)=>a.n-b.n).find(x=>x.n>curN) || null;
    }

    function pickContinue(list){
      let p=pickForward(list);
      if(p)return p;
      // If you reach the end of the side, continue from the nearest remaining on the opposite side,
      // not the previous house. This prevents back-and-forth bouncing.
      if(walk.direction==='down') return [...list].sort((a,b)=>b.n-a.n)[0] || null;
      return [...list].sort((a,b)=>a.n-b.n)[0] || null;
    }

    let chosen=pickForward(sameSide);
    if(!chosen) chosen=pickForward(otherSide);

    // If no forward lead exists on either side, go to first remaining ahead-style by sorted order.
    // This keeps moving through the block instead of jumping back to the last selected lead.
    if(!chosen){
      const remaining=[...sameSide,...otherSide].filter(x=>x.lead.id!==walk.lastId);
      if(remaining.length){
        chosen = walk.direction==='down'
          ? remaining.sort((a,b)=>b.n-a.n)[0]
          : remaining.sort((a,b)=>a.n-b.n)[0];
      }
    }

    if(chosen){
      saveWalk({street:curStreet,direction:walk.direction,lastId:chosen.lead.id,lastNumber:chosen.n,side:chosen.sd});
      return chosen.lead;
    }
    return null;
  }

  function selectOnly(lead){
    if(!lead)return null;
    try{switchView('map')}catch(e){}
    try{window._m2SelectedLeadId=lead.id; currentLeadId=lead.id;}catch(e){}
    try{
      if(lead.lat && lead.lng && map){
        const z=Math.max(map.getZoom?map.getZoom():18,18);
        if(map.panTo) map.panTo([+lead.lat,+lead.lng],{animate:true,duration:.22});
        setTimeout(()=>{try{map.invalidateSize(false)}catch(e){}},80);
      }
    }catch(e){}
    try{if(typeof highlightProperty==='function')highlightProperty(lead)}catch(e){}
    try{if(typeof showSelectedStrip==='function')showSelectedStrip(lead)}catch(e){}
    try{if(typeof updateSelectedStrip==='function')updateSelectedStrip()}catch(e){}
    try{if(window.renderMarkers)setTimeout(()=>window.renderMarkers(),50)}catch(e){}
    try{document.getElementById('leadSheet')?.classList.remove('open')}catch(e){}
    toastSafe('Next home selected on this block');
    return lead;
  }

  window.m2NextForwardBlock=function(){
    const cur=selectedLead();
    let nxt=nextForwardOnBlock(cur);
    if(!nxt){
      try{nxt=typeof nextBestLead==='function'?nextBestLead():null}catch(e){}
    }
    if(!nxt)return toastSafe('No next home found on this block');
    return selectOnly(nxt);
  };

  // Override next/select-only helper to use true forward block walking.
  window.m2GoNextSelectOnly=window.m2NextForwardBlock;

  function wire(){
    const ids=['m2SelNext','nextAddressBtn','saveNextBtn'];
    ids.forEach(id=>{
      const btn=document.getElementById(id);
      if(btn && btn.dataset.forwardBlock!=='1'){
        btn.dataset.forwardBlock='1';
        btn.onclick=function(ev){
          ev.preventDefault(); ev.stopPropagation();
          window.m2NextForwardBlock();
          return false;
        };
      }
    });
    // Any button text that says Next Address
    document.querySelectorAll('button').forEach(btn=>{
      const t=(btn.textContent||'').trim().toLowerCase();
      if((t==='next address'||t.includes('save & next')||t==='next') && btn.dataset.forwardBlock!=='1'){
        btn.dataset.forwardBlock='1';
        btn.addEventListener('click',function(ev){
          if((btn.textContent||'').toLowerCase().includes('next')){
            ev.preventDefault(); ev.stopPropagation();
            window.m2NextForwardBlock();
            return false;
          }
        },true);
      }
    });
  }

  const css=document.createElement('style');
  css.textContent=`
    .m2-block-walk-note{
      position:absolute;right:12px;bottom:4px;
      font:800 9px/1.1 system-ui,-apple-system,Segoe UI,sans-serif;
      color:#a7f3d0;opacity:.9;pointer-events:none;
      max-width:155px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
  `;
  document.head.appendChild(css);

  function note(){
    const strip=document.getElementById('m2SelectedStrip');
    if(strip && !strip.querySelector('.m2-block-walk-note')){
      const d=document.createElement('div');
      d.className='m2-block-walk-note';
      d.textContent='Next walks forward on block';
      strip.appendChild(d);
    }
  }

  setInterval(()=>{wire();note();},600);
  window.addEventListener('load',()=>setTimeout(()=>{wire();note();toastSafe('✓ Next now walks forward on the block');},1000));
})();
</script>


<script>
/* M2 Strict Same-Block Next Patch
   Prevents Next Address from jumping to another block/street.
   It only moves to the next open home on the same normalized street + Queens block prefix. */
(function(){
  const WALK_KEY='m2_strict_block_walk_v2';

  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function leads(){try{return (state.leads||[]).filter(Boolean)}catch(e){return []}}
  function activeLead(){
    try{
      const id=window._m2SelectedLeadId||currentLeadId;
      return leads().find(l=>l.id===id)||null;
    }catch(e){return null}
  }

  function rawAddress(l){
    return String(l?.address||l?.property||l?.streetAddress||l?.fullAddress||'').trim();
  }

  function cleanStreet(s){
    return String(s||'')
      .toLowerCase()
      .replace(/,\s*(queens|brooklyn|bronx|new york|ny|long island|nassau|suffolk).*$/i,'')
      .replace(/\b(street)\b/g,'st')
      .replace(/\b(avenue)\b/g,'ave')
      .replace(/\b(road)\b/g,'rd')
      .replace(/\b(boulevard)\b/g,'blvd')
      .replace(/\b(drive)\b/g,'dr')
      .replace(/\b(lane)\b/g,'ln')
      .replace(/\b(place)\b/g,'pl')
      .replace(/\b(court)\b/g,'ct')
      .replace(/\b(terrace)\b/g,'ter')
      .replace(/\b(parkway)\b/g,'pkwy')
      .replace(/[^a-z0-9 ]/g,' ')
      .replace(/\s+/g,' ')
      .trim();
  }

  function parts(address){
    const a=String(address||'').trim();

    // Queens formats:
    // 259-02 Francis Lewis Blvd -> blockPrefix 259, suffix 2, sort 259002
    // 25927 Francis Lewis Blvd -> blockPrefix 259, suffix 27, sort 259027
    // 259 27 Francis Lewis Blvd -> blockPrefix 259, suffix 27
    let m=a.match(/^\s*(\d{2,4})[-\s](\d{1,3})\s+(.+)$/);
    if(m){
      const prefix=parseInt(m[1],10)||0;
      const suffix=parseInt(m[2],10)||0;
      return {prefix, suffix, sort:prefix*1000+suffix, street:cleanStreet(m[3])};
    }

    m=a.match(/^\s*(\d{4,6})\s+(.+)$/);
    if(m){
      const full=m[1];
      let prefix=0, suffix=0;
      if(full.length>=5){
        prefix=parseInt(full.slice(0, full.length-2),10)||0;
        suffix=parseInt(full.slice(-2),10)||0;
      }else{
        prefix=Math.floor((parseInt(full,10)||0)/100);
        suffix=(parseInt(full,10)||0)%100;
      }
      return {prefix, suffix, sort:prefix*1000+suffix, street:cleanStreet(m[2])};
    }

    return {prefix:0,suffix:0,sort:0,street:cleanStreet(a.replace(/^\s*\d+\s+/,''))};
  }

  function sameBlockKey(l){
    const p=parts(rawAddress(l));
    return `${p.street}|${p.prefix}`;
  }

  function isClosedOrDone(l){
    const fields=[l.status,l.leadStatus,l.disposition,l.appointmentOutcome,l.apptOutcome].map(x=>String(x||'').toLowerCase()).join(' ');
    return /(closed|do not knock|dnk|not qualified|not interested|renter|lost)/.test(fields);
  }

  function sameBlockOpen(current){
    const cp=parts(rawAddress(current));
    const key=sameBlockKey(current);
    return leads()
      .filter(l=>l && l.id!==current.id && !isClosedOrDone(l))
      .map(l=>({lead:l, p:parts(rawAddress(l)), key:sameBlockKey(l)}))
      .filter(x=>x.key===key && x.p.sort>0)
      .sort((a,b)=>a.p.sort-b.p.sort);
  }

  function getWalk(){try{return JSON.parse(localStorage.getItem(WALK_KEY)||'{}')||{}}catch(e){return {}}}
  function saveWalk(w){try{localStorage.setItem(WALK_KEY,JSON.stringify(w||{}))}catch(e){}}

  function selectOnly(lead){
    if(!lead)return null;
    try{switchView('map')}catch(e){}
    try{window._m2SelectedLeadId=lead.id; currentLeadId=lead.id;}catch(e){}
    try{
      if(lead.lat && lead.lng && map){
        const z=Math.max(map.getZoom?map.getZoom():18,18);
        if(map.panTo) map.panTo([+lead.lat,+lead.lng],{animate:true,duration:.22});
      }
    }catch(e){}
    try{if(typeof highlightProperty==='function')highlightProperty(lead)}catch(e){}
    try{if(typeof showSelectedStrip==='function')showSelectedStrip(lead)}catch(e){}
    try{if(typeof updateSelectedStrip==='function')updateSelectedStrip()}catch(e){}
    try{if(window.renderMarkers)setTimeout(()=>window.renderMarkers(),60)}catch(e){}
    try{document.getElementById('leadSheet')?.classList.remove('open')}catch(e){}
    toastSafe('Next home selected on same block');
    return lead;
  }

  function nextStrict(current){
    if(!current)return null;
    const cp=parts(rawAddress(current));
    if(!cp.street || !cp.prefix || !cp.sort)return null;

    const key=sameBlockKey(current);
    const cands=sameBlockOpen(current);
    if(!cands.length)return null;

    let walk=getWalk();
    let direction = (walk.key===key && walk.direction) ? walk.direction : 'up';

    // Prefer only homes with a greater suffix/sort number.
    let chosen = cands.find(x=>x.p.sort>cp.sort);

    // If no greater number exists, stop. Do NOT wrap around and do NOT jump blocks.
    // This prevents the field mistake of going backwards or to another street.
    if(!chosen){
      toastSafe('End of this block — no next home ahead');
      return null;
    }

    saveWalk({key, direction, lastId:chosen.lead.id, lastSort:chosen.p.sort});
    return chosen.lead;
  }

  window.m2NextStrictSameBlock=function(){
    const cur=activeLead();
    if(!cur){
      toastSafe('Select a home first');
      return null;
    }
    const nxt=nextStrict(cur);
    if(!nxt)return null;
    return selectOnly(nxt);
  };

  // Override every previous next helper with strict same-block only.
  window.m2NextForwardBlock=window.m2NextStrictSameBlock;
  window.m2GoNextSelectOnly=window.m2NextStrictSameBlock;

  // Override goLead only for Next-related calls if old buttons use helper.
  // Direct Open/Expand still works through the selected card.
  function wire(){
    const buttons=[...document.querySelectorAll('button')];
    buttons.forEach(btn=>{
      const t=(btn.textContent||'').trim().toLowerCase();
      const id=(btn.id||'').toLowerCase();
      const isNext = id.includes('next') || t==='next address' || t.includes('save & next') || t==='next';
      if(isNext && btn.dataset.strictSameBlock!=='1'){
        btn.dataset.strictSameBlock='1';
        btn.onclick=function(ev){
          ev.preventDefault();
          ev.stopPropagation();
          window.m2NextStrictSameBlock();
          return false;
        };
      }
    });
  }

  const css=document.createElement('style');
  css.textContent=`
    .m2-block-walk-note,.m2-next-note{
      display:none!important;
    }
    .m2-strict-block-note{
      position:absolute;right:12px;bottom:4px;
      font:800 9px/1.1 system-ui,-apple-system,Segoe UI,sans-serif;
      color:#fbbf24;opacity:.95;pointer-events:none;
      max-width:175px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
  `;
  document.head.appendChild(css);

  function note(){
    const strip=document.getElementById('m2SelectedStrip');
    if(strip && !strip.querySelector('.m2-strict-block-note')){
      const d=document.createElement('div');
      d.className='m2-strict-block-note';
      d.textContent='Next = same block only';
      strip.appendChild(d);
    }
  }

  setInterval(()=>{wire();note();},600);
  window.addEventListener('load',()=>setTimeout(()=>{wire();note();toastSafe('✓ Next is now strict same-block only');},1000));
})();
</script>


<script>

(function(){
  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function esc(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]})}
  function getLeadById(id){try{return (state.leads||[]).find(function(l){return l&&l.id===id})||null}catch(e){return null}}

  function expandSelected(){

    document.getElementById('m2SelDispo').onclick=function(ev){ev.preventDefault();ev.stopPropagation();dispositionSelected()};
    document.getElementById('m2SelExpand').onclick=function(ev){ev.preventDefault();ev.stopPropagation();expandSelected()};
    document.getElementById('m2SelClear').onclick=function(ev){ev.preventDefault();ev.stopPropagation();clearSelected()};
  }

  window.m2OpenSelectedExpand=expandSelected;
  window.m2OpenSelectedDisposition=dispositionSelected;
  window.m2ClearSelectedHome=clearSelected;
  window.showSelectedStrip=function(lead){buildBar(lead)};
  window.updateSelectedStrip=function(){var l=selectedLead(); if(l)buildBar(l)};

  window.m2GoNextSelectOnly=function(){toastSafe('Next removed — select the next home manually')};
  window.m2NextForwardBlock=function(){toastSafe('Next removed — select the next home manually')};
  window.m2NextStrictSameBlock=function(){toastSafe('Next removed — select the next home manually')};

  function removeNext(){

  }

  var css=document.createElement('style');
  css.textContent = `
    #m2SelectedStrip{
      position:fixed!important;left:10px!important;right:10px!important;bottom:82px!important;

      box-shadow:0 16px 36px rgba(0,0,0,.42)!important;backdrop-filter:blur(14px)!important;-webkit-backdrop-filter:blur(14px)!important;color:white!important;

    #m2SelectedStrip .m2-selected-name{font:900 14px/1.05 system-ui,-apple-system,Segoe UI,sans-serif!important;color:#fff!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
    #m2SelectedStrip .m2-selected-address{font:750 11px/1.2 system-ui,-apple-system,Segoe UI,sans-serif!important;color:#cbd5e1!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;margin-top:2px!important}

  document.head.appendChild(css);

  setInterval(removeNext,700);
  window.addEventListener('load',function(){setTimeout(function(){

    var l=selectedLead(); if(l)buildBar(l);
    toastSafe('✓ Next removed. Selected bar now has Disposition + Expand only.');
  },900)});

</script>


<script>
/* M2 Live Location Pin Patch */
(function(){
  var watchId = null;
  var liveMarker = null;
  var accuracyCircle = null;
  var followMe = true;
  var lastPosition = null;

  function toastSafe(msg){ try{ toast(msg); } catch(e){ console.log(msg); } }
  function ready(){ return typeof map !== "undefined" && map && typeof L !== "undefined"; }
  function feet(m){ return Math.round(Number(m||0) * 3.28084); }
  function accText(m){ var f=feet(m); return f>=5280 ? (f/5280).toFixed(1)+" mi" : f+" ft"; }

  function icon(){
    return L.divIcon({
      className:"",
      html:'<div class="m2-live-dot"><div class="m2-live-pulse"></div><div class="m2-live-core"></div><div class="m2-live-arrow">▲</div></div>',
      iconSize:[34,34],
      iconAnchor:[17,17]
    });
  }

  function status(text, active){
    var el=document.getElementById("m2LiveStatus");
    if(!el) return;
    el.textContent=text;
    if(active) el.classList.add("active"); else el.classList.remove("active");
  }

  function setButtonState(){
    var a=document.getElementById("m2LiveToggle");
    var b=document.getElementById("m2LiveFollow");
    if(a) a.textContent = watchId!==null ? "Stop GPS" : "Live GPS";
    if(b){
      b.textContent = followMe ? "Following" : "Follow Me";
      if(followMe) b.classList.add("active"); else b.classList.remove("active");
    }
  }

  function setPos(pos){
    if(!ready()) return;
    var lat=pos.coords.latitude, lng=pos.coords.longitude, acc=pos.coords.accuracy||20;
    lastPosition={lat:lat,lng:lng,acc:acc,time:Date.now()};

    if(!liveMarker){
      liveMarker=L.marker([lat,lng],{icon:icon(),zIndexOffset:99999,interactive:true}).addTo(map);
      liveMarker.bindPopup("<b>📍 You are here</b><br>Live field location");
    } else {
      liveMarker.setLatLng([lat,lng]);
    }

    if(!accuracyCircle){
      accuracyCircle=L.circle([lat,lng],{
        radius:acc,
        color:"#38bdf8",
        weight:1,
        opacity:.45,
        fillColor:"#38bdf8",
        fillOpacity:.08,
        interactive:false
      }).addTo(map);
    } else {
      accuracyCircle.setLatLng([lat,lng]);
      accuracyCircle.setRadius(acc);
    }

    status("Live ±"+accText(acc), true);

    if(followMe){
      try{
        var z=Math.max(map.getZoom ? map.getZoom() : 18, 18);
        map.panTo([lat,lng],{animate:true,duration:.22});
      }catch(e){}
    }
  }

  function err(e){
    var msg="Location unavailable";
    if(e && e.code===1) msg="Allow GPS in Safari";
    if(e && e.code===3) msg="GPS timeout";
    status(msg,false);
    toastSafe(msg);
  }

  function start(){
    if(!navigator.geolocation){ toastSafe("GPS not supported"); return; }
    if(watchId!==null){ followMe=true; setButtonState(); status("Live GPS on",true); return; }
    status("Starting GPS…",true);
    navigator.geolocation.getCurrentPosition(setPos, err, {enableHighAccuracy:true,timeout:12000,maximumAge:3000});
    watchId=navigator.geolocation.watchPosition(setPos, err, {enableHighAccuracy:true,timeout:15000,maximumAge:2500});
    followMe=true;
    setButtonState();
  }

  function stop(){
    if(watchId!==null){
      try{ navigator.geolocation.clearWatch(watchId); }catch(e){}
      watchId=null;
    }
    followMe=false;
    status("GPS off",false);
    setButtonState();
  }

  function center(){
    if(!lastPosition){ start(); return; }
    followMe=true;
    setButtonState();
    try{
      map.flyTo([lastPosition.lat,lastPosition.lng],Math.max(map.getZoom?map.getZoom():18,18),{animate:true,duration:.35});
    }catch(e){}
  }

  function controls(){
    if(document.getElementById("m2LiveLocationPanel")) return;
    var panel=document.createElement("div");
    panel.id="m2LiveLocationPanel";
    panel.innerHTML='<div id="m2LiveStatus">GPS off</div><button type="button" id="m2LiveToggle">Live GPS</button><button type="button" id="m2LiveFollow">Follow Me</button>';
    document.body.appendChild(panel);
    document.getElementById("m2LiveToggle").onclick=function(ev){ev.preventDefault();ev.stopPropagation(); if(watchId!==null) stop(); else start();};
    document.getElementById("m2LiveFollow").onclick=function(ev){ev.preventDefault();ev.stopPropagation(); center();};
    setButtonState();
  }

  function patchOldButtons(){
    document.querySelectorAll("button").forEach(function(btn){
      var t=(btn.textContent||"").toLowerCase();
      var id=(btn.id||"").toLowerCase();
      if((t.includes("my location") || t.includes("gps") || id.includes("locate")) && btn.dataset.m2LiveGps!=="1"){
        btn.dataset.m2LiveGps="1";
        btn.addEventListener("click",function(){ setTimeout(start,100); },true);
      }
    });
  }

  var css=document.createElement("style");
  css.textContent = `
    #m2LiveLocationPanel{position:fixed!important;right:10px!important;top:calc(env(safe-area-inset-top,0px) + 76px)!important;z-index:99990!important;display:flex!important;align-items:center!important;gap:5px!important;padding:6px!important;border-radius:16px!important;background:rgba(3,7,18,.78)!important;border:1px solid rgba(56,189,248,.28)!important;box-shadow:0 12px 28px rgba(0,0,0,.32)!important;backdrop-filter:blur(12px)!important;-webkit-backdrop-filter:blur(12px)!important;max-width:calc(100vw - 20px)!important}
    #m2LiveStatus{max-width:94px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;color:#cbd5e1!important;font:900 10px/1 system-ui,-apple-system,Segoe UI,sans-serif!important;padding:0 4px!important}
    #m2LiveStatus.active{color:#86efac!important}
    #m2LiveLocationPanel button{appearance:none!important;border:1px solid rgba(148,163,184,.22)!important;border-radius:12px!important;background:rgba(15,23,42,.92)!important;color:white!important;padding:8px 8px!important;font:900 10px/1 system-ui,-apple-system,Segoe UI,sans-serif!important;box-shadow:none!important}
    #m2LiveFollow.active{background:linear-gradient(135deg,#0ea5e9,#2563eb)!important;border-color:rgba(125,211,252,.5)!important}
    .m2-live-dot{position:relative;width:34px;height:34px;border-radius:999px;transform:translateZ(0)}
    .m2-live-pulse{position:absolute;left:2px;top:2px;width:30px;height:30px;border-radius:999px;background:rgba(14,165,233,.24);border:1px solid rgba(125,211,252,.44);animation:m2LivePulse 1.7s ease-out infinite}
    .m2-live-core{position:absolute;left:9px;top:9px;width:16px;height:16px;border-radius:999px;background:#0ea5e9;border:3px solid #fff;box-shadow:0 0 0 3px rgba(14,165,233,.25),0 6px 15px rgba(0,0,0,.35)}
    .m2-live-arrow{position:absolute;left:12px;top:-1px;color:#fff;font:900 9px/1 system-ui;text-shadow:0 1px 5px rgba(0,0,0,.55);opacity:.95}
    @keyframes m2LivePulse{0%{transform:scale(.6);opacity:.95}100%{transform:scale(1.65);opacity:0}}
    @media(max-width:420px){#m2LiveLocationPanel{top:calc(env(safe-area-inset-top,0px) + 64px)!important;right:8px!important;gap:4px!important;padding:5px!important}#m2LiveStatus{max-width:78px!important;font-size:9px!important}#m2LiveLocationPanel button{font-size:9px!important;padding:7px 7px!important}}
  `;
  document.head.appendChild(css);

  window.m2StartLiveLocation=start;
  window.m2StopLiveLocation=stop;
  window.m2CenterLiveLocation=center;

  function boot(){
    controls();
    patchOldButtons();
    try{ if(map && map.on){ map.on("dragstart zoomstart",function(){ followMe=false; setButtonState(); }); } }catch(e){}
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",function(){setTimeout(boot,800)});
  else setTimeout(boot,800);
  setInterval(patchOldButtons,2000);
})();
</script>


<script>
/* M2 Selected Card Auto-Close Patch
   Fixes selected-house bottom bar staying open forever. */
(function(){
  var autoCloseTimer = null;

  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function selectedBar(){return document.getElementById("m2SelectedStrip")}
  function getLeadById(id){try{return (state.leads||[]).find(function(l){return l&&l.id===id})||null}catch(e){return null}}
  function selectedLead(){try{return getLeadById(window._m2SelectedLeadId || currentLeadId)}catch(e){return null}}

  function removeHighlight(){
    try{
      if(window._m2PropertyHighlight && map){
        map.removeLayer(window._m2PropertyHighlight);
        window._m2PropertyHighlight=null;
      }
    }catch(e){}
  }

  function closeSelectedCard(options){
    options = options || {};
    try{clearTimeout(autoCloseTimer)}catch(e){}
    autoCloseTimer = null;

    var strip = selectedBar();
    if(strip){
      strip.classList.add("m2-selected-closing");
      setTimeout(function(){
        var s = selectedBar();
        if(s) s.remove();
      }, 160);
    }

    if(options.clear !== false){
      try{window._m2SelectedLeadId=null}catch(e){}
      try{currentLeadId=null}catch(e){}
      removeHighlight();
      try{if(window.renderMarkers)setTimeout(function(){window.renderMarkers()},80)}catch(e){}
    }
  }

  window.m2CloseSelectedCard = closeSelectedCard;

  function scheduleAutoClose(){
    try{clearTimeout(autoCloseTimer)}catch(e){}
    autoCloseTimer = setTimeout(function(){
      // Only auto-close the card, do not clear selected lead/highlight.
      // This keeps the field clean but selected house still stays visually selected.
      var strip = selectedBar();
      if(strip){
        strip.classList.add("m2-selected-minimized");
      }
    }, 9000);
  }

  function showCardAgain(){
    var strip=selectedBar();
    if(strip){
      strip.classList.remove("m2-selected-minimized");
      scheduleAutoClose();
    }
  }

  function patchSelectedButtons(){
    var clearBtn=document.getElementById("m2SelClear");
    if(clearBtn && clearBtn.dataset.autoCloseFixed!=="1"){
      clearBtn.dataset.autoCloseFixed="1";
      clearBtn.onclick=function(ev){
        ev.preventDefault(); ev.stopPropagation();
        closeSelectedCard({clear:true});
        return false;
      };
    }

    var expandBtn=document.getElementById("m2SelExpand");
    if(expandBtn && expandBtn.dataset.autoCloseFixed!=="1"){
      expandBtn.dataset.autoCloseFixed="1";
      expandBtn.addEventListener("click",function(){
        setTimeout(function(){closeSelectedCard({clear:false})},220);
      },true);
    }

    var dispoBtn=document.getElementById("m2SelDispo");
    if(dispoBtn && dispoBtn.dataset.autoCloseFixed!=="1"){
      dispoBtn.dataset.autoCloseFixed="1";
      dispoBtn.addEventListener("click",function(){
        setTimeout(function(){closeSelectedCard({clear:false})},260);
      },true);
    }

    var strip=selectedBar();
    if(strip && strip.dataset.autoCloseFixed!=="1"){
      strip.dataset.autoCloseFixed="1";
      strip.addEventListener("click",function(ev){
        ev.stopPropagation();
        showCardAgain();
      },true);
      scheduleAutoClose();
    }
  }

  // Wrap selected strip render functions so every new card gets the auto-close behavior.
  var oldShow = window.showSelectedStrip;
  if(typeof oldShow === "function"){
    window.showSelectedStrip = function(lead){
      var r = oldShow.apply(this, arguments);
      setTimeout(function(){patchSelectedButtons(); scheduleAutoClose();},80);
      return r;
    };
  }

  var oldUpdate = window.updateSelectedStrip;
  if(typeof oldUpdate === "function"){
    window.updateSelectedStrip = function(){
      var r = oldUpdate.apply(this, arguments);
      setTimeout(function(){patchSelectedButtons(); scheduleAutoClose();},80);
      return r;
    };
  }

  // Tap empty map/background closes the card but keeps the selected home highlighted.
  document.addEventListener("click",function(ev){
    var strip=selectedBar();
    if(!strip)return;
    if(ev.target.closest && ev.target.closest("#m2SelectedStrip"))return;
    if(ev.target.closest && ev.target.closest(".leaflet-marker-icon"))return;
    if(ev.target.closest && ev.target.closest(".leaflet-popup"))return;
    if(ev.target.closest && ev.target.closest("#leadSheet"))return;
    if(ev.target.closest && ev.target.closest("button,input,select,textarea,a"))return;
    closeSelectedCard({clear:false});
  },true);

  // Moving/zooming the map should hide the bottom card so it does not block field view.
  function wireMap(){
    try{
      if(map && map.on && !map._m2SelectedAutoCloseWired){
        map._m2SelectedAutoCloseWired=true;
        map.on("dragstart zoomstart movestart",function(){closeSelectedCard({clear:false})});
      }
    }catch(e){}
  }

  // Add a tiny reopen button when card is minimized.
  function ensureMiniButton(){
    if(document.getElementById("m2SelectedMini"))return;
    var b=document.createElement("button");
    b.id="m2SelectedMini";
    b.type="button";
    b.textContent="Selected";
    b.onclick=function(ev){
      ev.preventDefault(); ev.stopPropagation();
      var l=selectedLead();
      if(window.showSelectedStrip && l) window.showSelectedStrip(l);
      else toastSafe("Select a home first");
    };
    document.body.appendChild(b);
  }

  var css=document.createElement("style");
  css.textContent=`
    #m2SelectedStrip{
      transition:transform .16s ease, opacity .16s ease, max-height .16s ease!important;
    }
    #m2SelectedStrip.m2-selected-closing{
      transform:translateY(18px)!important;
      opacity:0!important;
      pointer-events:none!important;
    }
    #m2SelectedStrip.m2-selected-minimized{
      transform:translateY(14px)!important;
      opacity:0!important;
      pointer-events:none!important;
    }
    #m2SelectedMini{
      position:fixed!important;
      left:12px!important;
      bottom:82px!important;
      z-index:99980!important;
      border:1px solid rgba(56,189,248,.38)!important;
      border-radius:999px!important;
      padding:8px 11px!important;
      background:rgba(3,7,18,.82)!important;
      color:#dbeafe!important;
      font:900 11px/1 system-ui,-apple-system,Segoe UI,sans-serif!important;
      box-shadow:0 10px 26px rgba(0,0,0,.35)!important;
      backdrop-filter:blur(10px)!important;
      -webkit-backdrop-filter:blur(10px)!important;
    }
    body:not(.m2-has-selected) #m2SelectedMini{display:none!important;}
    @media(max-width:420px){
      #m2SelectedMini{bottom:76px!important;left:10px!important;font-size:10px!important;padding:7px 10px!important;}
    }
  `;
  document.head.appendChild(css);

  function markBody(){
    var has = !!(window._m2SelectedLeadId || currentLeadId);
    document.body.classList.toggle("m2-has-selected", has);
  }

  setInterval(function(){
    patchSelectedButtons();
    wireMap();
    ensureMiniButton();
    markBody();
  },700);

  window.addEventListener("load",function(){
    setTimeout(function(){
      patchSelectedButtons();
      wireMap();
      ensureMiniButton();
      markBody();
      toastSafe("✓ Selected card now auto-closes and can be cleared.");
    },900);
  });
})();
</script>


<script>
/* M2 Field Command Upgrades
   Adds:
   1) Selected Home Lock
   2) Quick Disposition Mini Panel
   3) Today Follow-Up Popups
   4) Block Completion Report
   5) Offline Sync Badge
   6) Cleaner Agent Assignment
*/
(function(){
  const OFFLINE_KEY='m2_offline_sync_status_v1';
  const BLOCK_REPORTS_KEY='m2_block_completion_reports_v1';
  const LOCK_KEY='m2_selected_home_lock_v1';

  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function leads(){try{return (state.leads||[]).filter(Boolean)}catch(e){return []}}
  function agents(){
    try{
      return (state.agents||state.agentAccounts||state.teamAgents||[]).filter(Boolean);
    }catch(e){return []}
  }
  function saveStateSafe(){
    try{saveState()}catch(e){
      try{persist && persist()}catch(_){}
    }
  }
  function syncStatus(){
    try{return JSON.parse(localStorage.getItem(OFFLINE_KEY)||'{}')||{}}catch(e){return {}}
  }
  function putSyncStatus(s){
    try{localStorage.setItem(OFFLINE_KEY,JSON.stringify(s||{}))}catch(e){}
    renderOfflineBadge();
  }
  function markUnsynced(reason){
    const s=syncStatus();
    s.unsynced=true;
    s.reason=reason||'Local changes saved';
    s.lastLocalChange=new Date().toISOString();
    putSyncStatus(s);
  }
  function markSynced(label){
    const s=syncStatus();
    s.unsynced=false;
    s.lastSync=new Date().toISOString();
    s.reason=label||'Synced';
    putSyncStatus(s);
  }
  function todayISO(){
    const d=new Date();
    d.setHours(0,0,0,0);
    return d.toISOString().slice(0,10);
  }
  function tomorrowISO(){
    const d=new Date();
    d.setDate(d.getDate()+1);
    d.setHours(0,0,0,0);
    return d.toISOString().slice(0,10);
  }
  function leadDate(l){
    return String(l.nextFollowUpDate||l.callbackDue||l.followUpDate||l.appointmentDate||'').slice(0,10);
  }
  function statusText(l){
    return String(l.status||l.leadStatus||l.disposition||l.pipelineStage||'').toLowerCase();
  }
  function leadName(l){
    return String(l.owner||l.ownerName||l.name||l.fullName||(((l.first||'')+' '+(l.last||'')).trim())||'Selected Home').trim();
  }
  function leadAddress(l){
    return String(l.address||l.property||l.streetAddress||l.fullAddress||'').trim();
  }
  function selectedId(){
    try{return window._m2SelectedLeadId || currentLeadId || null}catch(e){return null}
  }
  function selectedLead(){
    const id=selectedId();
    return leads().find(l=>l && l.id===id)||null;
  }
  function esc(s){
    return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]});
  }
  function activeBlockKey(l){
    const addr=leadAddress(l);
    let m=addr.match(/^\s*(\d{2,4})[-\s](\d{1,3})\s+(.+)$/);
    if(m)return m[1]+'|'+streetClean(m[3]);
    m=addr.match(/^\s*(\d{4,6})\s+(.+)$/);
    if(m){
      const full=m[1];
      const prefix=full.length>=5?full.slice(0, full.length-2):String(Math.floor(Number(full)/100));
      return prefix+'|'+streetClean(m[2]);
    }
    return '|'+streetClean(addr.replace(/^\s*\d+\s+/,''));
  }
  function streetClean(s){
    return String(s||'').toLowerCase()
      .replace(/,\s*.*/,'')
      .replace(/\b(street)\b/g,'st').replace(/\b(avenue)\b/g,'ave').replace(/\b(road)\b/g,'rd')
      .replace(/\b(boulevard)\b/g,'blvd').replace(/\b(drive)\b/g,'dr').replace(/\b(lane)\b/g,'ln')
      .replace(/\b(place)\b/g,'pl').replace(/\b(court)\b/g,'ct').replace(/\b(terrace)\b/g,'ter')
      .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
  }
  function sameBlock(l){
    const key=activeBlockKey(l);
    return leads().filter(x=>x && activeBlockKey(x)===key);
  }

  /* 1) SELECTED HOME LOCK */
  let locked = localStorage.getItem(LOCK_KEY)==='1';

  function setLock(on){
    locked=!!on;
    localStorage.setItem(LOCK_KEY, locked?'1':'0');
    renderLockButton();
    document.body.classList.toggle('m2-selected-locked', locked);
    toastSafe(locked?'Selected home locked':'Selected home unlocked');
  }

  function renderLockButton(){
    let bar=document.getElementById('m2SelectedStrip');
    if(!bar)return;
    let actions=bar.querySelector('.m2-selected-actions')||bar;
    let btn=document.getElementById('m2SelLock');
    if(!btn){
      btn=document.createElement('button');
      btn.id='m2SelLock';
      btn.type='button';
      actions.insertBefore(btn, actions.firstChild);
      btn.onclick=function(ev){ev.preventDefault();ev.stopPropagation();setLock(!locked)};
    }
    btn.textContent=locked?'Locked':'Lock';
    btn.classList.toggle('active',locked);
  }

  const oldShowSelected=window.showSelectedStrip;
  if(typeof oldShowSelected==='function'){
    window.showSelectedStrip=function(lead){
      if(locked && selectedLead() && lead && lead.id!==selectedLead().id){
        toastSafe('Home locked — tap Clear/Unlock before selecting another');
        return;
      }
      const r=oldShowSelected.apply(this,arguments);
      setTimeout(renderLockButton,60);
      return r;
    };
  }

  document.addEventListener('click',function(ev){
    if(!locked)return;
    if(ev.target.closest && (ev.target.closest('#m2SelectedStrip')||ev.target.closest('#m2QuickDispoPanel')||ev.target.closest('#leadSheet')))return;
    if(ev.target.closest && ev.target.closest('.leaflet-marker-icon')){
      const cur=selectedLead();
      if(cur){
        toastSafe('Home locked — use Clear/Unlock first');
      }
    }
  },true);

  /* 2) QUICK DISPOSITION MINI PANEL */
  const quickDispos=[
    ['not_home','🚪','Not Home'],
    ['interested','🔥','Interested'],
    ['callback','📞','Callback'],
    ['appointment_set','🎯','Appointment Set'],
    ['not_interested','✋','Not Interested'],
    ['do_not_knock','⛔','Do Not Knock']
  ];

  function normalizeDispoLabel(v){
    return String(v||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  }

  function setLeadDisposition(l, value){
    if(!l)return;
    const label=normalizeDispoLabel(value);
    l.disposition=value;
    l.status=label;
    l.leadStatus=label;
    l.lastDispositionAt=new Date().toISOString();
    l.updatedAt=new Date().toISOString();
    if(value==='callback' && !l.nextFollowUpDate) l.nextFollowUpDate=todayISO();
    if(value==='appointment_set'){
      l.pipelineStage='Appointment Set';
      if(!l.appointmentDate) l.appointmentDate=todayISO();
    }
    if(value==='do_not_knock') l.doNotKnock=true;
    if(!Array.isArray(l.timeline))l.timeline=[];
    l.timeline.unshift({type:'disposition',value:label,at:new Date().toISOString()});
    saveStateSafe();
    markUnsynced('Disposition saved locally');
    try{if(window.renderMarkers)window.renderMarkers()}catch(e){}
    try{if(window.renderList)window.renderList()}catch(e){}
  }

  function openQuickDispo(){
    const l=selectedLead();
    if(!l){toastSafe('Select a home first');return;}
    closeQuickDispo();
    const panel=document.createElement('div');
    panel.id='m2QuickDispoPanel';
    panel.innerHTML=`
      <div class="m2-qd-head">
        <div>
          <b>Disposition</b>
          <span>${esc(leadName(l))}</span>
        </div>
        <button type="button" id="m2QdClose">×</button>
      </div>
      <div class="m2-qd-grid">
        ${quickDispos.map(d=>`<button type="button" data-dispo="${d[0]}"><span>${d[1]}</span>${d[2]}</button>`).join('')}
      </div>
    `;
    document.body.appendChild(panel);
    panel.querySelector('#m2QdClose').onclick=closeQuickDispo;
    panel.querySelectorAll('[data-dispo]').forEach(btn=>{
      btn.onclick=function(ev){
        ev.preventDefault();ev.stopPropagation();
        const v=btn.dataset.dispo;
        setLeadDisposition(l,v);
        closeQuickDispo();
        try{window.m2CloseSelectedCard && window.m2CloseSelectedCard({clear:false})}catch(e){}
        toastSafe('Saved: '+normalizeDispoLabel(v));
      };
    });
  }

  function closeQuickDispo(){
    const p=document.getElementById('m2QuickDispoPanel');
    if(p)p.remove();
  }

  window.m2OpenSelectedDisposition=openQuickDispo;

  function patchDispoButton(){
    const b=document.getElementById('m2SelDispo');
    if(b && b.dataset.quickDispo!=='1'){
      b.dataset.quickDispo='1';
      b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();openQuickDispo();return false;};
    }
  }

  /* 3) TODAY FOLLOW-UP POPUPS */
  function dueTodayLeads(){
    const t=todayISO();
    return leads().filter(l=>{
      const d=leadDate(l);
      const s=statusText(l);
      return d && d<=t && !/(closed|do not knock|dnk|not interested|not qualified|renter)/.test(s);
    });
  }
  function hotUntouched(){
    return leads().filter(l=>{
      const s=Number(l.score||l.leadScore||0);
      const st=statusText(l);
      return (s>=70 || /interested|hot/.test(st)) && !l.lastDispositionAt && !/(closed|dnk|do not knock)/.test(st);
    }).slice(0,8);
  }
  function appointmentsToday(){
    const t=todayISO();
    return leads().filter(l=>String(l.appointmentDate||'').slice(0,10)===t);
  }

  function showTodayPopup(){
    if(sessionStorage.getItem('m2_today_popup_seen')==='1')return;
    const due=dueTodayLeads();
    const appts=appointmentsToday();
    const hot=hotUntouched();
    if(!due.length && !appts.length && !hot.length)return;
    const modal=document.createElement('div');
    modal.id='m2TodayPopup';
    modal.innerHTML=`
      <div class="m2-pop-card">
        <div class="m2-pop-head">
          <div><b>Today’s Field Priorities</b><span>${new Date().toLocaleDateString()}</span></div>
          <button type="button" id="m2PopClose">×</button>
        </div>
        <div class="m2-pop-stats">
          <div><b>${appts.length}</b><span>Appointments</span></div>
          <div><b>${due.length}</b><span>Follow-ups Due</span></div>
          <div><b>${hot.length}</b><span>Hot Untouched</span></div>
        </div>
        <div class="m2-pop-list">
          ${[...appts.slice(0,4),...due.slice(0,4),...hot.slice(0,4)].slice(0,8).map(l=>`
            <button type="button" data-lead="${esc(l.id)}">
              <b>${esc(leadName(l))}</b>
              <span>${esc(leadAddress(l))}</span>
            </button>
          `).join('') || '<p>No priority leads.</p>'}
        </div>
        <button type="button" id="m2PopDone">Start Field Work</button>
      </div>
    `;
    document.body.appendChild(modal);
    sessionStorage.setItem('m2_today_popup_seen','1');
    modal.querySelector('#m2PopClose').onclick=()=>modal.remove();
    modal.querySelector('#m2PopDone').onclick=()=>modal.remove();
    modal.querySelectorAll('[data-lead]').forEach(btn=>{
      btn.onclick=function(){
        const l=leads().find(x=>x.id===btn.dataset.lead);
        if(l){
          modal.remove();
          try{window.showSelectedStrip && window.showSelectedStrip(l)}catch(e){}
          try{if(l.lat&&l.lng&&map)map.flyTo([+l.lat,+l.lng],Math.max(map.getZoom?map.getZoom():18,18),{animate:true,duration:.35})}catch(e){}
          try{if(typeof highlightProperty==='function')highlightProperty(l)}catch(e){}
        }
      }
    });
  }

  /* 4) BLOCK COMPLETION */
  function blockSummary(l){
    const arr=sameBlock(l);
    function count(rx){return arr.filter(x=>rx.test(statusText(x))).length}
    return {
      key:activeBlockKey(l),
      street:activeBlockKey(l).split('|')[1]||'Current block',
      prefix:activeBlockKey(l).split('|')[0]||'',
      total:arr.length,
      worked:arr.filter(x=>x.lastDispositionAt || statusText(x)).length,
      notHome:count(/not home/),
      interested:count(/interested|hot/),
      callbacks:count(/callback|follow/),
      appointments:count(/appointment/),
      closed:count(/closed/),
      dnk:count(/do not knock|dnk/)
    };
  }
  function openBlockComplete(){
    const l=selectedLead();
    if(!l){toastSafe('Select a home on the block first');return;}
    const s=blockSummary(l);
    closeBlockComplete();
    const modal=document.createElement('div');
    modal.id='m2BlockCompleteModal';
    modal.innerHTML=`
      <div class="m2-pop-card">
        <div class="m2-pop-head">
          <div><b>Complete Block</b><span>${esc(s.prefix)} ${esc(s.street)}</span></div>
          <button type="button" id="m2BlockClose">×</button>
        </div>
        <div class="m2-pop-stats block">
          <div><b>${s.total}</b><span>Total</span></div>
          <div><b>${s.worked}</b><span>Worked</span></div>
          <div><b>${s.interested}</b><span>Interested</span></div>
          <div><b>${s.callbacks}</b><span>Callbacks</span></div>
          <div><b>${s.appointments}</b><span>Appts</span></div>
          <div><b>${s.closed}</b><span>Closed</span></div>
        </div>
        <textarea id="m2BlockNotes" placeholder="Block notes: dogs, parking, best side, returns needed..."></textarea>
        <div class="m2-row-actions">
          <button type="button" id="m2CopyBlock">Copy Report</button>
          <button type="button" id="m2SaveBlock">Mark Complete</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('#m2BlockClose').onclick=closeBlockComplete;
    modal.querySelector('#m2CopyBlock').onclick=function(){
      const text=blockReportText(s, document.getElementById('m2BlockNotes').value);
      navigator.clipboard?.writeText(text);
      toastSafe('Block report copied');
    };
    modal.querySelector('#m2SaveBlock').onclick=function(){
      const reports=JSON.parse(localStorage.getItem(BLOCK_REPORTS_KEY)||'[]');
      reports.unshift({...s,notes:document.getElementById('m2BlockNotes').value,completedAt:new Date().toISOString()});
      localStorage.setItem(BLOCK_REPORTS_KEY,JSON.stringify(reports.slice(0,200)));
      markUnsynced('Block completion saved locally');
      closeBlockComplete();
      toastSafe('Block marked complete');
    };
  }
  function blockReportText(s, notes){
    return `M2 CRM Block Report
Block: ${s.prefix} ${s.street}
Total Homes: ${s.total}
Worked: ${s.worked}
Not Home: ${s.notHome}
Interested: ${s.interested}
Callbacks: ${s.callbacks}
Appointments: ${s.appointments}
Closed: ${s.closed}
Do Not Knock: ${s.dnk}
Notes: ${notes||''}`;
  }
  function closeBlockComplete(){const m=document.getElementById('m2BlockCompleteModal'); if(m)m.remove();}

  function addBlockButton(){
    let panel=document.getElementById('m2LiveLocationPanel') || document.querySelector('.field-tools') || document.body;
    if(document.getElementById('m2CompleteBlockBtn'))return;
    const b=document.createElement('button');
    b.id='m2CompleteBlockBtn';
    b.type='button';
    b.textContent='Complete Block';
    b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();openBlockComplete()};
    if(panel===document.body) document.body.appendChild(b); else panel.appendChild(b);
  }

  /* 5) OFFLINE SYNC BADGE */
  function renderOfflineBadge(){
    let b=document.getElementById('m2OfflineBadge');
    if(!b){
      b=document.createElement('button');
      b.id='m2OfflineBadge';
      b.type='button';
      b.onclick=function(ev){
        ev.preventDefault();ev.stopPropagation();
        const s=syncStatus();
        const when=s.lastSync?new Date(s.lastSync).toLocaleString():'Never';
        toastSafe((s.unsynced?'Unsynced changes':'Synced')+' • Last sync: '+when);
      };
      document.body.appendChild(b);
    }
    const s=syncStatus();
    const online=navigator.onLine!==false;
    b.className='';
    if(!online)b.classList.add('offline');
    if(s.unsynced)b.classList.add('unsynced');
    b.textContent=!online?'Offline':(s.unsynced?'Unsynced':'Synced');
  }
  window.addEventListener('online',renderOfflineBadge);
  window.addEventListener('offline',renderOfflineBadge);

  ['syncLeadsUp','pushLeadsToCloud','saveCloudLeads','m2SyncUp'].forEach(fn=>{
    if(typeof window[fn]==='function' && !window[fn]._m2Wrapped){
      const old=window[fn];
      window[fn]=async function(){
        try{
          const r=await old.apply(this,arguments);
          markSynced('Cloud sync complete');
          return r;
        }catch(e){
          markUnsynced('Sync failed');
          throw e;
        }
      };
      window[fn]._m2Wrapped=true;
    }
  });

  /* 6) CLEANER AGENT ASSIGNMENT */
  function openAssignPanel(){
    const l=selectedLead();
    if(!l){toastSafe('Select a lead first');return;}
    closeAssignPanel();
    const ag=agents();
    const panel=document.createElement('div');
    panel.id='m2AssignPanel';
    panel.innerHTML=`
      <div class="m2-assign-card">
        <div class="m2-pop-head">
          <div><b>Assign Lead</b><span>${esc(leadName(l))}</span></div>
          <button type="button" id="m2AssignClose">×</button>
        </div>
        <select id="m2AssignSelect">
          <option value="">Unassigned</option>
          ${ag.map(a=>{
            const name=a.name||a.fullName||a.email||a.username||'Agent';
            const val=a.email||a.id||name;
            return `<option value="${esc(val)}">${esc(name)}</option>`;
          }).join('')}
        </select>
        <button type="button" id="m2AssignSave">Save Assignment</button>
      </div>
    `;
    document.body.appendChild(panel);
    const sel=panel.querySelector('#m2AssignSelect');
    sel.value=l.assignedAgent||l.assignedTo||l.agentEmail||'';
    panel.querySelector('#m2AssignClose').onclick=closeAssignPanel;
    panel.querySelector('#m2AssignSave').onclick=function(){
      l.assignedAgent=sel.value;
      l.assignedTo=sel.value;
      l.agentEmail=sel.value;
      l.updatedAt=new Date().toISOString();
      saveStateSafe();
      markUnsynced('Lead assignment saved locally');
      closeAssignPanel();
      toastSafe('Assignment saved');
    };
  }
  function closeAssignPanel(){const p=document.getElementById('m2AssignPanel'); if(p)p.remove();}

  function addAssignButton(){
    const bar=document.getElementById('m2SelectedStrip');
    if(!bar)return;
    const actions=bar.querySelector('.m2-selected-actions')||bar;
    if(document.getElementById('m2SelAssign'))return;
    const b=document.createElement('button');
    b.id='m2SelAssign';
    b.type='button';
    b.textContent='Assign';
    b.onclick=function(ev){ev.preventDefault();ev.stopPropagation();openAssignPanel()};
    actions.insertBefore(b, actions.firstChild);
  }

  /* Styles */
  const css=document.createElement('style');
  css.textContent=`
    #m2SelLock.active{background:linear-gradient(135deg,#16a34a,#059669)!important;color:white!important;}
    #m2SelAssign{background:linear-gradient(135deg,#0ea5e9,#2563eb)!important;color:white!important;}
    body.m2-selected-locked .m2-field-home-pin:not(.selected){opacity:.58!important;}

    #m2QuickDispoPanel,#m2TodayPopup,#m2BlockCompleteModal,#m2AssignPanel{
      position:fixed!important;inset:0!important;z-index:100000!important;
      display:flex!important;align-items:flex-end!important;justify-content:center!important;

<script>
/* M2 Tap Name -> Quick Disposition Patch
   Removes selected bottom bar completely.
   Tapping a homeowner/label/pin opens the quick disposition screen immediately.
*/
(function(){
  function toastSafe(msg){try{toast(msg)}catch(e){console.log(msg)}}
  function leads(){try{return (state.leads||[]).filter(Boolean)}catch(e){return []}}
  function byId(id){return leads().find(l=>l&&l.id===id)||null}
  function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
  function leadName(l){return String(l?.owner||l?.ownerName||l?.name||l?.fullName||(((l?.first||'')+' '+(l?.last||'')).trim())||'Homeowner').trim()}
  function leadAddress(l){return String(l?.address||l?.property||l?.streetAddress||l?.fullAddress||'').trim()}
  function todayISO(){const d=new Date();d.setHours(0,0,0,0);return d.toISOString().slice(0,10)}

  const quickDispos=[
    ['not_home','🚪','Not Home'],
    ['interested','🔥','Interested'],
    ['callback','📞','Callback'],
    ['appointment_set','🎯','Appt Set'],
    ['not_interested','✋','Not Interested'],
    ['do_not_knock','⛔','DNK']
  ];

  function normalize(v){
    return String(v||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  }

  function saveSafe(){
    try{saveState()}catch(e){try{persist&&persist()}catch(_){}}
    try{window.m2MarkUnsynced&&window.m2MarkUnsynced('Disposition saved locally')}catch(e){}
  }

  function setLeadDisposition(l,value){
    if(!l)return;
    const label=normalize(value);
    l.disposition=value;
    l.status=label;
    l.leadStatus=label;
    l.lastDispositionAt=new Date().toISOString();
    l.updatedAt=new Date().toISOString();
    if(value==='callback' && !l.nextFollowUpDate) l.nextFollowUpDate=todayISO();
    if(value==='appointment_set'){
      l.pipelineStage='Appointment Set';
      if(!l.appointmentDate)l.appointmentDate=todayISO();
    }
    if(value==='do_not_knock')l.doNotKnock=true;
    if(!Array.isArray(l.timeline))l.timeline=[];
    l.timeline.unshift({type:'disposition',value:label,at:new Date().toISOString()});
    saveSafe();
    try{if(window.renderMarkers)window.renderMarkers()}catch(e){}
    try{if(window.renderList)window.renderList()}catch(e){}
  }

  function clearBottomBar(){
    document.querySelectorAll('#m2SelectedStrip,#m2SelectedMini,.m2-next-note,.m2-block-walk-note,.m2-strict-block-note').forEach(el=>el.remove());

    if(!l)return;
    try{openLead(l.id||l)}catch(e){

  }

  function closeQuickDispo(){
    const p=document.getElementById('m2QuickDispoPanel');
    if(p)p.remove();
  }

  function openQuickDispoForLead(l){
    if(!l){toastSafe('Select a home first');return;}
    clearBottomBar();
    highlightOnly(l);
    closeQuickDispo();

    const panel=document.createElement('div');
    panel.id='m2QuickDispoPanel';
    panel.innerHTML=`
      <div class="m2-qd-card">
        <div class="m2-qd-head">
          <div>
            <div class="m2-qd-selected">✓ SELECTED HOME</div>
            <b>${esc(leadName(l))}</b>
            <span>${esc(leadAddress(l))}</span>
          </div>
          <button type="button" id="m2QdClose">×</button>
        </div>
        <div class="m2-qd-grid">
          ${quickDispos.map(d=>`<button type="button" data-dispo="${d[0]}"><span>${d[1]}</span>${d[2]}</button>`).join('')}
