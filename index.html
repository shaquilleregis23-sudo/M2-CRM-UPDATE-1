<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="M2 CRM" />
  <title>M2 Energy CRM</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#07111f;--panel:#0d1b2f;--panel2:#112844;--card:#13233a;--line:rgba(255,255,255,.1);--text:#f5fbff;--muted:#9fb3c8;--teal:#51ffd0;--yellow:#ffd452;--red:#ff5b7f;--blue:#66a3ff;--green:#51ffd0;--shadow:0 18px 50px rgba(0,0,0,.35);--r:22px;--navH:74px}
    *{box-sizing:border-box}html,body{height:100%;margin:0;background:radial-gradient(circle at 15% 5%,rgba(81,255,208,.13),transparent 28%),radial-gradient(circle at 88% 14%,rgba(255,212,82,.13),transparent 28%),linear-gradient(180deg,#06101e,#07111f 55%,#06101e);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}button,input,select,textarea{font:inherit}.app{height:100%;display:flex;flex-direction:column}.top{height:72px;padding:12px 14px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--line);background:rgba(7,17,31,.86);backdrop-filter:blur(14px);z-index:5}.brand{display:flex;align-items:center;gap:10px;min-width:0;flex:1}.logo{width:45px;height:45px;border-radius:15px;background:linear-gradient(135deg,var(--teal),var(--yellow));display:grid;place-items:center;color:#07111f;font-weight:900;box-shadow:0 10px 30px rgba(81,255,208,.22)}.brand h1{font-size:18px;line-height:1;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand p{font-size:12px;color:var(--muted);margin:4px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pill{border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);border-radius:999px;padding:8px 11px;font-size:12px}.main{flex:1;position:relative;overflow:hidden}.view{position:absolute;inset:0;display:none;overflow:auto;padding:14px 14px calc(var(--navH) + 22px)}.view.active{display:block}.nav{height:var(--navH);position:fixed;left:0;right:0;bottom:0;background:rgba(7,17,31,.92);border-top:1px solid var(--line);backdrop-filter:blur(15px);display:grid;grid-template-columns:repeat(5,1fr);z-index:20}.nav button{border:0;background:transparent;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}.nav button.active{color:var(--teal)}.nav span{font-size:23px}.btn{border:0;border-radius:16px;background:linear-gradient(135deg,var(--teal),#8dffe4);color:#06101e;font-weight:850;padding:12px 14px;box-shadow:0 10px 24px rgba(81,255,208,.15)}.btn.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line);box-shadow:none}.btn.warn{background:linear-gradient(135deg,var(--yellow),#fff0a6);color:#281b00}.btn.danger{background:linear-gradient(135deg,var(--red),#ff9bb1);color:#fff}.btn.small{padding:8px 10px;border-radius:12px;font-size:12px}.grid{display:grid;gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(19,35,58,.96),rgba(13,27,47,.96));border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}.card h2,.card h3{margin:0 0 10px}.card h2{font-size:22px}.card h3{font-size:17px}.muted{color:var(--muted)}.mini{font-size:12px}.kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.kpi{padding:14px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid var(--line)}.kpi b{display:block;font-size:26px}.kpi span{font-size:12px;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.21);color:var(--text);border-radius:14px;padding:12px;outline:none}label{display:block;color:var(--muted);font-size:12px;margin:10px 0 6px}.row{display:flex;gap:10px;align-items:center}.row.wrap{flex-wrap:wrap}.space{display:flex;justify-content:space-between;align-items:center;gap:10px}.mapWrap{position:absolute;inset:0 0 var(--navH) 0}.mapToolbar{position:absolute;left:12px;right:12px;top:12px;z-index:401;display:grid;gap:8px}.search{display:flex;gap:8px}.filterBar{display:flex;gap:8px;overflow:auto;padding-bottom:3px}.filterBar button{white-space:nowrap}.filterBar button.active{background:var(--teal);color:#07111f}.map{height:100%;width:100%;background:#08111f}.leadList{display:grid;gap:10px}.lead{border:1px solid var(--line);border-radius:18px;padding:12px;background:rgba(255,255,255,.06)}.leadTop{display:flex;justify-content:space-between;gap:10px}.status{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;background:rgba(255,255,255,.09);font-size:11px;color:var(--muted)}.sunBadge{color:#221700;background:linear-gradient(135deg,var(--yellow),#fff0a6);font-weight:900;border-radius:999px;padding:5px 9px;font-size:12px}.sheet{position:fixed;left:0;right:0;bottom:0;max-height:88dvh;background:#0a1525;border-top:1px solid var(--line);border-radius:28px 28px 0 0;z-index:50;box-shadow:0 -30px 80px rgba(0,0,0,.55);transform:translateY(108%);transition:.24s ease;overflow:hidden}.sheet.open{transform:translateY(0)}.sheetHead{padding:10px 14px;border-bottom:1px solid var(--line)}.handle{width:58px;height:5px;border-radius:99px;background:rgba(255,255,255,.28);margin:0 auto 10px}.sheetBody{padding:14px;overflow:auto;max-height:calc(88dvh - 62px)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:16px}.modal.open{display:flex}.modalBox{width:min(720px,100%);max-height:88dvh;overflow:auto;border:1px solid var(--line);background:#0b1728;border-radius:28px;padding:16px;box-shadow:var(--shadow)}.launch{align-items:center}.launch .modalBox{background:radial-gradient(circle at 20% 0,rgba(81,255,208,.15),transparent 28%),#0b1728}.toast{position:fixed;left:14px;right:14px;top:88px;z-index:120;display:grid;gap:8px;pointer-events:none}.toastItem{padding:12px 14px;border-radius:15px;background:#10223a;border:1px solid var(--line);box-shadow:var(--shadow)}.toastItem.success{border-color:rgba(81,255,208,.45)}.toastItem.error{border-color:rgba(255,91,127,.55)}.statsMenu{display:grid;gap:10px;margin-bottom:12px}.statsTabs{display:flex;gap:8px;overflow:auto}.statsTabs button{white-space:nowrap}.quickSwitch{position:sticky;top:0;z-index:2;background:rgba(7,17,31,.9);backdrop-filter:blur(10px);padding:8px 0;margin-bottom:10px;display:flex;gap:8px;overflow:auto}.quickSwitch button{white-space:nowrap}.hidden{display:none!important}.section{display:none}.section.active{display:block}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid var(--line);padding:10px 6px;text-align:left;font-size:13px}.sunMarker{font-size:22px;text-shadow:0 2px 7px rgba(0,0,0,.8)}.dotMarker{width:18px;height:18px;border-radius:99px;background:var(--teal);border:3px solid white;box-shadow:0 2px 12px rgba(0,0,0,.55)}@media(min-width:860px){.view{padding:20px 20px calc(var(--navH) + 30px)}.kpis{grid-template-columns:repeat(4,1fr)}.grid2.desktop{grid-template-columns:1.1fr .9fr}.modal{align-items:center}.sheet{left:50%;right:auto;width:min(760px,92vw);transform:translate(-50%,108%)}.sheet.open{transform:translate(-50%,0)}}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="logo" id="brandIcon">M2</div><div><h1 id="brandName">M2 Energy CRM</h1><p id="sessionLine">Not logged in • Demo ready</p></div></div>
    <button class="pill" data-action="open-launch">Login</button>
  </header>
  <main class="main">
    <section id="mapView" class="view active"><div class="mapWrap"><div id="map" class="map"></div><div class="mapToolbar"><div class="search"><input id="searchInput" placeholder="Search name, address, phone..." data-action="search-input"><button class="btn small" data-action="open-lead-new">+ Lead</button></div><div id="filterBar" class="filterBar"></div></div></div></section>
    <section id="leadsView" class="view"><div class="space"><h2>Leads</h2><button class="btn small" data-action="open-lead-new">+ Add Lead</button></div><div id="leadList" class="leadList"></div></section>
    <section id="statsView" class="view"><div id="statsRoot"></div></section>
    <section id="followView" class="view"><h2>Follow-ups</h2><div id="followList" class="leadList"></div></section>
    <section id="moreView" class="view"><h2>More</h2><div class="grid"><button class="btn" data-action="open-launch">Open Launch Screen</button><button class="btn secondary" data-action="stats-tab" data-tab="settings">Settings</button><button class="btn secondary" data-action="export-backup">Export Full Backup</button><button class="btn warn" data-action="load-demo">Load Demo</button></div></section>
  </main>
  <nav class="nav">
    <button class="active" data-action="nav" data-view="map"><span>🗺️</span>Map</button>
    <button data-action="nav" data-view="leads"><span>🏠</span>Leads</button>
    <button data-action="nav" data-view="stats"><span>📊</span>Stats</button>
    <button data-action="nav" data-view="follow"><span>📞</span>Follow-ups</button>
    <button data-action="nav" data-view="more"><span>⚙️</span>More</button>
  </nav>
</div>
<div id="leadSheet" class="sheet"><div class="sheetHead"><div class="handle" data-action="close-lead"></div><div class="space"><b id="sheetTitle">Lead</b><button class="btn small secondary" data-action="close-lead">Close</button></div></div><div class="sheetBody" id="sheetBody"></div></div>
<div id="modal" class="modal"><div class="modalBox" id="modalBox"></div></div>
<div id="toast" class="toast"></div>
<script>
(function(){
'use strict';
const STORE='nyc_solar_crm_v3', SETTINGS='m2_crm_settings_v2', SESSION='m2_crm_session_v2', AGENTS='m2_crm_agents_v2', BACKUP='m2_crm_last_backup_v2';
const SUPABASE_URL='https://cghblukwgsqqwedlzmgh.supabase.co';
const SUPABASE_KEY='sb_publishable_btkoyC4o37GZNUOFMKtasQ_KmLIrUVb';
let sb=null; try{ if(window.supabase && SUPABASE_URL) sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY); }catch(e){ console.warn(e); }
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
let state={leads:[],filter:'all',search:'',activeStats:'overview',statsMenuOpen:true,selectedLead:null,demo:false};
let settings={businessName:'M2 Energy CRM',icon:'M2',ownerName:'Shaquille',supportEmail:'shaquilleregis23@gmail.com',territory:'Queens + Long Island',plan:'Trial',trialEnds:addDays(14),showDemo:true,showAdmin:true};
let session=null, agents=[];
function uid(){return 'm2_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function now(){return new Date().toISOString()} function addDays(n){let d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function loadJSON(k,f){try{return JSON.parse(localStorage.getItem(k))??f}catch(e){return f}}
function saveJSON(k,v){localStorage.setItem(k,JSON.stringify(v))}
function toast(msg,type='info'){const t=$('#toast');const el=document.createElement('div');el.className='toastItem '+type;el.textContent=msg;t.appendChild(el);setTimeout(()=>el.remove(),3600)}
function saveAll(){saveJSON(STORE,state);saveJSON(SETTINGS,settings);saveJSON(SESSION,session);saveJSON(AGENTS,agents)}
function loadAll(){const old=loadJSON(STORE,null); if(old){state={...state,...old}; if(!Array.isArray(state.leads)) state.leads=[];} settings={...settings,...loadJSON(SETTINGS,{})}; session=loadJSON(SESSION,null); agents=loadJSON(AGENTS,[]); if(!state.leads.length) seedEmpty();}
function seedEmpty(){state.leads=[];}
function currentRole(){return session?.role||'guest'} function isMaster(){return currentRole()==='master'||currentRole()==='demoMaster'} function isAgent(){return currentRole()==='agent'}
function teamId(){return session?.team_id || 'm2-default-team'}
function visibleLeads(){let arr=state.leads||[]; if(isAgent()){const email=(session.email||'').toLowerCase(), id=session.id; arr=arr.filter(l=>(String(l.assigned_user_email||'').toLowerCase()===email)||(l.assigned_user_id&&l.assigned_user_id===id)||(String(l.assigned_agent||'').toLowerCase()===String(session.name||'').toLowerCase()));}
  const q=(state.search||'').toLowerCase().trim(); if(q) arr=arr.filter(l=>[l.first,l.last,l.phone,l.email,l.addr,l.city,l.boro,l.zip,l.notes].join(' ').toLowerCase().includes(q));
  const f=state.filter; if(f==='all') return arr; if(f==='highsun') return arr.filter(l=>Number(l.sun_score||0)>=75); if(f==='unassigned') return arr.filter(l=>!l.assigned_agent); if(f==='assigned') return arr.filter(l=>!!l.assigned_agent); if(f==='callback') return arr.filter(l=>!!l.callback_due||String(l.status||'').toLowerCase().includes('callback')); if(f==='appt') return arr.filter(l=>!!l.appt_time||String(l.status||'').toLowerCase().includes('appointment')); if(f==='solar') return arr.filter(l=>String(l.solar_status||'').toLowerCase().includes('interest')||Number(l.sun_score||0)>=75); if(f==='hvac') return arr.filter(l=>String(l.hvac_opportunity||l.heating_type||'').trim()); return arr.filter(l=>String(l.status||'').toLowerCase()===f); }
function calcSun(l){let s=45; const notes=String(l.roof_notes||l.notes||'').toLowerCase(); const solar=String(l.solar_status||'').toLowerCase(); const bill=Number(l.monthly_bill||0); if(solar.includes('already')) s-=45; if(solar.includes('no solar')||solar==='unknown'||!solar) s+=12; if(bill>=250)s+=18; else if(bill>=150)s+=12; else if(bill>=90)s+=6; if(/good|new|open|south|flat|large/.test(notes))s+=12; if(/shade|tree|bad|old roof|leak|blocked/.test(notes))s-=22; if(Number(l.units||0)<=2)s+=6; if(Number(l.lot_sqft||0)>2500)s+=5; if(String(l.viability||'').toLowerCase().includes('high'))s+=9; if(l.hvac_opportunity)s+=3; s=Math.max(0,Math.min(100,Math.round(s))); l.sun_score=s; l.sun_level=s>=75?'High':s>=55?'Medium':'Low'; return s;}
function leadName(l){return [l.first,l.last].filter(Boolean).join(' ')||'Unknown Homeowner'}
function leadAddr(l){return [l.addr,l.city||l.boro,l.zip].filter(Boolean).join(', ')}
function updateBrand(){ $('#brandName').textContent=settings.businessName||'M2 Energy CRM'; $('#brandIcon').textContent=(settings.icon||'M2').slice(0,3); $('#sessionLine').textContent=session?`${session.name||session.email} — ${String(session.role||'').toUpperCase()} • ${settings.plan||'Trial'}`:'Not logged in • Demo ready';}
let map, markers=[];
function initMap(){ if(map) return; map=L.map('map',{zoomControl:false}).setView([40.7128,-74.006],11); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map); L.control.zoom({position:'bottomright'}).addTo(map); setTimeout(()=>map.invalidateSize(),250);}
function markerIcon(l){ if(Number(l.sun_score||0)>=75) return L.divIcon({className:'',html:'<div class="sunMarker">☀️</div>',iconSize:[30,30],iconAnchor:[15,15]}); return L.divIcon({className:'',html:'<div class="dotMarker"></div>',iconSize:[24,24],iconAnchor:[12,12]});}
function renderMap(){initMap(); markers.forEach(m=>m.remove()); markers=[]; const arr=visibleLeads().filter(l=>Number(l.lat)&&Number(l.lng)); arr.forEach(l=>{const m=L.marker([Number(l.lat),Number(l.lng)],{icon:markerIcon(l)}).addTo(map); m.on('click',()=>openLead(l.local_id||l.id)); markers.push(m);}); if(markers.length){try{map.fitBounds(L.featureGroup(markers).getBounds().pad(.15),{maxZoom:15})}catch(e){}}}
const filters=[['all','All'],['new','New'],['hot','Hot'],['callback','Callback'],['appt','Appointments'],['highsun','☀️ High Sun'],['solar','Solar'],['hvac','HVAC'],['assigned','Assigned'],['unassigned','Unassigned']];
function renderFilters(){const box=$('#filterBar'); box.innerHTML=filters.map(([id,label])=>`<button class="btn small secondary ${state.filter===id?'active':''}" data-action="filter" data-filter="${id}">${label}</button>`).join('');}
function renderLeads(){const arr=visibleLeads(); $('#leadList').innerHTML=arr.length?arr.map(leadHTML).join(''):'<div class="card muted">No leads found. Load Demo or import/sync leads.</div>'; $('#followList').innerHTML=arr.filter(l=>l.callback_due||l.appt_time||String(l.status||'').toLowerCase().includes('callback')).map(leadHTML).join('')||'<div class="card muted">No follow-ups due.</div>';}
function leadHTML(l){return `<div class="lead" data-action="open-lead" data-id="${esc(l.local_id||l.id)}"><div class="leadTop"><div><b>${esc(leadName(l))}</b><div class="muted mini">${esc(leadAddr(l))}</div></div><div>${Number(l.sun_score||0)>=75?'<span class="sunBadge">☀ '+esc(l.sun_score)+'</span>':''}</div></div><div class="row wrap" style="margin-top:10px"><span class="status">${esc(l.status||'new')}</span><span class="status">Agent: ${esc(l.assigned_agent||'Unassigned')}</span><span class="status">${esc(l.heating_type||'Heating ?')}</span></div></div>`}
function openLead(id){const l=(state.leads||[]).find(x=>(x.local_id||x.id)===id)||{}; state.selectedLead=id; $('#sheetTitle').textContent=leadName(l); $('#sheetBody').innerHTML=leadForm(l); $('#leadSheet').classList.add('open'); $('.sheetBody').scrollTop=0;}
function closeLead(){ $('#leadSheet').classList.remove('open'); setTimeout(()=>{$('#sheetBody').innerHTML=''; state.selectedLead=null;},250)}
function leadForm(l={}){const id=l.local_id||l.id||''; return `<div class="grid"><div class="kpis"><div class="kpi"><b>${esc(l.sun_score??'--')}</b><span>Sun Score</span></div><div class="kpi"><b>${esc(l.sun_level||'--')}</b><span>Sun Level</span></div></div><input type="hidden" id="leadId" value="${esc(id)}"><div class="grid2"><div><label>First</label><input id="lf_first" value="${esc(l.first)}"></div><div><label>Last</label><input id="lf_last" value="${esc(l.last)}"></div></div><label>Address</label><input id="lf_addr" value="${esc(l.addr)}"><div class="grid2"><div><label>City/Boro</label><input id="lf_city" value="${esc(l.city||l.boro)}"></div><div><label>ZIP</label><input id="lf_zip" value="${esc(l.zip)}"></div></div><div class="grid2"><div><label>Phone</label><input id="lf_phone" value="${esc(l.phone)}"></div><div><label>Email</label><input id="lf_email" value="${esc(l.email)}"></div></div><div class="grid2"><div><label>Latitude</label><input id="lf_lat" value="${esc(l.lat)}"></div><div><label>Longitude</label><input id="lf_lng" value="${esc(l.lng)}"></div></div><div class="grid2"><div><label>Status</label><select id="lf_status"><option>new</option><option>hot</option><option>callback</option><option>appointment</option><option>closed</option><option>not interested</option></select></div><div><label>Monthly Electric Bill</label><input id="lf_bill" type="number" value="${esc(l.monthly_bill)}"></div></div><div class="grid2"><div><label>Solar Status</label><input id="lf_solar" value="${esc(l.solar_status||'Unknown')}"></div><div><label>Heating Type</label><input id="lf_heat" value="${esc(l.heating_type||'Unknown')}"></div></div><label>Roof / Shade Notes</label><textarea id="lf_roof" rows="2">${esc(l.roof_notes)}</textarea><label>Notes</label><textarea id="lf_notes" rows="3">${esc(l.notes)}</textarea><div class="grid2"><div><label>Callback Due</label><input id="lf_callback" type="datetime-local" value="${esc(toLocalInput(l.callback_due))}"></div><div><label>Appointment</label><input id="lf_appt" type="datetime-local" value="${esc(toLocalInput(l.appt_time))}"></div></div><div class="grid2"><div><label>Assigned Agent</label><select id="lf_agent"><option value="">Unassigned</option>${agents.map(a=>`<option value="${esc(a.id)}" ${l.assigned_user_id===a.id?'selected':''}>${esc(a.name)} — ${esc(a.territory||'')}</option>`).join('')}</select></div><div><label>Territory</label><input id="lf_territory" value="${esc(l.territory)}"></div></div><div class="grid2"><button class="btn" data-action="save-lead">Save Lead</button><button class="btn warn" data-action="calc-lead-sun">Recalculate Sun</button></div><button class="btn secondary" data-action="close-lead">Close</button></div><script>document.getElementById('lf_status').value=${JSON.stringify(l.status||'new')}<\/script>`}
function toLocalInput(v){if(!v)return'';try{const d=new Date(v); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16)}catch(e){return''}}
function saveLeadFromForm(){let id=$('#leadId')?.value||uid(); let l=state.leads.find(x=>(x.local_id||x.id)===id); if(!l){l={local_id:id,team_id:teamId(),created_at:now()}; state.leads.push(l)} const agent=agents.find(a=>a.id===$('#lf_agent').value); Object.assign(l,{local_id:id,team_id:l.team_id||teamId(),first:$('#lf_first').value,last:$('#lf_last').value,addr:$('#lf_addr').value,city:$('#lf_city').value,boro:$('#lf_city').value,zip:$('#lf_zip').value,phone:$('#lf_phone').value,email:$('#lf_email').value,lat:$('#lf_lat').value,lng:$('#lf_lng').value,status:$('#lf_status').value,monthly_bill:$('#lf_bill').value,solar_status:$('#lf_solar').value,heating_type:$('#lf_heat').value,roof_notes:$('#lf_roof').value,notes:$('#lf_notes').value,callback_due:$('#lf_callback').value,appt_time:$('#lf_appt').value,territory:$('#lf_territory').value,assigned_agent:agent?.name||'',assigned_user_email:agent?.email||'',assigned_user_id:agent?.id||'',updated_at:now()}); calcSun(l); saveAll(); renderAll(); openLead(id); toast('Lead saved','success')}

function cap(s){return String(s).replace(/^./,c=>c.toUpperCase())}

function loadDemo(){autoBackup(); const base=[['Queens Homeowner','Rosedale NY',40.665,-73.735,86,'No Solar','Gas','hot'],['Long Island Lead','Hempstead NY',40.706,-73.621,79,'No Solar','Oil','callback'],['Brooklyn Roof','Brooklyn NY',40.67,-73.94,68,'Unknown','Gas','new'],['High Bill Home','Jamaica NY',40.702,-73.79,91,'No Solar','Oil','appointment'],['Mini Split Lead','Floral Park NY',40.724,-73.704,74,'Unknown','Gas','hot'],['Already Solar','Queens NY',40.736,-73.82,20,'Already Has Solar','Gas','not interested'],['Boiler Replace','Valley Stream NY',40.664,-73.708,82,'No Solar','Oil','callback'],['Clean Heat Lead','Bayside NY',40.758,-73.765,77,'No Solar','Gas','new']]; agents=[{id:'agent_demo_1',name:'Demo Rep 1',email:'demo.rep1@m2crm.com',pin:'1111',territory:'Queens',role:'agent',team_id:'demo-team'},{id:'agent_demo_2',name:'Demo Rep 2',email:'demo.rep2@m2crm.com',pin:'2222',territory:'Long Island',role:'agent',team_id:'demo-team'}]; state.leads=base.map((r,i)=>({local_id:'demo_'+i,team_id:'demo-team',first:r[0].split(' ')[0],last:r[0].split(' ').slice(1).join(' '),addr:(100+i*7)+' Demo Ave',city:r[1],boro:r[1],zip:'11'+String(400+i),lat:r[2],lng:r[3],sun_score:r[4],sun_level:r[4]>=75?'High':'Medium',solar_status:r[5],heating_type:r[6],status:r[7],monthly_bill:180+i*25,roof_notes:i%2?'open roof, good sun':'large roof, low shade',notes:'Demo lead for sales presentation',assigned_agent:i%2?agents[1].name:agents[0].name,assigned_user_email:i%2?agents[1].email:agents[0].email,assigned_user_id:i%2?agents[1].id:agents[0].id,callback_due:i%3===0?new Date(Date.now()+86400000).toISOString():'',hvac_opportunity:i%2?'Mini split / boiler opportunity':'',updated_at:now()})); settings.businessName='M2 Demo Solar + HVAC'; settings.plan='Growth'; session={id:'demo_master',name:'Demo Master',email:'demo@m2crm.com',role:'demoMaster',team_id:'demo-team'}; state.demo=true; saveAll(); closeModal(); renderAll(); toast('Demo loaded','success')}

function createAgent(copy=false){const name=$('#agent_name').value.trim(), email=$('#agent_email').value.trim(), pin=$('#agent_pin').value.trim(), territory=$('#agent_territory').value.trim(); if(!name||!email||!pin)return toast('Name, email, PIN required','error'); const a={id:uid(),name,email,pin,territory,role:'agent',active:true,team_id:teamId(),created_at:now()}; agents.push(a); if($('#agent_assign_filter')?.checked) assignToAgent(a.id, visibleLeads()); if($('#agent_assign_unassigned')?.checked) assignToAgent(a.id, state.leads.filter(l=>!l.assigned_agent&&(!territory||String(l.territory||l.city||l.boro).toLowerCase().includes(territory.toLowerCase())))); saveAll(); renderAll(); if(copy) copyText(`You've been invited to M2 Energy CRM.\nLogin link: ${location.href}\nEmail: ${email}\nPIN: ${pin}\nContact your manager if you need help.`); closeModal(); toast('Agent created','success')}

async function syncAgentsCloud(){if(!sb)return toast('Supabase not loaded','error'); try{const rows=agents.map(a=>({...a,team_id:a.team_id||teamId(),updated_at:now()})); const {error}=await sb.from('agent_accounts').upsert(rows,{onConflict:'id'}); if(error)throw error; toast('Agents synced to cloud','success')}catch(e){toast(e.message,'error')}}

async function syncMasterCloud(){if(!sb)return toast('Supabase not loaded','error'); if(!session)return toast('Log in as master first','error'); try{const row={id:session.id||uid(),team_id:teamId(),name:session.name,email:session.email,pin:session.pin||'',role:'master',updated_at:now()}; const {error}=await sb.from('master_accounts').upsert(row,{onConflict:'id'}); if(error)throw error; toast('Master synced to cloud','success')}catch(e){toast(e.message,'error')}}
function tagTeam(){(state.leads||[]).forEach(l=>{l.team_id=teamId();l.updated_at=now()});saveAll();renderAll();toast('Tagged current leads to team','success')}
function handle(action,btn){switch(action){case'nav':showView(btn.dataset.view);break;case'filter':state.filter=btn.dataset.filter;saveAll();renderAll();break;case'search-input':break;case'open-lead':openLead(btn.dataset.id);break;case'open-lead-new':openLead(uid());break;case'close-lead':closeLead();break;case'save-lead':saveLeadFromForm();break;case'calc-lead-sun':{const l=state.leads.find(x=>(x.local_id||x.id)===$('#leadId').value);if(l){calcSun(l);saveAll();renderAll();openLead(l.local_id||l.id);toast('Sun score recalculated','success')}break}case'calc-visible-sun':visibleLeads().forEach(calcSun);saveAll();renderAll();toast('Visible sun scores calculated','success');break;case'open-launch':openLaunch();break;case'close-modal':closeModal();break;case'login-master-form':loginForm('master');break;case'login-agent-form':loginForm('agent');break;case'do-login':doLogin(btn.dataset.role);break;case'load-demo':loadDemo();break;case'clear-demo':clearDemo();break;case'stats-tab':showStatsTab(btn.dataset.tab);break;case'open-stats-menu':state.statsMenuOpen=true;renderStats();break;case'close-stats-menu':state.statsMenuOpen=false;renderStats();break;case'export-backup':exportBackup();break;case'import-backup':importBackup();break;case'do-import-backup':doImportBackup();break;case'restore-backup':restoreBackup();break;case'invite-agent':inviteAgent();break;case'create-agent':createAgent(false);break;case'create-agent-copy':createAgent(true);break;case'copy-invite-template':copyText(`You've been invited to M2 Energy CRM.\nLogin link: ${location.href}\nEmail: ____\nPIN: ____`);break;case'agent-login-view':{const a=agents.find(x=>x.id===btn.dataset.id);if(a){session={id:a.id,name:a.name,email:a.email,role:'agent',team_id:a.team_id||teamId()};saveAll();renderAll();toast('Viewing as agent','success')}break}case'assign-filter':assignToAgent(btn.dataset.id,visibleLeads());break;case'assign-unassigned':assignToAgent(btn.dataset.id,state.leads.filter(l=>!l.assigned_agent));break;case'save-settings':saveSettings();break;case'reset-settings':settings={businessName:'M2 Energy CRM',icon:'M2',ownerName:'Shaquille',supportEmail:'shaquilleregis23@gmail.com',territory:'Queens + Long Island',plan:'Trial',trialEnds:addDays(14),showDemo:true,showAdmin:true};saveAll();renderAll();showStatsTab('settings');break;case'copy-plan':copyText(`${settings.businessName} • Plan: ${settings.plan} • Agents: ${agents.length}/${planLimits().agents} • Leads: ${state.leads.length}/${planLimits().leads}`);break;case'extend-trial':settings.trialEnds=addDays(trialDays()+14);saveAll();renderAll();showStatsTab('settings');toast('Trial extended','success');break;case'open-pricing':pricing();break;case'start-guided-demo':guided();break;case'guided-next':demoStep=Math.min(demoSteps.length-1,demoStep+1);renderGuided();break;case'guided-prev':demoStep=Math.max(0,demoStep-1);renderGuided();break;case'open-value-calc':valueCalc();break;case'calc-value':calcValue();break;case'copy-demo-text':copyText('M2 Energy CRM helps solar, HVAC, and clean heat teams map homeowner leads, score high-sun homes, assign reps, track follow-ups, and sync data to the cloud.');break;case'copy-book-demo':copyText('Hey, I built a CRM for solar/HVAC door-to-door teams. It helps managers assign leads, reps see their map, and teams prioritize high-sun homes. Want to see a quick demo?');break;case'sync-agents-cloud':syncAgentsCloud();break;case'load-agents-cloud':loadAgentsCloud();break;case'sync-leads-cloud':syncLeadsCloud();break;case'load-leads-cloud':loadLeadsCloud();break;case'sync-master-cloud':syncMasterCloud();break;case'tag-team':tagTeam();break;default:toast('Unknown action: '+action,'error')}}
document.addEventListener('click',e=>{const btn=e.target.closest('[data-action]'); if(!btn)return; e.preventDefault(); try{handle(btn.dataset.action,btn)}catch(err){console.error(err);toast('Button error: '+err.message,'error')}});
document.addEventListener('input',e=>{if(e.target.id==='searchInput'){state.search=e.target.value;renderLeads();renderMap();}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeLead();}});
loadAll(); updateBrand(); renderFilters(); initMap(); renderAll(); setTimeout(openLaunch,350);
})();
</script>
